<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#8fd0ff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Caterpillar Hop">
  <link rel="apple-touch-icon" href="../apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="512x512" href="../icon-512.png">
  <title>Caterpillar Hop</title>
  <style>
    :root {
      --sky: #8fd0ff;
      --leaf: #6bd06b;
      --berry: #ff5d6c;
      --gold: #ffd166;
      --ink: #234a1e;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      overscroll-behavior: none;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      display: flex;
      flex-direction: column;
      height: 100vh;          /* fallback for Safari < 15.4 (e.g. iPad mini 2) */
      height: 100dvh;
      font-family: "Trebuchet MS", "Segoe UI", system-ui, sans-serif;
      color: var(--ink);
      background: linear-gradient(180deg, #bfeaff 0%, #8fd0ff 50%, #7ecb6c 100%);
    }

    /* ---- Top bar ---- */
    .topbar {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: max(10px, env(safe-area-inset-top)) 14px 8px;
    }
    .back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 44px;
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 1rem;
      font-weight: 700;
      text-decoration: none;
      color: #fff;
      background: rgba(35, 74, 30, 0.30);
      border: 2px solid rgba(255, 255, 255, 0.6);
    }
    .back:active { transform: scale(0.95); }
    .score {
      font-size: 1.3rem;
      font-size: clamp(1.1rem, 5vw, 1.6rem);
      font-weight: 800;
      color: #fff;
      text-shadow: 0 2px 8px rgba(35, 74, 30, 0.45);
    }
    .rightbtns { display: flex; }
    .rightbtns > * + * { margin-left: 8px; }   /* gap fallback for Safari < 14.5 */
    .refresh, .pause {
      -webkit-appearance: none;
      appearance: none;
      min-width: 44px;
      min-height: 44px;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 1.15rem;
      line-height: 1;
      cursor: pointer;
      color: #fff;
      background: rgba(35, 74, 30, 0.30);
      border: 2px solid rgba(255, 255, 255, 0.6);
    }
    .refresh:active, .pause:active { transform: scale(0.95); }

    /* Speed picker inside the pause menu */
    .speedpick { display: flex; flex-wrap: wrap; justify-content: center; }
    .speedpick > * + * { margin-left: 10px; }  /* gap fallback for Safari < 14.5 */
    .speedpick button {
      -webkit-appearance: none;
      appearance: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 68px;
      min-height: 68px;
      padding: 8px 10px;
      border-radius: 16px;
      font-size: 1.6rem;
      line-height: 1;
      cursor: pointer;
      color: #fff;
      background: rgba(255, 255, 255, 0.16);
      border: 2px solid rgba(255, 255, 255, 0.35);
    }
    .speedpick button span { display: block; margin-top: 4px; font-size: 0.72rem; font-weight: 700; opacity: 0.9; }
    .speedpick button.sel { border-color: var(--gold); background: rgba(255, 209, 102, 0.28); transform: scale(1.05); }
    .speedpick button:active { transform: scale(0.95); }

    /* ---- Stage / canvas ---- */
    .stage {
      flex: 1 1 auto;
      position: relative;
      min-height: 0;
      display: flex;
      align-items: stretch;
      justify-content: center;
    }
    canvas { display: block; width: 100%; height: 100%; touch-action: none; }

    /* ---- Overlays ---- */
    .overlay {
      position: absolute;
      top: 0; right: 0; bottom: 0; left: 0;   /* inset shorthand unsupported on Safari < 14.5 */
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      background: rgba(30, 60, 30, 0.55);
      -webkit-backdrop-filter: blur(3px);
      backdrop-filter: blur(3px);
      z-index: 5;
    }
    .overlay > * + * { margin-top: 16px; }     /* gap fallback for Safari < 14.5 */
    .overlay.hidden { display: none; }
    .overlay h2 {
      font-size: 2rem;
      font-size: clamp(1.6rem, 7vw, 2.8rem);
      color: #fff;
      text-shadow: 0 3px 0 rgba(35, 74, 30, 0.35), 0 0 22px rgba(255, 209, 102, 0.5);
    }
    .overlay p { font-size: 1.05rem; font-size: clamp(0.95rem, 4vw, 1.2rem); color: rgba(255, 255, 255, 0.92); max-width: 24ch; }
    .tap-hint { font-size: clamp(2.4rem, 12vw, 4rem); animation: bob 1s ease-in-out infinite; }
    @keyframes bob { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    .bigbtn {
      min-height: 60px;
      padding: 16px 34px;
      font-size: 1.3rem;
      font-size: clamp(1.1rem, 5vw, 1.5rem);
      font-weight: 800;
      color: #234a1e;
      border: none;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--gold), #ffb03d);
      box-shadow: 0 12px 30px rgba(255, 176, 61, 0.45);
      cursor: pointer;
    }
    .bigbtn:active { transform: scale(0.96); }
  </style>
</head>
<body>
  <div class="topbar">
    <a class="back" href="../index.html">⬅️ Back</a>
    <div class="score" id="score">0</div>
    <div class="rightbtns">
      <button class="pause" id="pauseBtn" aria-label="Pause">⏸️</button>
      <button class="refresh" id="refreshBtn" aria-label="Refresh game">🔄</button>
    </div>
  </div>

  <div class="stage">
    <canvas id="game"></canvas>

    <div class="overlay" id="startOverlay">
      <h2>🐛 Caterpillar Hop</h2>
      <p>Help the hungry caterpillar hop from leaf to leaf!</p>
      <div class="tap-hint">👆</div>
      <p><b>Tap anywhere to hop.</b> Tap again in the air for a double hop! Munch the berries.</p>
      <p>Pick a speed (or change it with ⏸️):</p>
      <div class="speedpick" id="speedPickStart">
        <button data-idx="0">🐢<span>Chill</span></button>
        <button data-idx="1">🙂<span>Normal</span></button>
        <button data-idx="2">🐇<span>Fast</span></button>
        <button data-idx="3">⚡<span>Zoom</span></button>
      </div>
    </div>

    <div class="overlay hidden" id="pauseOverlay">
      <h2>Paused</h2>
      <p>Choose a speed:</p>
      <div class="speedpick" id="speedPick">
        <button data-idx="0">🐢<span>Chill</span></button>
        <button data-idx="1">🙂<span>Normal</span></button>
        <button data-idx="2">🐇<span>Fast</span></button>
        <button data-idx="3">⚡<span>Zoom</span></button>
      </div>
      <button class="bigbtn" id="resumeBtn">▶️ Resume</button>
    </div>

    <div class="overlay hidden" id="overOverlay">
      <h2>🍂 Tumble!</h2>
      <p id="finalScore">You scored 0</p>
      <button class="bigbtn" id="playAgainBtn">🔁 Play Again</button>
    </div>
  </div>

  <script>
  (function () {
    'use strict';

    var canvas = document.getElementById('game');
    var ctx = canvas.getContext('2d');
    var scoreEl = document.getElementById('score');

    var STATE = { START: 0, PLAYING: 1, OVER: 2, PAUSED: 3 };
    var state = STATE.START;

    var W = 0, H = 0, dpr = 1;
    // Cheerful leaf tints for the platforms.
    var LEAF = ['#6bd06b', '#57c785', '#8ed85a', '#4fbf7a', '#a3dd5b'];

    // Player-selectable speed
    var SPEED_LEVELS = [
      { m: 0.26, icon: '🐢', name: 'Chill' },
      { m: 0.55, icon: '🙂', name: 'Normal' },
      { m: 0.85, icon: '🐇', name: 'Fast' },
      { m: 1.25, icon: '⚡', name: 'Zoom' }
    ];
    var speedIdx = 1, speedMult = 1;

    var char, platforms, berries, sparks, clouds, hills, sun;
    var speed, dist, points, lastTs = 0;

    // Tunables (recomputed from H on resize)
    var CW, GRAV, JUMP, SPEED0, SPEEDMAX, SPEEDACC, GAPMIN, GAPMAX, PWMIN, PWMAX, TOPMIN, TOPMAX, MAXRISE;

    function computeTunables() {
      CW = H * 0.16;
      GRAV = H * 2.4;
      JUMP = -H * 1.06;
      SPEED0 = H * 0.38 * speedMult;
      SPEEDMAX = H * 0.60 * speedMult;
      SPEEDACC = H * 0.008 * speedMult;
      GAPMIN = H * 0.16; GAPMAX = H * 0.28;
      PWMIN = H * 0.40;  PWMAX = H * 0.62;
      TOPMIN = H * 0.44; TOPMAX = H * 0.72;
      MAXRISE = H * 0.15;
    }

    function rand(a, b) { return a + Math.random() * (b - a); }

    // ---------- Sizing ----------
    function resize() {
      var rect = canvas.parentNode.getBoundingClientRect();
      W = Math.max(200, Math.floor(rect.width));
      H = Math.max(200, Math.floor(rect.height));
      dpr = window.devicePixelRatio || 1;
      canvas.width = Math.round(W * dpr);
      canvas.height = Math.round(H * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      computeTunables();
      if (char) char.x = W * 0.26;
      buildBg();
    }

    function buildBg() {
      clouds = [];
      var n = 3;
      for (var i = 0; i < n; i++) {
        clouds.push({ x: rand(0, W), y: rand(H * 0.05, H * 0.24), s: rand(H * 0.05, H * 0.09), v: rand(W * 0.004, W * 0.012) });
      }
      // two soft rolling hill bands behind the platforms
      hills = [
        { y: H * 0.42, amp: H * 0.05, color: '#9ad86f', k: 0.9 },
        { y: H * 0.50, amp: H * 0.07, color: '#7ecb6c', k: 1.5 }
      ];
      sun = { x: W * 0.8, y: H * 0.18, r: H * 0.075 };
    }

    // ---------- Setup ----------
    function newGame() {
      speed = SPEED0;
      dist = 0;
      points = 0;
      sparks = [];
      berries = [];
      char = { x: W * 0.26, y: 0, vy: 0, w: CW, h: CW, py: 0, jumps: 2, grounded: true, tilt: 0 };

      // First (long) leaf under the caterpillar
      platforms = [];
      var firstTop = H * 0.64;
      platforms.push({ x: -W * 0.1, w: char.x + W * 0.55, top: firstTop, leaf: LEAF[0] });
      char.y = firstTop - char.h;
      char.py = char.y;
      // Fill the screen with more platforms
      while (platforms[platforms.length - 1].x + platforms[platforms.length - 1].w < W + W * 0.3) spawnPlatform();

      updateScore();
    }

    function spawnPlatform() {
      var last = platforms[platforms.length - 1];
      var gap = rand(GAPMIN, GAPMAX);
      var w = rand(PWMIN, PWMAX);
      var top = Math.max(TOPMIN, Math.min(TOPMAX, last.top + rand(-MAXRISE, MAXRISE)));
      var idx = platforms.length;
      var p = { x: last.x + last.w + gap, w: w, top: top, leaf: LEAF[idx % LEAF.length] };
      platforms.push(p);
      // Sometimes float a collectible berry above the leaf
      if (Math.random() < 0.7) {
        berries.push({ x: p.x + p.w / 2, y: top - rand(H * 0.14, H * 0.26), r: H * 0.032, got: false, tw: Math.random() * 6.28 });
      }
    }

    // ---------- Input ----------
    function jump() {
      if (char.jumps > 0) {
        char.vy = JUMP;
        char.jumps--;
        char.grounded = false;
        // little puff
        spawnSparks(char.x + char.w * 0.3, char.y + char.h, '#c7ec9a', 6);
      }
    }

    function onTap(e) {
      // Let taps on UI controls (buttons/links) run their own handlers — otherwise
      // preventDefault() here would cancel the click on Play Again / Resume / speed.
      if (e && e.target && e.target.closest && e.target.closest('button, a')) return;
      if (e) e.preventDefault();
      if (state === STATE.START) { startGame(); }
      else if (state === STATE.PLAYING) { jump(); }
    }

    function startGame() {
      document.getElementById('startOverlay').classList.add('hidden');
      state = STATE.PLAYING;
      lastTs = 0;
    }

    function gameOver() {
      if (state === STATE.OVER) return;
      state = STATE.OVER;
      spawnSparks(char.x + char.w / 2, char.y + char.h / 2, '#6bd06b', 22);
      document.getElementById('finalScore').textContent = 'You scored ' + Math.floor(points);
      document.getElementById('overOverlay').classList.remove('hidden');
    }

    // ---------- Particles ----------
    function spawnSparks(x, y, color, n) {
      for (var i = 0; i < n; i++) {
        var a = Math.random() * Math.PI * 2, sp = rand(H * 0.1, H * 0.5);
        sparks.push({ x: x, y: y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - H * 0.1, r: rand(2, H * 0.02), color: color, alpha: 1 });
      }
    }
    function updateSparks(dt) {
      for (var i = sparks.length - 1; i >= 0; i--) {
        var s = sparks[i];
        s.x += s.vx * dt; s.y += s.vy * dt; s.vy += H * 1.6 * dt;
        s.alpha -= dt * 1.1;
        if (s.alpha <= 0) sparks.splice(i, 1);
      }
    }

    // ---------- Update ----------
    function update(dt) {
      // Difficulty ramp
      speed = Math.min(SPEEDMAX, speed + SPEEDACC * dt);
      dist += speed * dt;
      points += dt * 8;

      // Scroll world left
      var d = speed * dt;
      var i;
      for (i = 0; i < platforms.length; i++) platforms[i].x -= d;
      for (i = 0; i < berries.length; i++) berries[i].x -= d;

      // Cull + spawn platforms
      while (platforms.length && platforms[0].x + platforms[0].w < -W * 0.1) platforms.shift();
      while (platforms[platforms.length - 1].x + platforms[platforms.length - 1].w < W + W * 0.3) spawnPlatform();
      while (berries.length && berries[0].x < -W * 0.1) berries.shift();

      // Physics
      char.py = char.y;
      char.vy += GRAV * dt;
      char.y += char.vy * dt;
      char.tilt = Math.max(-0.5, Math.min(0.6, char.vy / (H * 2)));

      // Collisions with platforms
      var landed = false;
      for (i = 0; i < platforms.length; i++) {
        var p = platforms[i];
        var overlapX = (char.x + char.w > p.x) && (char.x < p.x + p.w);
        if (!overlapX) continue;
        // Land on top when falling
        if (char.vy >= 0 && (char.py + char.h) <= p.top + 1 && (char.y + char.h) >= p.top) {
          char.y = p.top - char.h;
          char.vy = 0;
          char.jumps = 2;
          char.grounded = true;
          landed = true;
        } else if ((char.y + char.h) > p.top + char.h * 0.5 && char.y < p.top + H) {
          // Ran into the side of a taller leaf
          gameOver();
          return;
        }
      }
      if (!landed) char.grounded = false;

      // Collect berries
      for (i = 0; i < berries.length; i++) {
        var bt = berries[i];
        if (bt.got) continue;
        var cxp = char.x + char.w / 2, cyp = char.y + char.h / 2;
        if (Math.abs(cxp - bt.x) < char.w * 0.6 + bt.r && Math.abs(cyp - bt.y) < char.h * 0.6 + bt.r) {
          bt.got = true;
          points += 5;
          spawnSparks(bt.x, bt.y, '#ff5d6c', 12);
        }
      }

      // Fell off the bottom
      if (char.y > H + char.h) { gameOver(); return; }

      updateSparks(dt);
      updateScore();
    }

    function updateScore() { scoreEl.textContent = Math.floor(points); }

    // ---------- Render ----------
    function roundTopRect(c, x, y, w, h, r) {
      c.beginPath();
      c.moveTo(x, y + h);
      c.lineTo(x, y + r);
      c.arcTo(x, y, x + r, y, r);
      c.lineTo(x + w - r, y);
      c.arcTo(x + w, y, x + w, y + r, r);
      c.lineTo(x + w, y + h);
      c.closePath();
    }

    function drawPlatform(p) {
      var capH = Math.min(H * 0.055, p.w * 0.3);
      // stem / soil body
      roundTopRect(ctx, p.x, p.top, p.w, H - p.top + 4, Math.min(16, p.w * 0.12));
      var bg = ctx.createLinearGradient(0, p.top, 0, H);
      bg.addColorStop(0, '#4c9a4f'); bg.addColorStop(1, '#2f6b34');
      ctx.fillStyle = bg;
      ctx.fill();
      // leaf-vein texture running down the body
      ctx.strokeStyle = 'rgba(255,255,255,0.12)';
      ctx.lineWidth = Math.max(2, H * 0.006);
      ctx.beginPath();
      ctx.moveTo(p.x + p.w / 2, p.top + capH);
      ctx.lineTo(p.x + p.w / 2, H);
      ctx.stroke();
      for (var ly = p.top + capH + H * 0.06; ly < H; ly += H * 0.09) {
        ctx.beginPath();
        ctx.moveTo(p.x + p.w / 2, ly);
        ctx.lineTo(p.x + p.w * 0.28, ly + H * 0.05);
        ctx.moveTo(p.x + p.w / 2, ly);
        ctx.lineTo(p.x + p.w * 0.72, ly + H * 0.05);
        ctx.stroke();
      }
      // bright leafy cap
      roundTopRect(ctx, p.x, p.top, p.w, capH, Math.min(16, p.w * 0.12));
      ctx.fillStyle = p.leaf;
      ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.18)';
      roundTopRect(ctx, p.x, p.top, p.w, capH * 0.4, Math.min(16, p.w * 0.12));
      ctx.fill();
      // grass blades poking up along the top edge
      ctx.strokeStyle = '#3f9e57';
      ctx.lineWidth = Math.max(2, H * 0.006); ctx.lineCap = 'round';
      var blades = Math.max(4, Math.round(p.w / (H * 0.05)));
      for (var t = 0; t < blades; t++) {
        var gx = p.x + (t + 0.5) * (p.w / blades);
        var lean = (t % 2 === 0 ? 1 : -1) * H * 0.012;
        ctx.beginPath();
        ctx.moveTo(gx, p.top);
        ctx.quadraticCurveTo(gx + lean, p.top - H * 0.03, gx + lean * 1.6, p.top - H * 0.05);
        ctx.stroke();
      }
    }

    function drawBerry(x, y, r) {
      // little green leaf on top
      ctx.fillStyle = '#57c785';
      ctx.beginPath();
      ctx.ellipse ? ctx.ellipse(x, y - r * 0.9, r * 0.5, r * 0.28, -0.5, 0, Math.PI * 2)
                  : ctx.arc(x, y - r * 0.9, r * 0.4, 0, Math.PI * 2);
      ctx.fill();
      // berry body
      var bg = ctx.createRadialGradient(x - r * 0.3, y - r * 0.3, r * 0.2, x, y, r);
      bg.addColorStop(0, '#ff8a97'); bg.addColorStop(1, '#e23b4d');
      ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.fillStyle = bg;
      ctx.shadowColor = 'rgba(226,59,77,0.5)';
      ctx.shadowBlur = r * 0.8;
      ctx.fill();
      ctx.shadowBlur = 0;
      // seed dots
      ctx.fillStyle = 'rgba(255,255,255,0.7)';
      for (var i = 0; i < 5; i++) {
        var a = i * Math.PI * 2 / 5 + 0.4;
        ctx.beginPath(); ctx.arc(x + Math.cos(a) * r * 0.45, y + Math.sin(a) * r * 0.45, r * 0.08, 0, Math.PI * 2); ctx.fill();
      }
      // shine
      ctx.fillStyle = 'rgba(255,255,255,0.6)';
      ctx.beginPath(); ctx.arc(x - r * 0.32, y - r * 0.32, r * 0.16, 0, Math.PI * 2); ctx.fill();
    }

    // A cheerful caterpillar, drawn on canvas (renders everywhere)
    function drawCaterpillar(ts) {
      var cxp = char.x + char.w / 2, cyp = char.y + char.h / 2;
      var s = char.h, c = ctx;
      c.save();
      c.translate(cxp, cyp);
      c.rotate(char.tilt * 0.4);

      var segs = 4;
      var spacing = s * 0.2;
      var baseX = -s * 0.4;               // tail end at the left
      var wiggle = char.grounded ? 1 : 0.35;

      // soft ground shadow so the body reads on bright leaves
      c.fillStyle = 'rgba(0,0,0,0.18)';
      c.beginPath(); c.ellipse ? c.ellipse(0, s * 0.42, s * 0.4, s * 0.09, 0, 0, Math.PI * 2)
                               : c.arc(0, s * 0.42, s * 0.2, 0, Math.PI * 2);
      c.fill();

      // little legs under the body
      c.strokeStyle = '#2f6b34';
      c.lineWidth = Math.max(2, s * 0.03); c.lineCap = 'round';
      for (var lgi = 0; lgi < segs; lgi++) {
        var lx = baseX + lgi * spacing;
        var lb = Math.sin(ts / 150 + lgi * 0.9) * s * 0.06 * wiggle;
        c.beginPath();
        c.moveTo(lx, s * 0.1 + lb);
        c.lineTo(lx - s * 0.05, s * 0.3);
        c.stroke();
      }

      // body segments (back to front so the head overlaps)
      for (var i = 0; i < segs; i++) {
        var x = baseX + i * spacing;
        var bob = Math.sin(ts / 150 + i * 0.9) * s * 0.06 * wiggle;
        var rad = s * (0.19 + i * 0.005);
        var seg = c.createRadialGradient(x - rad * 0.3, bob - rad * 0.3, rad * 0.2, x, bob, rad);
        var base = (i % 2 === 0) ? '#7ed957' : '#6bd06b';
        seg.addColorStop(0, '#bff29a'); seg.addColorStop(1, base);
        c.fillStyle = seg;
        c.beginPath(); c.arc(x, bob, rad, 0, Math.PI * 2); c.fill();
        // little back spot
        c.fillStyle = 'rgba(47,107,52,0.5)';
        c.beginPath(); c.arc(x, bob - rad * 0.35, rad * 0.16, 0, Math.PI * 2); c.fill();
      }

      // head at the front (right)
      var hx = baseX + segs * spacing, hb = Math.sin(ts / 150 + segs * 0.9) * s * 0.06 * wiggle;
      var hr = s * 0.26;
      // antennae
      c.strokeStyle = '#3f9e57';
      c.lineWidth = Math.max(2, s * 0.03); c.lineCap = 'round';
      var aw = Math.sin(ts / 200) * s * 0.03;
      c.beginPath();
      c.moveTo(hx + hr * 0.2, hb - hr * 0.7);
      c.quadraticCurveTo(hx + hr * 0.4, hb - hr * 1.3, hx + hr * 0.5 + aw, hb - hr * 1.5);
      c.moveTo(hx + hr * 0.6, hb - hr * 0.6);
      c.quadraticCurveTo(hx + hr * 0.9, hb - hr * 1.1, hx + hr * 1.0 + aw, hb - hr * 1.3);
      c.stroke();
      c.fillStyle = '#ff5d6c';
      c.beginPath(); c.arc(hx + hr * 0.5 + aw, hb - hr * 1.5, s * 0.045, 0, Math.PI * 2); c.fill();
      c.beginPath(); c.arc(hx + hr * 1.0 + aw, hb - hr * 1.3, s * 0.045, 0, Math.PI * 2); c.fill();
      // head
      var hg = c.createRadialGradient(hx - hr * 0.3, hb - hr * 0.3, hr * 0.2, hx, hb, hr);
      hg.addColorStop(0, '#a7e86a'); hg.addColorStop(1, '#5fbf4a');
      c.fillStyle = hg;
      c.beginPath(); c.arc(hx, hb, hr, 0, Math.PI * 2); c.fill();
      // eyes
      c.fillStyle = '#fff';
      c.beginPath(); c.arc(hx + hr * 0.18, hb - hr * 0.18, hr * 0.32, 0, Math.PI * 2); c.fill();
      c.beginPath(); c.arc(hx + hr * 0.62, hb - hr * 0.18, hr * 0.32, 0, Math.PI * 2); c.fill();
      c.fillStyle = '#241a10';
      c.beginPath(); c.arc(hx + hr * 0.26, hb - hr * 0.14, hr * 0.16, 0, Math.PI * 2); c.fill();
      c.beginPath(); c.arc(hx + hr * 0.70, hb - hr * 0.14, hr * 0.16, 0, Math.PI * 2); c.fill();
      // rosy cheeks
      c.fillStyle = 'rgba(255,140,150,0.6)';
      c.beginPath(); c.arc(hx + hr * 0.05, hb + hr * 0.28, hr * 0.16, 0, Math.PI * 2); c.fill();
      c.beginPath(); c.arc(hx + hr * 0.85, hb + hr * 0.28, hr * 0.16, 0, Math.PI * 2); c.fill();
      // smile
      c.strokeStyle = '#2c5a22';
      c.lineWidth = Math.max(2, s * 0.028); c.lineCap = 'round';
      c.beginPath();
      c.arc(hx + hr * 0.44, hb + hr * 0.2, hr * 0.34, 0.15 * Math.PI, 0.85 * Math.PI);
      c.stroke();

      c.restore();
    }

    function render(ts) {
      // Sky
      if (render._h !== H) { var g = ctx.createLinearGradient(0, 0, 0, H); g.addColorStop(0, '#bfeaff'); g.addColorStop(0.55, '#8fd0ff'); g.addColorStop(1, '#bfe6a8'); render._g = g; render._h = H; }
      ctx.fillStyle = render._g;
      ctx.fillRect(0, 0, W, H);

      // Sun
      if (sun) {
        ctx.fillStyle = 'rgba(255, 240, 170, 0.4)';
        ctx.beginPath(); ctx.arc(sun.x, sun.y, sun.r * 1.5, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#ffe98a';
        ctx.beginPath(); ctx.arc(sun.x, sun.y, sun.r, 0, Math.PI * 2); ctx.fill();
      }

      // Clouds (drift)
      ctx.fillStyle = 'rgba(255,255,255,0.92)';
      for (var i = 0; i < clouds.length; i++) {
        var cl = clouds[i];
        if (state === STATE.PLAYING) { cl.x += cl.v * 0.016; if (cl.x - cl.s * 2 > W) cl.x = -cl.s * 2; }
        ctx.beginPath(); ctx.arc(cl.x, cl.y, cl.s, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(cl.x + cl.s * 0.9, cl.y + cl.s * 0.15, cl.s * 0.8, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(cl.x - cl.s * 0.9, cl.y + cl.s * 0.15, cl.s * 0.75, 0, Math.PI * 2); ctx.fill();
      }

      // Rolling hills behind the platforms
      for (i = 0; i < hills.length; i++) {
        var hl = hills[i];
        ctx.fillStyle = hl.color;
        ctx.beginPath();
        ctx.moveTo(0, H);
        ctx.lineTo(0, hl.y);
        for (var x = 0; x <= W; x += W / 12) {
          ctx.lineTo(x, hl.y + Math.sin(x / W * Math.PI * hl.k + i) * hl.amp);
        }
        ctx.lineTo(W, H);
        ctx.closePath(); ctx.fill();
      }

      // Platforms
      for (i = 0; i < platforms.length; i++) drawPlatform(platforms[i]);

      // Collectible berries
      for (i = 0; i < berries.length; i++) {
        if (berries[i].got) continue;
        var bt = berries[i];
        var bob = Math.sin(ts / 300 + bt.tw) * H * 0.01;
        drawBerry(bt.x, bt.y + bob, bt.r);
      }

      // Caterpillar
      drawCaterpillar(ts);

      // Sparks
      for (i = 0; i < sparks.length; i++) {
        var sp = sparks[i];
        ctx.globalAlpha = Math.max(0, sp.alpha);
        ctx.fillStyle = sp.color;
        ctx.beginPath(); ctx.arc(sp.x, sp.y, sp.r, 0, Math.PI * 2); ctx.fill();
      }
      ctx.globalAlpha = 1;
    }

    // ---------- Loop ----------
    function frame(ts) {
      if (!lastTs) lastTs = ts;
      var dt = Math.min(0.045, (ts - lastTs) / 1000);
      lastTs = ts;
      if (state === STATE.PLAYING) update(dt);
      else updateSparks(dt);
      render(ts);
      requestAnimationFrame(frame);
    }

    // ---------- Wire up ----------
    var stage = document.querySelector('.stage');
    stage.addEventListener('touchstart', onTap, { passive: false });
    stage.addEventListener('mousedown', onTap);
    window.addEventListener('keydown', function (e) {
      if (e.key === ' ' || e.key === 'ArrowUp') { e.preventDefault(); onTap(); }
    });

    document.getElementById('playAgainBtn').addEventListener('click', function (e) {
      e.stopPropagation();
      document.getElementById('overOverlay').classList.add('hidden');
      newGame();
      state = STATE.PLAYING;
      lastTs = 0;
    });
    document.getElementById('refreshBtn').addEventListener('click', function () { location.reload(); });

    // ----- Speed (Chill/Normal/Fast/Zoom): chosen in the pause menu, remembered -----
    var speedPick = document.getElementById('speedPick');
    var speedBtns = document.querySelectorAll('.speedpick button');
    function updateSpeedPick() {
      for (var i = 0; i < speedBtns.length; i++) speedBtns[i].className = (+speedBtns[i].getAttribute('data-idx') === speedIdx) ? 'sel' : '';
    }
    function applySpeed(idx, scaleLive) {
      var oldMult = speedMult;
      speedIdx = idx;
      speedMult = SPEED_LEVELS[idx].m;
      try { localStorage.setItem('ch_speed', String(idx)); } catch (e) {}
      computeTunables();
      if (scaleLive && speed) speed = Math.min(SPEEDMAX, speed * (speedMult / oldMult));
      updateSpeedPick();
    }
    (function initSpeed() {
      var saved = null;
      try { saved = localStorage.getItem('ch_speed'); } catch (e) {}
      var idx = (saved !== null && SPEED_LEVELS[+saved]) ? +saved : 0;
      speedIdx = idx; speedMult = SPEED_LEVELS[idx].m;
      updateSpeedPick();
    })();
    for (var _i = 0; _i < speedBtns.length; _i++) {
      (function (b) {
        b.addEventListener('click', function (e) { e.stopPropagation(); applySpeed(+b.getAttribute('data-idx'), true); });
      })(speedBtns[_i]);
    }

    // ----- Pause / resume -----
    function pauseGame() {
      if (state !== STATE.PLAYING) return;
      state = STATE.PAUSED;
      updateSpeedPick();
      document.getElementById('pauseOverlay').classList.remove('hidden');
    }
    function resumeGame() {
      if (state !== STATE.PAUSED) return;
      document.getElementById('pauseOverlay').classList.add('hidden');
      state = STATE.PLAYING;
      lastTs = 0;
    }
    document.getElementById('pauseBtn').addEventListener('click', function (e) {
      e.stopPropagation();
      if (state === STATE.PLAYING) pauseGame(); else if (state === STATE.PAUSED) resumeGame();
    });
    document.getElementById('resumeBtn').addEventListener('click', function (e) { e.stopPropagation(); resumeGame(); });

    window.addEventListener('resize', resize);
    window.addEventListener('orientationchange', function () { setTimeout(resize, 150); });
    document.addEventListener('visibilitychange', function () { if (!document.hidden) lastTs = 0; });
    // Block page scroll/rubber-band during play (single- or multi-finger). The game
    // is full-screen and never scrolls; taps use touchstart.
    document.addEventListener('touchmove', function (e) { e.preventDefault(); }, { passive: false });
    document.addEventListener('gesturestart', function (e) { e.preventDefault(); });

    // Keep links inside the iOS home-screen (standalone) app on OLD iOS (<13) only.
    var _iosMajor = +((navigator.userAgent.match(/ OS (\d+)_/) || [])[1] || 0);
    if (navigator.standalone && _iosMajor > 0 && _iosMajor < 13) {
      document.addEventListener('click', function (e) {
        var n = e.target;
        while (n && n.nodeName !== 'A') n = n.parentNode;
        if (n && n.getAttribute('href') && n.getAttribute('target') !== '_blank') {
          e.preventDefault();
          location.href = n.getAttribute('href');
        }
      }, false);
    }

    // ---------- Boot ----------
    resize();
    newGame();
    requestAnimationFrame(frame);
  })();
  </script>
  <script>
    // Register the offline service worker (progressive enhancement; no-op where unsupported).
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('/sw.js').catch(function () {});
      });
    }
  </script>
</body>
