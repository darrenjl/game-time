<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#1a1f2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Doodle">
  <link rel="apple-touch-icon" href="../apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="512x512" href="../icon-512.png">
  <title>Doodle</title>
  <style>
    :root { --ink: #eef2ff; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; overscroll-behavior: none; touch-action: none; -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; }
    body { display: flex; flex-direction: column; height: 100vh; height: 100dvh; font-family: "Trebuchet MS", "Segoe UI", system-ui, sans-serif; color: var(--ink); background: #1a1f2e; }
    .topbar { flex: 0 0 auto; display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: max(10px, env(safe-area-inset-top)) 14px 8px; background: #1a1f2e; }
    .back { display: inline-flex; align-items: center; gap: 6px; min-height: 44px; padding: 8px 14px; border-radius: 999px; font-size: 1rem; font-weight: 700; text-decoration: none; color: var(--ink); background: rgba(124,140,255,0.2); border: 2px solid rgba(124,140,255,0.5); }
    .back:active { transform: scale(0.95); }
    .title { font-size: 1.2rem; font-size: clamp(1rem, 4.5vw, 1.5rem); font-weight: 800; color: #fff; }
    .rightbtns { display: flex; } .rightbtns > * + * { margin-left: 8px; }
    .refresh, .clear { -webkit-appearance: none; appearance: none; min-width: 44px; min-height: 44px; padding: 8px 12px; border-radius: 999px; font-size: 1.15rem; line-height: 1; cursor: pointer; color: var(--ink); background: rgba(124,140,255,0.2); border: 2px solid rgba(124,140,255,0.5); }
    .refresh:active, .clear:active { transform: scale(0.95); }
    .stage { flex: 1 1 auto; position: relative; min-height: 0; display: flex; align-items: stretch; justify-content: center; }
    canvas { display: block; width: 100%; height: 100%; touch-action: none; }
    .overlay { position: absolute; top: 0; right: 0; bottom: 0; left: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 24px; background: rgba(10, 14, 24, 0.66); -webkit-backdrop-filter: blur(3px); backdrop-filter: blur(3px); z-index: 5; }
    .overlay > * + * { margin-top: 16px; } .overlay.hidden { display: none; }
    .overlay h2 { font-size: 2rem; font-size: clamp(1.6rem, 7vw, 2.8rem); color: #fff; }
    .overlay p { font-size: 1.05rem; font-size: clamp(0.95rem, 4vw, 1.2rem); color: rgba(238,242,255,0.9); max-width: 26ch; }
    .tap-hint { font-size: clamp(2.4rem, 12vw, 4rem); animation: bob 1s ease-in-out infinite; }
    @keyframes bob { 0%,100% { transform: translateY(0);} 50% { transform: translateY(-10px);} }
  </style>
</head>
<body>
  <div class="topbar">
    <a class="back" href="../index.html">⬅️ Back</a>
    <div class="title">🎨 Doodle</div>
    <div class="rightbtns">
      <button class="clear" id="undoBtn" aria-label="Undo">↩️</button>
      <button class="clear" id="clearBtn" aria-label="Clear drawing">🗑️</button>
      <button class="refresh" id="refreshBtn" aria-label="Refresh">🔄</button>
    </div>
  </div>
  <div class="stage">
    <canvas id="game"></canvas>
    <div class="overlay" id="startOverlay">
      <h2>🎨 Doodle</h2>
      <p>A blank page for Oisín &amp; Finley!</p>
      <div class="tap-hint">👆</div>
      <p><b>Drag your finger to draw.</b> Pick a colour and brush size below. ↩️ undo, 🗑️ clear.</p>
    </div>
  </div>

  <script>
  (function () {
    'use strict';
    var canvas = document.getElementById('game');
    var ctx = canvas.getContext('2d');
    var W = 0, H = 0, dpr = 1, started = false;

    // artwork buffer (device pixels) so UI redraws don't erase the drawing
    var buffer = document.createElement('canvas');
    var bctx = buffer.getContext('2d');

    var COLORS = ['#ff5d5d', '#ff9f2e', '#ffd23f', '#5fd07f', '#4fa8ff', '#b79bff', '#ff7eb6', '#2a2a33'];
    var BRUSH = [0.55, 1.0, 1.9];   // small / medium / large brush multipliers
    var brushIdx = 1;
    var slots = [];            // palette hit areas (colours + eraser + sizes)
    var selected = 0;          // index into COLORS, or 'eraser'
    var eraser = false;
    var paletteY = 0, PB = 0;
    var drawing = false, lastX = 0, lastY = 0;
    var history = [];          // undo snapshots (buffer copies)

    function resize() {
      var rect = canvas.parentNode.getBoundingClientRect();
      var nW = Math.max(200, Math.floor(rect.width)), nH = Math.max(200, Math.floor(rect.height));
      dpr = window.devicePixelRatio || 1;
      // preserve existing art by copying the old buffer scaled into the new one
      var old = null;
      if (W && H) { old = document.createElement('canvas'); old.width = buffer.width; old.height = buffer.height; old.getContext('2d').drawImage(buffer, 0, 0); }
      W = nW; H = nH;
      canvas.width = Math.round(W * dpr); canvas.height = Math.round(H * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      buffer.width = Math.round(W * dpr); buffer.height = Math.round(H * dpr);
      bctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      bctx.lineCap = 'round'; bctx.lineJoin = 'round';
      if (old) bctx.drawImage(old, 0, 0, old.width, old.height, 0, 0, W, H);
      PB = Math.max(64, Math.min(H * 0.13, W * 0.13));
      paletteY = H - PB;
      layoutSlots();
      history = [];   // snapshots are tied to the old buffer size
      render();
    }

    function layoutSlots() {
      slots = [];
      var n = COLORS.length + 1 + BRUSH.length;  // colours + eraser + sizes
      var pad = W * 0.02, gap = W * 0.012;
      var sw = (W - pad * 2 - gap * (n - 1)) / n;
      var sh = Math.min(PB * 0.72, sw);
      var sy = paletteY + (PB - sh) / 2;
      var k = 0, x, i;
      for (i = 0; i < COLORS.length; i++) { x = pad + k * (sw + gap); slots.push({ kind: 'color', idx: i, x: x, y: sy, w: sw, h: sh }); k++; }
      x = pad + k * (sw + gap); slots.push({ kind: 'eraser', x: x, y: sy, w: sw, h: sh }); k++;
      for (i = 0; i < BRUSH.length; i++) { x = pad + k * (sw + gap); slots.push({ kind: 'size', idx: i, x: x, y: sy, w: sw, h: sh }); k++; }
    }

    function brushW() { return Math.max(3, H * 0.014) * BRUSH[brushIdx]; }

    function pushHistory() {
      var c = document.createElement('canvas'); c.width = buffer.width; c.height = buffer.height;
      c.getContext('2d').drawImage(buffer, 0, 0);
      history.push(c); if (history.length > 15) history.shift();
    }
    function undo() {
      if (!history.length) return;
      var c = history.pop();
      bctx.save(); bctx.setTransform(1, 0, 0, 1, 0, 0);
      bctx.clearRect(0, 0, buffer.width, buffer.height);
      bctx.drawImage(c, 0, 0); bctx.restore();
      render();
    }

    // ---------- Input ----------
    function pointFromEvent(e) {
      var rect = canvas.getBoundingClientRect();
      var src = (e.touches && e.touches[0]) || (e.changedTouches && e.changedTouches[0]) || e;
      return { x: src.clientX - rect.left, y: src.clientY - rect.top };
    }
    function hitPalette(p) {
      if (p.y < paletteY) return null;
      for (var i = 0; i < slots.length; i++) { var s = slots[i]; if (p.x >= s.x - 4 && p.x <= s.x + s.w + 4) return s; }
      return null;
    }
    function onDown(e) {
      if (e && e.target && e.target.closest && e.target.closest('button, a')) return;
      if (e) e.preventDefault();
      if (!started) { started = true; document.getElementById('startOverlay').classList.add('hidden'); render(); return; }
      var p = pointFromEvent(e);
      var s = hitPalette(p);
      if (s) {
        if (s.kind === 'color') { selected = s.idx; eraser = false; }
        else if (s.kind === 'eraser') { eraser = true; }
        else { brushIdx = s.idx; }
        render();
        return;
      }
      if (p.y < paletteY) { pushHistory(); drawing = true; lastX = p.x; lastY = p.y; dab(p.x, p.y); render(); }
    }
    function dab(x, y) {
      // a single dot so a tap leaves a mark
      bctx.globalCompositeOperation = eraser ? 'destination-out' : 'source-over';
      bctx.fillStyle = eraser ? '#000' : COLORS[selected];
      bctx.beginPath(); bctx.arc(x, y, (eraser ? brushW() * 2.2 : brushW()) / 2, 0, Math.PI * 2); bctx.fill();
    }
    function onMove(e) {
      if (!drawing) return;
      if (e) e.preventDefault();
      var p = pointFromEvent(e);
      var y = Math.min(p.y, paletteY - 1);
      bctx.globalCompositeOperation = eraser ? 'destination-out' : 'source-over';
      bctx.strokeStyle = eraser ? '#000' : COLORS[selected];
      bctx.lineWidth = eraser ? brushW() * 2.4 : brushW();
      bctx.beginPath(); bctx.moveTo(lastX, lastY); bctx.lineTo(p.x, y); bctx.stroke();
      lastX = p.x; lastY = y;
      render();
    }
    function onUp() { drawing = false; bctx.globalCompositeOperation = 'source-over'; }

    function clearArt() { pushHistory(); bctx.save(); bctx.setTransform(1, 0, 0, 1, 0, 0); bctx.clearRect(0, 0, buffer.width, buffer.height); bctx.restore(); render(); }

    // ---------- Draw ----------
    function roundRect(c, x, y, w, h, r) { c.beginPath(); c.moveTo(x + r, y); c.arcTo(x + w, y, x + w, y + h, r); c.arcTo(x + w, y + h, x, y + h, r); c.arcTo(x, y + h, x, y, r); c.arcTo(x, y, x + w, y, r); c.closePath(); }

    function render() {
      // paper
      var g = ctx.createLinearGradient(0, 0, 0, paletteY);
      g.addColorStop(0, '#fffdf6'); g.addColorStop(1, '#f2ede0');
      ctx.fillStyle = g; ctx.fillRect(0, 0, W, paletteY);
      // artwork
      ctx.drawImage(buffer, 0, 0, buffer.width, buffer.height, 0, 0, W, H);
      // palette strip
      ctx.fillStyle = '#1a1f2e'; ctx.fillRect(0, paletteY, W, PB);
      for (var i = 0; i < slots.length; i++) {
        var s = slots[i];
        var isSel = (s.kind === 'color' && !eraser && s.idx === selected) || (s.kind === 'eraser' && eraser) || (s.kind === 'size' && s.idx === brushIdx);
        if (s.kind === 'color') { ctx.fillStyle = COLORS[s.idx]; roundRect(ctx, s.x, s.y, s.w, s.h, s.w * 0.22); ctx.fill(); }
        else if (s.kind === 'eraser') {
          ctx.fillStyle = '#fff'; roundRect(ctx, s.x, s.y, s.w, s.h, s.w * 0.22); ctx.fill();
          ctx.fillStyle = '#ff9fc0'; roundRect(ctx, s.x + s.w * 0.16, s.y + s.h * 0.5, s.w * 0.68, s.h * 0.38, s.w * 0.1); ctx.fill();
        } else {
          ctx.fillStyle = '#33384a'; roundRect(ctx, s.x, s.y, s.w, s.h, s.w * 0.22); ctx.fill();
          ctx.fillStyle = '#fff'; var dr = s.w * (0.13 + 0.11 * s.idx);
          ctx.beginPath(); ctx.arc(s.x + s.w / 2, s.y + s.h / 2, dr, 0, Math.PI * 2); ctx.fill();
        }
        if (isSel) { ctx.strokeStyle = '#ffd166'; ctx.lineWidth = Math.max(3, s.w * 0.09); roundRect(ctx, s.x - 3, s.y - 3, s.w + 6, s.h + 6, s.w * 0.24); ctx.stroke(); }
        else { ctx.strokeStyle = 'rgba(255,255,255,0.25)'; ctx.lineWidth = 2; roundRect(ctx, s.x, s.y, s.w, s.h, s.w * 0.22); ctx.stroke(); }
      }
    }

    // ---------- Wire up ----------
    var stage = document.querySelector('.stage');
    stage.addEventListener('touchstart', onDown, { passive: false });
    stage.addEventListener('touchmove', onMove, { passive: false });
    stage.addEventListener('touchend', onUp);
    stage.addEventListener('mousedown', onDown);
    stage.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);

    document.getElementById('undoBtn').addEventListener('click', function (e) { e.stopPropagation(); undo(); });
    document.getElementById('clearBtn').addEventListener('click', function (e) { e.stopPropagation(); clearArt(); });
    document.getElementById('refreshBtn').addEventListener('click', function () { location.reload(); });

    window.addEventListener('resize', resize);
    window.addEventListener('orientationchange', function () { setTimeout(resize, 150); });
    document.addEventListener('touchmove', function (e) { e.preventDefault(); }, { passive: false });
    document.addEventListener('gesturestart', function (e) { e.preventDefault(); });
    var _iosMajor = +((navigator.userAgent.match(/ OS (\d+)_/) || [])[1] || 0);
    if (navigator.standalone && _iosMajor > 0 && _iosMajor < 13) {
      document.addEventListener('click', function (e) { var n = e.target; while (n && n.nodeName !== 'A') n = n.parentNode; if (n && n.getAttribute('href') && n.getAttribute('target') !== '_blank') { e.preventDefault(); location.href = n.getAttribute('href'); } }, false);
    }
    resize();
  })();
  </script>
</body>
</html>
