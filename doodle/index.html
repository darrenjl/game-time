<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#1a1f2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Doodle">
  <link rel="apple-touch-icon" href="../apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="512x512" href="../icon-512.png">
  <title>Doodle</title>
  <style>
    :root { --ink: #eef2ff; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; overscroll-behavior: none; touch-action: none; -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; }
    body { display: flex; flex-direction: column; height: 100vh; height: 100dvh; font-family: "Trebuchet MS", "Segoe UI", system-ui, sans-serif; color: var(--ink); background: #1a1f2e; }
    .topbar { flex: 0 0 auto; display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: max(10px, env(safe-area-inset-top)) 14px 8px; background: #1a1f2e; }
    .back { display: inline-flex; align-items: center; gap: 6px; min-height: 44px; padding: 8px 14px; border-radius: 999px; font-size: 1rem; font-weight: 700; text-decoration: none; color: var(--ink); background: rgba(124,140,255,0.2); border: 2px solid rgba(124,140,255,0.5); }
    .back:active { transform: scale(0.95); }
    .title { font-size: 1.2rem; font-size: clamp(1rem, 4.5vw, 1.5rem); font-weight: 800; color: #fff; }
    .rightbtns { display: flex; } .rightbtns > * + * { margin-left: 8px; }
    .refresh, .clear { -webkit-appearance: none; appearance: none; min-width: 44px; min-height: 44px; padding: 8px 12px; border-radius: 999px; font-size: 1.15rem; line-height: 1; cursor: pointer; color: var(--ink); background: rgba(124,140,255,0.2); border: 2px solid rgba(124,140,255,0.5); }
    .refresh:active, .clear:active { transform: scale(0.95); }
    .stage { flex: 1 1 auto; position: relative; min-height: 0; display: flex; align-items: stretch; justify-content: center; }
    canvas { display: block; width: 100%; height: 100%; touch-action: none; }
    .overlay { position: absolute; top: 0; right: 0; bottom: 0; left: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 24px; background: rgba(10, 14, 24, 0.66); -webkit-backdrop-filter: blur(3px); backdrop-filter: blur(3px); z-index: 5; }
    .overlay > * + * { margin-top: 16px; } .overlay.hidden { display: none; }
    .overlay h2 { font-size: 2rem; font-size: clamp(1.6rem, 7vw, 2.8rem); color: #fff; }
    .overlay p { font-size: 1.05rem; font-size: clamp(0.95rem, 4vw, 1.2rem); color: rgba(238,242,255,0.9); max-width: 26ch; }
    .tap-hint { font-size: clamp(2.4rem, 12vw, 4rem); animation: bob 1s ease-in-out infinite; }
    @keyframes bob { 0%,100% { transform: translateY(0);} 50% { transform: translateY(-10px);} }
  </style>
</head>
<body>
  <div class="topbar">
    <a class="back" href="../index.html">⬅️ Back</a>
    <div class="title">🎨 Doodle</div>
    <div class="rightbtns">
      <button class="clear" id="undoBtn" aria-label="Undo">↩️</button>
      <button class="clear" id="clearBtn" aria-label="Clear drawing">🗑️</button>
      <button class="refresh" id="refreshBtn" aria-label="Refresh">🔄</button>
    </div>
  </div>
  <div class="stage">
    <canvas id="game"></canvas>
    <div class="overlay" id="startOverlay">
      <h2>🎨 Doodle</h2>
      <p>A blank page for Oisín &amp; Finley!</p>
      <div class="tap-hint">👆</div>
      <p><b>Drag your finger to draw.</b> Pick a colour, brush &amp; size. Bottom row sets the page colour. ↩️ undo, 🗑️ clear.</p>
    </div>
  </div>

  <script>
  (function () {
    'use strict';
    var canvas = document.getElementById('game');
    var ctx = canvas.getContext('2d');
    var W = 0, H = 0, dpr = 1, started = false;

    // artwork buffer (device pixels) so UI redraws don't erase the drawing.
    // The buffer is transparent, so changing the page background never touches it.
    var buffer = document.createElement('canvas');
    var bctx = buffer.getContext('2d');

    var COLORS = ['#ff5d5d', '#ff9f2e', '#ffd23f', '#5fd07f', '#4fa8ff', '#b79bff', '#ff7eb6', '#ffffff', '#2a2a33'];
    var SIZES = [0.4, 0.7, 1.0, 1.6, 2.6];               // small -> very large
    var BRUSHES = ['round', 'marker', 'crayon', 'spray', 'rainbow'];
    var BGS = ['paper', '#ffffff', '#dceeff', '#e4fbe8', '#ffe4f0', '#20242e'];   // 'paper' = default cream gradient

    var sizeIdx = 2;           // index into SIZES
    var brushType = 0;         // index into BRUSHES
    var bgIdx = 0;             // index into BGS
    var selected = 0;          // index into COLORS
    var eraser = false;
    var rainbowHue = 0;        // advances along a rainbow stroke

    var PALROWS = 3;
    var slots = [];            // palette hit areas across 3 rows
    var paletteY = 0, PB = 0;  // PB = height of ONE palette row
    var drawing = false, lastX = 0, lastY = 0;
    var needsRender = false;   // dirty flag: render once per frame, not per touch event
    var paperGrad = null;      // cached paper gradient (rebuilt on resize)

    // Undo snapshots reuse a small fixed pool of canvases instead of allocating a
    // fresh full-resolution canvas per stroke — that churn was thrashing GC and
    // stalling low-RAM devices (iPad mini 2) the longer the kids drew.
    var HIST_MAX = 6;
    var history = [];          // stack of snapshot canvases
    var freePool = [];         // recycled snapshot canvases

    function resize() {
      var rect = canvas.parentNode.getBoundingClientRect();
      var nW = Math.max(200, Math.floor(rect.width)), nH = Math.max(200, Math.floor(rect.height));
      dpr = window.devicePixelRatio || 1;
      // preserve existing art by copying the old buffer scaled into the new one
      var old = null;
      if (W && H) { old = document.createElement('canvas'); old.width = buffer.width; old.height = buffer.height; old.getContext('2d').drawImage(buffer, 0, 0); }
      W = nW; H = nH;
      canvas.width = Math.round(W * dpr); canvas.height = Math.round(H * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      buffer.width = Math.round(W * dpr); buffer.height = Math.round(H * dpr);
      bctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      bctx.lineCap = 'round'; bctx.lineJoin = 'round';
      if (old) bctx.drawImage(old, 0, 0, old.width, old.height, 0, 0, W, H);
      PB = Math.max(52, Math.min(H * 0.1, W * 0.11, 92));
      paletteY = H - PALROWS * PB;
      paperGrad = ctx.createLinearGradient(0, 0, 0, paletteY);
      paperGrad.addColorStop(0, '#fffdf6'); paperGrad.addColorStop(1, '#f2ede0');
      layoutSlots();
      history = []; freePool = [];   // snapshots are tied to the old buffer size
      needsRender = true;
    }

    function layoutSlots() {
      slots = [];
      var rows = [[], [], []], i;
      for (i = 0; i < COLORS.length; i++) rows[0].push({ kind: 'color', idx: i });
      rows[0].push({ kind: 'eraser' });
      for (i = 0; i < BRUSHES.length; i++) rows[1].push({ kind: 'brush', idx: i });
      for (i = 0; i < SIZES.length; i++) rows[1].push({ kind: 'size', idx: i });
      for (i = 0; i < BGS.length; i++) rows[2].push({ kind: 'bg', idx: i });
      var pad = W * 0.02, gap = W * 0.012, r, n, sw, sh, rowTop, sy, s;
      for (r = 0; r < rows.length; r++) {
        n = rows[r].length;
        sw = (W - pad * 2 - gap * (n - 1)) / n;
        sh = Math.min(PB * 0.72, sw);
        rowTop = paletteY + r * PB;
        sy = rowTop + (PB - sh) / 2;
        for (i = 0; i < n; i++) {
          s = rows[r][i]; s.x = pad + i * (sw + gap); s.y = sy; s.w = sw; s.h = sh; s.row = r;
          slots.push(s);
        }
      }
    }

    function brushW() { return Math.max(3, H * 0.014) * SIZES[sizeIdx]; }

    // ---------- Undo history ----------
    function pushHistory() {
      var c = freePool.pop();
      if (!c) c = document.createElement('canvas');
      if (c.width !== buffer.width || c.height !== buffer.height) { c.width = buffer.width; c.height = buffer.height; }
      var cc = c.getContext('2d');
      cc.setTransform(1, 0, 0, 1, 0, 0);
      cc.clearRect(0, 0, c.width, c.height);
      cc.drawImage(buffer, 0, 0);
      history.push(c);
      while (history.length > HIST_MAX) freePool.push(history.shift());   // recycle, don't discard
    }
    function undo() {
      if (!history.length) return;
      var c = history.pop();
      bctx.save(); bctx.setTransform(1, 0, 0, 1, 0, 0);
      bctx.clearRect(0, 0, buffer.width, buffer.height);
      bctx.drawImage(c, 0, 0); bctx.restore();
      freePool.push(c);
      needsRender = true;
    }

    // ---------- Painting (all effects drawn straight onto the buffer) ----------
    function strokeLine(x0, y0, x1, y1, lw) {
      bctx.lineWidth = lw;
      bctx.beginPath(); bctx.moveTo(x0, y0); bctx.lineTo(x1, y1); bctx.stroke();
      if (x0 === x1 && y0 === y1) { bctx.fillStyle = bctx.strokeStyle; bctx.beginPath(); bctx.arc(x0, y0, lw / 2, 0, Math.PI * 2); bctx.fill(); }
    }
    function stampAlong(x0, y0, x1, y1, w, col, kind) {
      var dx = x1 - x0, dy = y1 - y0, dist = Math.sqrt(dx * dx + dy * dy);
      var step = Math.max(1, w * 0.35), n = Math.min(48, Math.floor(dist / step) + 1);
      bctx.fillStyle = col;
      for (var i = 0; i < n; i++) {
        var t = n > 1 ? i / (n - 1) : 0, px = x0 + dx * t, py = y0 + dy * t, j, a, rr;
        if (kind === 'crayon') {
          bctx.globalAlpha = 0.5;
          for (j = 0; j < 5; j++) { a = Math.random() * Math.PI * 2; rr = Math.random() * w * 0.5; bctx.beginPath(); bctx.arc(px + Math.cos(a) * rr, py + Math.sin(a) * rr, Math.max(0.7, w * 0.12), 0, Math.PI * 2); bctx.fill(); }
        } else {   // spray
          bctx.globalAlpha = 0.8;
          for (j = 0; j < 8; j++) { a = Math.random() * Math.PI * 2; rr = Math.random() * w * 0.9; bctx.beginPath(); bctx.arc(px + Math.cos(a) * rr, py + Math.sin(a) * rr, Math.max(0.6, w * 0.07), 0, Math.PI * 2); bctx.fill(); }
        }
      }
      bctx.globalAlpha = 1;
    }
    function paintSegment(x0, y0, x1, y1) {
      var w = brushW();
      if (eraser) { bctx.globalAlpha = 1; bctx.globalCompositeOperation = 'destination-out'; bctx.strokeStyle = '#000'; strokeLine(x0, y0, x1, y1, w * 2.4); return; }
      bctx.globalCompositeOperation = 'source-over';
      var t = BRUSHES[brushType], col = COLORS[selected];
      if (t === 'marker') { bctx.globalAlpha = 0.5; bctx.strokeStyle = col; strokeLine(x0, y0, x1, y1, w * 1.5); bctx.globalAlpha = 1; }
      else if (t === 'rainbow') { bctx.globalAlpha = 1; bctx.strokeStyle = 'hsl(' + (rainbowHue % 360) + ',90%,55%)'; strokeLine(x0, y0, x1, y1, w); rainbowHue += 8; }
      else if (t === 'crayon') { stampAlong(x0, y0, x1, y1, w, col, 'crayon'); }
      else if (t === 'spray') { stampAlong(x0, y0, x1, y1, w, col, 'spray'); }
      else { bctx.globalAlpha = 1; bctx.strokeStyle = col; strokeLine(x0, y0, x1, y1, w); }
    }
    function dab(x, y) { paintSegment(x, y, x, y); }

    // ---------- Input ----------
    function pointFromEvent(e) {
      var rect = canvas.getBoundingClientRect();
      var src = (e.touches && e.touches[0]) || (e.changedTouches && e.changedTouches[0]) || e;
      return { x: src.clientX - rect.left, y: src.clientY - rect.top };
    }
    function hitPalette(p) {
      if (p.y < paletteY) return null;
      var r = Math.floor((p.y - paletteY) / PB);
      if (r < 0) r = 0; if (r > PALROWS - 1) r = PALROWS - 1;
      var best = null, bestd = Infinity;   // whole row band is tappable — big targets for little fingers
      for (var i = 0; i < slots.length; i++) {
        var s = slots[i]; if (s.row !== r) continue;
        var d = Math.abs(p.x - (s.x + s.w / 2));
        if (d < bestd) { bestd = d; best = s; }
      }
      return best;
    }
    function onDown(e) {
      if (e && e.target && e.target.closest && e.target.closest('button, a')) return;
      if (e) e.preventDefault();
      if (!started) { started = true; document.getElementById('startOverlay').classList.add('hidden'); needsRender = true; return; }
      var p = pointFromEvent(e);
      var s = hitPalette(p);
      if (s) {
        if (s.kind === 'color') { selected = s.idx; eraser = false; }
        else if (s.kind === 'eraser') { eraser = true; }
        else if (s.kind === 'brush') { brushType = s.idx; eraser = false; }
        else if (s.kind === 'size') { sizeIdx = s.idx; }
        else if (s.kind === 'bg') { bgIdx = s.idx; }
        needsRender = true;
        return;
      }
      if (p.y < paletteY) { pushHistory(); drawing = true; lastX = p.x; lastY = p.y; dab(p.x, p.y); needsRender = true; }
    }
    function onMove(e) {
      if (!drawing) return;
      if (e) e.preventDefault();
      var p = pointFromEvent(e);
      var y = Math.min(p.y, paletteY - 1);
      paintSegment(lastX, lastY, p.x, y);
      lastX = p.x; lastY = y;
      needsRender = true;
    }
    function onUp() { drawing = false; bctx.globalCompositeOperation = 'source-over'; bctx.globalAlpha = 1; }

    function clearArt() { pushHistory(); bctx.save(); bctx.setTransform(1, 0, 0, 1, 0, 0); bctx.clearRect(0, 0, buffer.width, buffer.height); bctx.restore(); needsRender = true; }

    // ---------- Draw ----------
    function roundRect(c, x, y, w, h, r) { c.beginPath(); c.moveTo(x + r, y); c.arcTo(x + w, y, x + w, y + h, r); c.arcTo(x + w, y + h, x, y + h, r); c.arcTo(x, y + h, x, y, r); c.arcTo(x, y, x + w, y, r); c.closePath(); }
    function dot(x, y, r) { ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill(); }

    function drawBrushIcon(s, cx, cy, previewCol) {
      var t = BRUSHES[s.idx], base = Math.min(s.w, s.h);
      if (t === 'round') { ctx.fillStyle = previewCol; dot(cx, cy, base * 0.24); }
      else if (t === 'marker') { ctx.globalAlpha = 0.55; ctx.fillStyle = previewCol; roundRect(ctx, cx - base * 0.3, cy - base * 0.14, base * 0.6, base * 0.28, base * 0.1); ctx.fill(); ctx.globalAlpha = 1; }
      else if (t === 'crayon') { ctx.fillStyle = previewCol; ctx.globalAlpha = 0.55; for (var k = 0; k < 9; k++) { var a = k / 9 * Math.PI * 2, rr = base * 0.16 * (k % 2 ? 1.4 : 0.7); dot(cx + Math.cos(a) * rr, cy + Math.sin(a) * rr, base * 0.05); } ctx.globalAlpha = 1; }
      else if (t === 'spray') { ctx.fillStyle = previewCol; ctx.globalAlpha = 0.8; for (var m = 0; m < 12; m++) { var a2 = Math.random() * Math.PI * 2, r2 = Math.random() * base * 0.28; dot(cx + Math.cos(a2) * r2, cy + Math.sin(a2) * r2, base * 0.035); } ctx.globalAlpha = 1; }
      else { for (var h = 0; h < 6; h++) { var a3 = h / 6 * Math.PI * 2; ctx.fillStyle = 'hsl(' + (h * 60) + ',90%,58%)'; dot(cx + Math.cos(a3) * base * 0.16, cy + Math.sin(a3) * base * 0.16, base * 0.07); } }
    }

    function render() {
      // page background (default 'paper' gradient, or a chosen solid colour)
      ctx.fillStyle = (BGS[bgIdx] === 'paper') ? paperGrad : BGS[bgIdx];
      ctx.fillRect(0, 0, W, paletteY);
      // artwork (transparent buffer painted on top — background changes never erase it)
      ctx.drawImage(buffer, 0, 0, buffer.width, buffer.height, 0, 0, W, H);
      // palette strip (3 rows)
      ctx.fillStyle = '#1a1f2e'; ctx.fillRect(0, paletteY, W, PALROWS * PB);
      var previewCol = eraser ? '#fff' : COLORS[selected];
      for (var i = 0; i < slots.length; i++) {
        var s = slots[i], cx = s.x + s.w / 2, cy = s.y + s.h / 2;
        var isSel = (s.kind === 'color' && !eraser && s.idx === selected) || (s.kind === 'eraser' && eraser) ||
                    (s.kind === 'brush' && !eraser && s.idx === brushType) || (s.kind === 'size' && s.idx === sizeIdx) ||
                    (s.kind === 'bg' && s.idx === bgIdx);
        if (s.kind === 'color') {
          ctx.fillStyle = COLORS[s.idx]; dot(cx, cy, Math.min(s.w, s.h) * 0.45);
          ctx.strokeStyle = 'rgba(0,0,0,0.28)'; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(cx, cy, Math.min(s.w, s.h) * 0.45, 0, Math.PI * 2); ctx.stroke();
        } else if (s.kind === 'eraser') {
          ctx.fillStyle = '#fff'; roundRect(ctx, s.x, s.y, s.w, s.h, s.w * 0.22); ctx.fill();
          ctx.fillStyle = '#ff9fc0'; roundRect(ctx, s.x + s.w * 0.16, s.y + s.h * 0.5, s.w * 0.68, s.h * 0.38, s.w * 0.1); ctx.fill();
        } else if (s.kind === 'brush') {
          ctx.fillStyle = '#33384a'; roundRect(ctx, s.x, s.y, s.w, s.h, s.w * 0.22); ctx.fill();
          drawBrushIcon(s, cx, cy, previewCol);
        } else if (s.kind === 'size') {
          ctx.fillStyle = '#33384a'; roundRect(ctx, s.x, s.y, s.w, s.h, s.w * 0.22); ctx.fill();
          ctx.fillStyle = '#fff'; dot(cx, cy, Math.min(s.h * 0.42, s.w * (0.12 + 0.07 * s.idx)));
        } else {   // background swatch — a framed square, visually distinct from the round brush colours
          var bcol = (BGS[s.idx] === 'paper') ? '#f5efe0' : BGS[s.idx];
          ctx.fillStyle = '#0d1018'; roundRect(ctx, s.x, s.y, s.w, s.h, s.w * 0.14); ctx.fill();
          ctx.fillStyle = bcol; roundRect(ctx, s.x + s.w * 0.14, s.y + s.h * 0.14, s.w * 0.72, s.h * 0.72, s.w * 0.08); ctx.fill();
          ctx.strokeStyle = 'rgba(255,255,255,0.35)'; ctx.lineWidth = 2; roundRect(ctx, s.x + s.w * 0.14, s.y + s.h * 0.14, s.w * 0.72, s.h * 0.72, s.w * 0.08); ctx.stroke();
        }
        if (isSel) { ctx.strokeStyle = '#ffd166'; ctx.lineWidth = Math.max(3, s.w * 0.09); roundRect(ctx, s.x - 3, s.y - 3, s.w + 6, s.h + 6, s.w * 0.24); ctx.stroke(); }
        else if (s.kind !== 'color') { ctx.strokeStyle = 'rgba(255,255,255,0.25)'; ctx.lineWidth = 2; roundRect(ctx, s.x, s.y, s.w, s.h, s.w * 0.2); ctx.stroke(); }
      }
    }

    // ---------- Wire up ----------
    var stage = document.querySelector('.stage');
    stage.addEventListener('touchstart', onDown, { passive: false });
    stage.addEventListener('touchmove', onMove, { passive: false });
    stage.addEventListener('touchend', onUp);
    stage.addEventListener('mousedown', onDown);
    stage.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);

    document.getElementById('undoBtn').addEventListener('click', function (e) { e.stopPropagation(); undo(); });
    document.getElementById('clearBtn').addEventListener('click', function (e) { e.stopPropagation(); clearArt(); });
    document.getElementById('refreshBtn').addEventListener('click', function () { location.reload(); });

    window.addEventListener('resize', resize);
    window.addEventListener('orientationchange', function () { setTimeout(resize, 150); });
    document.addEventListener('touchmove', function (e) { e.preventDefault(); }, { passive: false });
    document.addEventListener('gesturestart', function (e) { e.preventDefault(); });
    var _iosMajor = +((navigator.userAgent.match(/ OS (\d+)_/) || [])[1] || 0);
    if (navigator.standalone && _iosMajor > 0 && _iosMajor < 13) {
      document.addEventListener('click', function (e) { var n = e.target; while (n && n.nodeName !== 'A') n = n.parentNode; if (n && n.getAttribute('href') && n.getAttribute('target') !== '_blank') { e.preventDefault(); location.href = n.getAttribute('href'); } }, false);
    }
    // Render on a rAF loop driven by a dirty flag, so a fast finger drag can't
    // pile up synchronous full-canvas redraws and freeze weak devices (iPad mini 2).
    function frame() {
      if (needsRender) { needsRender = false; render(); }
      requestAnimationFrame(frame);
    }
    document.addEventListener('visibilitychange', function () { if (!document.hidden) needsRender = true; });

    resize();
    requestAnimationFrame(frame);
  })();
  </script>
  <script>
    // Register the offline service worker (progressive enhancement; no-op where unsupported).
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('/sw.js').catch(function () {});
      });
    }
  </script>
</body>
</html>
