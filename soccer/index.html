<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#14833b">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Shootout">
  <link rel="apple-touch-icon" href="../apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="512x512" href="../icon-512.png">
  <title>Shootout</title>
  <style>
    :root {
      --pitch: #1b8a3e;
      --pitch-2: #0f6e30;
      --you: #2a6cff;
      --opp: #ff4d4d;
      --gold: #ffd166;
      --ink: #f2fff4;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      overscroll-behavior: none;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      display: flex;
      flex-direction: column;
      height: 100vh;          /* fallback for Safari < 15.4 (e.g. iPad mini 2) */
      height: 100dvh;
      font-family: "Trebuchet MS", "Segoe UI", system-ui, sans-serif;
      color: var(--ink);
      background: linear-gradient(180deg, #0f6e30 0%, #0a4d22 60%, #063315 100%);
    }

    /* ---- Top bar ---- */
    .topbar {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: max(10px, env(safe-area-inset-top)) 14px 8px;
    }
    .back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 44px;
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 1rem;
      font-weight: 700;
      text-decoration: none;
      color: var(--ink);
      background: rgba(255, 255, 255, 0.16);
      border: 2px solid rgba(255, 255, 255, 0.4);
    }
    .back:active { transform: scale(0.95); }
    .score {
      font-size: 1.3rem;
      font-size: clamp(1.1rem, 5.5vw, 1.7rem);
      font-weight: 800;
      letter-spacing: 0.02em;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.35);
      white-space: nowrap;
    }
    .rightbtns { display: flex; }
    .rightbtns > * + * { margin-left: 8px; }   /* gap fallback for Safari < 14.5 */
    .refresh, .pause {
      -webkit-appearance: none;
      appearance: none;
      min-width: 44px;
      min-height: 44px;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 1.15rem;
      line-height: 1;
      cursor: pointer;
      color: var(--ink);
      background: rgba(255, 255, 255, 0.16);
      border: 2px solid rgba(255, 255, 255, 0.4);
    }
    .refresh:active, .pause:active { transform: scale(0.95); }

    /* ---- Stage / canvas ---- */
    .stage {
      flex: 1 1 auto;
      position: relative;
      min-height: 0;
      display: flex;
      align-items: stretch;
      justify-content: center;
    }
    canvas#game { display: block; width: 100%; height: 100%; touch-action: none; }

    /* ---- Overlays ---- */
    .overlay {
      position: absolute;
      top: 0; right: 0; bottom: 0; left: 0;   /* inset shorthand unsupported on Safari < 14.5 */
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 22px;
      background: rgba(6, 51, 21, 0.82);
      -webkit-backdrop-filter: blur(3px);
      backdrop-filter: blur(3px);
      z-index: 5;
      overflow-y: auto;
    }
    .overlay > * + * { margin-top: 14px; }     /* gap fallback for Safari < 14.5 */
    .overlay.hidden { display: none; }
    .overlay h2 {
      font-size: 2rem;
      font-size: clamp(1.7rem, 8vw, 3rem);
      color: var(--gold);
      text-shadow: 0 3px 0 rgba(0,0,0,0.25);
    }
    .overlay p { font-size: 1.05rem; font-size: clamp(0.98rem, 4vw, 1.25rem); color: rgba(242, 255, 244, 0.92); max-width: 26ch; }
    .tap-hint { font-size: clamp(2.4rem, 12vw, 4rem); animation: bob 1s ease-in-out infinite; }
    @keyframes bob { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

    /* team / character picker */
    .roster {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      width: min(100%, 380px);
    }
    .charTile {
      -webkit-appearance: none; appearance: none;
      position: relative;
      display: flex; align-items: center; justify-content: center;
      padding: 6px; border-radius: 18px; cursor: pointer;
      background: rgba(255,255,255,0.1);
      border: 3px solid rgba(255,255,255,0.3);
    }
    .charTile:active { transform: scale(0.95); }
    .charTile.sel { border-color: var(--gold); background: rgba(255,209,102,0.2); }
    .charTile canvas { display: block; width: 84px; height: 84px; }
    .charTile .pick {
      position: absolute; top: 4px; right: 6px;
      font-size: 1.2rem; display: none;
    }
    .charTile.sel .pick { display: block; }

    .diffpick { display: flex; flex-wrap: wrap; justify-content: center; }
    .diffpick > * + * { margin-left: 10px; }
    .diffpick button {
      -webkit-appearance: none; appearance: none;
      display: flex; flex-direction: column; align-items: center;
      min-width: 64px; min-height: 64px; padding: 8px 10px;
      border-radius: 16px; font-size: 1.6rem; line-height: 1; cursor: pointer;
      color: var(--ink);
      background: rgba(255,255,255,0.12);
      border: 2px solid rgba(255,255,255,0.3);
    }
    .diffpick button span { display: block; margin-top: 4px; font-size: 0.72rem; font-weight: 700; opacity: 0.85; }
    .diffpick button.sel { border-color: var(--gold); background: rgba(255,209,102,0.18); transform: scale(1.05); }
    .diffpick button:active { transform: scale(0.95); }

    .bigbtn {
      min-height: 60px;
      padding: 14px 34px;
      font-size: 1.3rem;
      font-size: clamp(1.1rem, 5vw, 1.5rem);
      font-weight: 800;
      color: #06280f;
      border: none;
      border-radius: 999px;
      background: linear-gradient(135deg, #ffe27a, #ffb03d);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.4);
      cursor: pointer;
    }
    .bigbtn:active { transform: scale(0.96); }
    .bigbtn[disabled] { opacity: 0.4; box-shadow: none; }
    .linkbtn {
      -webkit-appearance: none; appearance: none;
      background: none; border: none; cursor: pointer;
      color: rgba(242,255,244,0.8);
      font-size: 1rem; font-weight: 700; text-decoration: underline;
      padding: 8px;
    }
    .smallrow { display: flex; align-items: center; justify-content: center; }
    .smallrow > * + * { margin-left: 18px; }
  </style>
</head>
<body>
  <div class="topbar">
    <a class="back" href="../index.html">⬅️ Back</a>
    <div class="score" id="score">⚽ Shootout</div>
    <div class="rightbtns">
      <button class="pause" id="pauseBtn" aria-label="Pause">⏸️</button>
      <button class="refresh" id="refreshBtn" aria-label="Refresh game">🔄</button>
    </div>
  </div>

  <div class="stage">
    <canvas id="game"></canvas>

    <!-- START: pick your shooter -->
    <div class="overlay" id="startOverlay">
      <h2>⚽ Shootout</h2>
      <p>Tap a player to be your shooter.</p>
      <p style="font-size:0.95rem;opacity:0.82;">Then just tap the goal to shoot — aim where the goalie isn't!</p>
      <div class="roster" id="roster"></div>
      <p>Goalie speed:</p>
      <div class="diffpick" id="diffPickStart">
        <button data-idx="0">🐢<span>Easy</span></button>
        <button data-idx="1">🙂<span>Normal</span></button>
        <button data-idx="2">🐇<span>Hard</span></button>
      </div>
      <button class="bigbtn" id="kickoffBtn" disabled>⚽ Start!</button>
    </div>

    <div class="overlay hidden" id="pauseOverlay">
      <h2>Paused</h2>
      <p>Goalie speed:</p>
      <div class="diffpick" id="diffPick">
        <button data-idx="0">🐢<span>Easy</span></button>
        <button data-idx="1">🙂<span>Normal</span></button>
        <button data-idx="2">🐇<span>Hard</span></button>
      </div>
      <button class="bigbtn" id="resumeBtn">▶️ Resume</button>
      <button class="linkbtn" id="newTeamsBtn">🔀 New shooter</button>
    </div>

    <div class="overlay hidden" id="overOverlay">
      <h2 id="overTitle">🏆 Champion!</h2>
      <p id="overScore">You scored 5 goals!</p>
      <button class="bigbtn" id="playAgainBtn">🔁 Play Again</button>
      <button class="linkbtn" id="overNewTeams">🔀 New shooter</button>
    </div>
  </div>

  <script>
  (function () {
    'use strict';

    var canvas = document.getElementById('game');
    var ctx = canvas.getContext('2d');
    var scoreEl = document.getElementById('score');

    var STATE = { START: 0, PLAYING: 1, OVER: 2, PAUSED: 3 };
    var state = STATE.START;

    var W = 0, H = 0, dpr = 1;
    var WIN_GOALS = 5;

    // ---- Character roster (canvas-drawn animals; kit colour = team) ----
    var CHARS = [
      { type: 'fox',   fur: '#ff8a3d', ear: '#c85a1e' },
      { type: 'panda', fur: '#f4f6fb', ear: '#2b2b33' },
      { type: 'bunny', fur: '#f3f0ff', ear: '#e79fc4' },
      { type: 'frog',  fur: '#5fce5f', ear: '#3fa53f' },
      { type: 'cat',   fur: '#b8b8c6', ear: '#8f8fa0' },
      { type: 'duck',  fur: '#ffd24a', ear: '#ff9e2c' }
    ];
    var YOU_KIT = '#2a6cff', OPP_KIT = '#ff4d4d';

    // ---- Difficulty (goalie reactions) ----
    // The keeper chases the shot but is speed-limited, so it can't reach a
    // well-placed corner in time — "aim where the goalie isn't" actually works.
    //  speed  : dive speed, in goal-widths per second (higher = covers more goal)
    //  width  : save-span multiplier (how wide the keeper's reach is)
    //  react  : reaction delay (s) before the keeper starts moving
    //  lead   : how much the keeper anticipates the crossing point (0 = pure
    //           chase, 1 = full anticipation) — higher makes corners harder
    var DIFF = [
      { speed: 0.44, width: 1.15, react: 0.10, lead: 0.15, icon: '🐢' },  // Easy
      { speed: 0.54, width: 1.15, react: 0.07, lead: 0.35, icon: '🙂' },  // Normal
      { speed: 0.62, width: 1.15, react: 0.04, lead: 0.50, icon: '🐇' }   // Hard
    ];
    var diffIdx = 0;

    // ---- Match config (chosen on start screen) ----
    var youChoice = [];           // index into CHARS (single shooter)
    var oppChoice = [];           // goalie char (1)

    // ---- Live match state ----
    var shooter = null;           // {char, x, y, kickT}
    var goalie = null;            // {char, x, y, dir, react, aim}
    var ball = null;              // {x, y, vx, vy, tx, flying}
    var goals = 0;
    var msg = '', msgT = 0, msgGood = false;
    var lastTs = 0;

    // ---- Tunables (recomputed on resize) ----
    var R, BR, GLINE, GOALX0, GOALX1, GOALW, NETD, SHOOTY, KHW, KEEP_SPEED, PATROL, SHOOT_SP;

    function computeTunables() {
      R = H * 0.058;
      BR = H * 0.030;
      GLINE = H * 0.22;                       // goal line y
      GOALW = Math.min(W * 0.66, W - H * 0.10);
      GOALX0 = (W - GOALW) / 2;
      GOALX1 = GOALX0 + GOALW;
      NETD = H * 0.11;                         // net depth (above the line)
      SHOOTY = H * 0.82;                       // shooter's row
      KHW = GOALW * 0.09 * DIFF[diffIdx].width; // goalie save half-span
      KEEP_SPEED = GOALW * DIFF[diffIdx].speed; // scale by the goal it defends
      PATROL = H * 0.16;
      SHOOT_SP = H * 1.35;
    }

    function clamp(v, a, b) { return v < a ? a : (v > b ? b : v); }

    // ---------- Sizing ----------
    function resize() {
      var rect = canvas.parentNode.getBoundingClientRect();
      W = Math.max(240, Math.floor(rect.width));
      H = Math.max(240, Math.floor(rect.height));
      dpr = window.devicePixelRatio || 1;
      canvas.width = Math.round(W * dpr);
      canvas.height = Math.round(H * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      computeTunables();
      if (shooter) layoutPositions();
      render._h = -1;
    }

    // ---------- Setup ----------
    function layoutPositions() {
      if (shooter) { shooter.x = W / 2; shooter.y = SHOOTY; }
      if (goalie) { goalie.y = GLINE + R * 0.45; goalie.x = clamp(goalie.x, GOALX0 + KHW, GOALX1 - KHW); }
      if (ball && !ball.flying) placeBall();
    }

    function placeBall() {
      ball.x = shooter.x; ball.y = shooter.y - R * 0.95;
      ball.vx = 0; ball.vy = 0; ball.flying = false;
    }

    function setupMatch() {
      goals = 0; msg = ''; msgT = 0;
      shooter = { char: CHARS[youChoice[0]], x: W / 2, y: SHOOTY, kickT: 0 };
      goalie = { char: CHARS[oppChoice[0]], x: W / 2, y: GLINE + R * 0.45, dir: 1, react: 0 };
      ball = { x: W / 2, y: SHOOTY - R * 0.95, vx: 0, vy: 0, tx: W / 2, flying: false };
      layoutPositions();
      placeBall();
      updateScore();
    }

    // ---------- Shooting ----------
    function shootAt(px, py) {
      if (ball.flying || msgT > 0) return;
      // Always drive the ball up toward the goal line, arriving near px.
      var tx = clamp(px, GOALX0 - GOALW * 0.1, GOALX1 + GOALW * 0.1);
      var dx = tx - ball.x, dy = GLINE - ball.y;
      var d = Math.sqrt(dx * dx + dy * dy) || 1;
      ball.tx = tx;                            // where the shot will cross the line
      ball.vx = dx / d * SHOOT_SP;
      ball.vy = dy / d * SHOOT_SP;
      ball.flying = true;
      shooter.kickT = 0.2;
      goalie.react = DIFF[diffIdx].react;      // keeper hesitates, then dives
      sfx('kick');
    }

    function resolveShot() {
      ball.flying = false;
      var withinMouth = ball.x > GOALX0 + BR && ball.x < GOALX1 - BR;
      var saved = Math.abs(ball.x - goalie.x) < KHW + BR;
      if (withinMouth && !saved) {
        goals++;
        updateScore();
        sfx('goal');
        if (goals >= WIN_GOALS) { endMatch(); return; }
        flash('GOAL! 🎉', true, 1.2);
      } else if (withinMouth && saved) {
        flash('Saved! 🧤', false, 0.9);
        sfx('save');
      } else {
        flash('Just wide!', false, 0.9);
        sfx('miss');
      }
    }

    function flash(text, good, dur) { msg = text; msgGood = good; msgT = dur; }

    function endMatch() {
      state = STATE.OVER;
      document.getElementById('overTitle').textContent = '🏆 Champion!';
      document.getElementById('overScore').textContent = 'You scored ' + goals + ' goals!';
      document.getElementById('overOverlay').classList.remove('hidden');
    }

    function updateScore() { scoreEl.textContent = '⚽ ' + goals + ' / ' + WIN_GOALS; }

    // ---------- Update ----------
    function update(dt) {
      if (shooter.kickT > 0) shooter.kickT -= dt;

      if (ball.flying) {
        // goalie waits out its reaction time, then chases the ball (leading toward
        // the crossing point). Speed-limited, so sharp corners can beat it.
        if (goalie.react > 0) goalie.react -= dt;
        else {
          var gt = ball.x + DIFF[diffIdx].lead * (ball.tx - ball.x);
          gt = clamp(gt, GOALX0 + KHW, GOALX1 - KHW);
          goalie.x += clamp(gt - goalie.x, -KEEP_SPEED * dt, KEEP_SPEED * dt);
        }
        ball.x += ball.vx * dt;
        ball.y += ball.vy * dt;
        if (ball.y <= GLINE) { ball.y = GLINE; resolveShot(); }
      } else if (msgT > 0) {
        msgT -= dt;
        if (msgT <= 0 && state === STATE.PLAYING) placeBall();
      } else {
        // idle: goalie patrols side to side
        goalie.x += goalie.dir * PATROL * dt;
        if (goalie.x > GOALX1 - KHW) { goalie.x = GOALX1 - KHW; goalie.dir = -1; }
        if (goalie.x < GOALX0 + KHW) { goalie.x = GOALX0 + KHW; goalie.dir = 1; }
      }
    }

    // ---------- Sound (Web Audio) ----------
    var actx = null;
    function initAudio() {
      if (actx) { if (actx.state === 'suspended') actx.resume(); return; }
      try { actx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { actx = null; }
    }
    function tone(freq, start, dur, type, vol) {
      if (!actx) return;
      var o = actx.createOscillator(), g = actx.createGain();
      o.type = type || 'square';
      o.frequency.value = freq;
      var t = actx.currentTime + start;
      g.gain.setValueAtTime(0.0001, t);
      g.gain.exponentialRampToValueAtTime(vol || 0.18, t + 0.01);
      g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
      o.connect(g); g.connect(actx.destination);
      o.start(t); o.stop(t + dur + 0.02);
    }
    function sfx(kind) {
      if (!actx) return;
      if (kind === 'kick') { tone(190, 0, 0.09, 'square', 0.22); }
      else if (kind === 'pass') { tone(300, 0, 0.08, 'triangle', 0.16); }
      else if (kind === 'goal') {
        tone(523, 0, 0.12, 'square', 0.2);
        tone(659, 0.12, 0.12, 'square', 0.2);
        tone(784, 0.24, 0.22, 'square', 0.22);
      } else if (kind === 'save') { tone(150, 0, 0.14, 'sawtooth', 0.16); }
      else if (kind === 'miss') { tone(200, 0, 0.12, 'sine', 0.12); tone(150, 0.1, 0.14, 'sine', 0.12); }
      else if (kind === 'whistle') { tone(1000, 0, 0.12, 'sawtooth', 0.14); }
    }

    // ---------- Drawing helpers ----------
    function roundRectFull(c, x, y, w, h, r) {
      c.beginPath();
      c.moveTo(x + r, y);
      c.arcTo(x + w, y, x + w, y + h, r);
      c.arcTo(x + w, y + h, x, y + h, r);
      c.arcTo(x, y + h, x, y, r);
      c.arcTo(x, y, x + w, y, r);
      c.closePath();
    }
    function tri(c, x1, y1, x2, y2, x3, y3) {
      c.beginPath(); c.moveTo(x1, y1); c.lineTo(x2, y2); c.lineTo(x3, y3); c.closePath(); c.fill();
    }

    function drawHead(c, hx, hy, hr, char) {
      var t = char.type;
      c.fillStyle = char.ear;
      if (t === 'fox' || t === 'cat') {
        tri(c, hx - hr * 0.7, hy - hr * 0.4, hx - hr * 0.2, hy - hr * 1.25, hx - hr * 0.05, hy - hr * 0.55);
        tri(c, hx + hr * 0.7, hy - hr * 0.4, hx + hr * 0.2, hy - hr * 1.25, hx + hr * 0.05, hy - hr * 0.55);
      } else if (t === 'panda') {
        c.beginPath(); c.arc(hx - hr * 0.7, hy - hr * 0.7, hr * 0.42, 0, Math.PI * 2); c.fill();
        c.beginPath(); c.arc(hx + hr * 0.7, hy - hr * 0.7, hr * 0.42, 0, Math.PI * 2); c.fill();
      } else if (t === 'bunny') {
        roundRectFull(c, hx - hr * 0.55, hy - hr * 1.7, hr * 0.36, hr * 1.3, hr * 0.18); c.fill();
        roundRectFull(c, hx + hr * 0.2, hy - hr * 1.7, hr * 0.36, hr * 1.3, hr * 0.18); c.fill();
      }
      c.fillStyle = char.fur;
      c.beginPath(); c.arc(hx, hy, hr, 0, Math.PI * 2); c.fill();

      if (t === 'frog') {
        c.fillStyle = char.fur;
        c.beginPath(); c.arc(hx - hr * 0.5, hy - hr * 0.7, hr * 0.42, 0, Math.PI * 2); c.fill();
        c.beginPath(); c.arc(hx + hr * 0.5, hy - hr * 0.7, hr * 0.42, 0, Math.PI * 2); c.fill();
        c.fillStyle = '#fff';
        c.beginPath(); c.arc(hx - hr * 0.5, hy - hr * 0.7, hr * 0.26, 0, Math.PI * 2); c.fill();
        c.beginPath(); c.arc(hx + hr * 0.5, hy - hr * 0.7, hr * 0.26, 0, Math.PI * 2); c.fill();
        c.fillStyle = '#111';
        c.beginPath(); c.arc(hx - hr * 0.5, hy - hr * 0.68, hr * 0.12, 0, Math.PI * 2); c.fill();
        c.beginPath(); c.arc(hx + hr * 0.5, hy - hr * 0.68, hr * 0.12, 0, Math.PI * 2); c.fill();
        c.strokeStyle = '#2f7d2f'; c.lineWidth = hr * 0.12;
        c.beginPath(); c.arc(hx, hy + hr * 0.1, hr * 0.5, 0.15 * Math.PI, 0.85 * Math.PI); c.stroke();
        return;
      }

      if (t === 'panda') {
        c.fillStyle = '#2b2b33';
        c.beginPath(); c.ellipse ? c.ellipse(hx - hr * 0.38, hy - hr * 0.05, hr * 0.26, hr * 0.34, 0, 0, Math.PI * 2) : c.arc(hx - hr * 0.38, hy - hr * 0.05, hr * 0.28, 0, Math.PI * 2); c.fill();
        c.beginPath(); c.ellipse ? c.ellipse(hx + hr * 0.38, hy - hr * 0.05, hr * 0.26, hr * 0.34, 0, 0, Math.PI * 2) : c.arc(hx + hr * 0.38, hy - hr * 0.05, hr * 0.28, 0, Math.PI * 2); c.fill();
      }

      c.fillStyle = '#fff';
      c.beginPath(); c.arc(hx - hr * 0.33, hy - hr * 0.05, hr * 0.2, 0, Math.PI * 2); c.fill();
      c.beginPath(); c.arc(hx + hr * 0.33, hy - hr * 0.05, hr * 0.2, 0, Math.PI * 2); c.fill();
      c.fillStyle = '#111';
      c.beginPath(); c.arc(hx - hr * 0.30, hy - hr * 0.03, hr * 0.1, 0, Math.PI * 2); c.fill();
      c.beginPath(); c.arc(hx + hr * 0.30, hy - hr * 0.03, hr * 0.1, 0, Math.PI * 2); c.fill();

      if (t === 'duck') {
        c.fillStyle = char.ear;
        roundRectFull(c, hx - hr * 0.34, hy + hr * 0.18, hr * 0.68, hr * 0.3, hr * 0.12); c.fill();
      } else {
        c.fillStyle = '#3a2a2a';
        c.beginPath(); c.arc(hx, hy + hr * 0.28, hr * 0.12, 0, Math.PI * 2); c.fill();
      }

      if (t === 'cat') {
        c.strokeStyle = 'rgba(60,60,70,0.7)'; c.lineWidth = Math.max(1, hr * 0.06);
        for (var w = -1; w <= 1; w++) {
          c.beginPath(); c.moveTo(hx - hr * 0.2, hy + hr * 0.28 + w * hr * 0.14); c.lineTo(hx - hr * 0.9, hy + hr * 0.2 + w * hr * 0.22); c.stroke();
          c.beginPath(); c.moveTo(hx + hr * 0.2, hy + hr * 0.28 + w * hr * 0.14); c.lineTo(hx + hr * 0.9, hy + hr * 0.2 + w * hr * 0.22); c.stroke();
        }
      }
    }

    // Full player: kit body + animal head. gloves=true adds keeper gloves.
    function drawPlayerShape(c, x, y, r, kit, char, gloves) {
      c.fillStyle = 'rgba(0,0,0,0.22)';
      c.beginPath(); c.ellipse ? c.ellipse(x, y + r * 0.95, r * 0.9, r * 0.35, 0, 0, Math.PI * 2) : c.arc(x, y + r * 0.9, r * 0.8, 0, Math.PI * 2); c.fill();

      c.fillStyle = '#2a2a33';
      c.beginPath(); c.arc(x - r * 0.4, y + r * 0.8, r * 0.24, 0, Math.PI * 2); c.fill();
      c.beginPath(); c.arc(x + r * 0.4, y + r * 0.8, r * 0.24, 0, Math.PI * 2); c.fill();

      c.fillStyle = kit;
      roundRectFull(c, x - r * 0.62, y - r * 0.1, r * 1.24, r * 1.0, r * 0.4); c.fill();
      c.fillStyle = 'rgba(255,255,255,0.28)';
      roundRectFull(c, x - r * 0.14, y - r * 0.05, r * 0.28, r * 0.9, r * 0.12); c.fill();
      c.strokeStyle = 'rgba(0,0,0,0.25)'; c.lineWidth = Math.max(1, r * 0.08);
      roundRectFull(c, x - r * 0.62, y - r * 0.1, r * 1.24, r * 1.0, r * 0.4); c.stroke();

      if (gloves) {
        c.fillStyle = '#ffe27a';
        c.beginPath(); c.arc(x - r * 0.72, y + r * 0.2, r * 0.26, 0, Math.PI * 2); c.fill();
        c.beginPath(); c.arc(x + r * 0.72, y + r * 0.2, r * 0.26, 0, Math.PI * 2); c.fill();
      }

      drawHead(c, x, y - r * 0.45, r * 0.6, char);
    }

    function pentagon(c, x, y, r) {
      c.beginPath();
      for (var i = 0; i < 5; i++) {
        var a = -Math.PI / 2 + i * Math.PI * 2 / 5;
        var px = x + Math.cos(a) * r, py = y + Math.sin(a) * r;
        if (i === 0) c.moveTo(px, py); else c.lineTo(px, py);
      }
      c.closePath(); c.fill();
    }
    function drawBall(x, y, r) {
      ctx.fillStyle = 'rgba(0,0,0,0.22)';
      ctx.beginPath(); ctx.ellipse ? ctx.ellipse(x, y + r * 0.7, r * 0.9, r * 0.35, 0, 0, Math.PI * 2) : ctx.arc(x, y + r * 0.6, r * 0.8, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#ffffff';
      ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = 'rgba(0,0,0,0.35)'; ctx.lineWidth = Math.max(1, r * 0.12); ctx.stroke();
      ctx.fillStyle = '#222';
      pentagon(ctx, x, y, r * 0.42);
      ctx.beginPath(); ctx.arc(x - r * 0.66, y - r * 0.3, r * 0.16, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(x + r * 0.66, y - r * 0.3, r * 0.16, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(x, y + r * 0.7, r * 0.16, 0, Math.PI * 2); ctx.fill();
    }

    // ---------- Render ----------
    function drawField() {
      var bands = 8, bw = W / bands;
      for (var i = 0; i < bands; i++) {
        ctx.fillStyle = (i % 2 === 0) ? '#1e9344' : '#1a8a3e';
        ctx.fillRect(i * bw, 0, bw + 1, H);
      }
      // penalty arc / spot
      ctx.strokeStyle = 'rgba(255,255,255,0.55)';
      ctx.lineWidth = Math.max(2, H * 0.006);
      ctx.strokeRect(GOALX0 - GOALW * 0.06, GLINE, GOALW * 1.12, H * 0.32);
      ctx.beginPath(); ctx.arc(W / 2, SHOOTY - R * 0.95, H * 0.012, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,0.8)'; ctx.fill();
    }

    function drawGoal() {
      var top = GLINE - NETD;
      // net mesh
      ctx.fillStyle = 'rgba(255,255,255,0.12)';
      ctx.fillRect(GOALX0, top, GOALW, NETD);
      ctx.strokeStyle = 'rgba(255,255,255,0.5)';
      ctx.lineWidth = 1.5;
      var j, step = GOALW / 10;
      for (j = 0; j <= 10; j++) { ctx.beginPath(); ctx.moveTo(GOALX0 + j * step, top); ctx.lineTo(GOALX0 + j * step, GLINE); ctx.stroke(); }
      var vstep = NETD / 3;
      for (j = 0; j <= 3; j++) { ctx.beginPath(); ctx.moveTo(GOALX0, top + j * vstep); ctx.lineTo(GOALX1, top + j * vstep); ctx.stroke(); }
      // frame (posts + crossbar)
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = Math.max(4, H * 0.011);
      ctx.beginPath();
      ctx.moveTo(GOALX0, GLINE); ctx.lineTo(GOALX0, top);
      ctx.lineTo(GOALX1, top); ctx.lineTo(GOALX1, GLINE);
      ctx.stroke();
    }

    function drawGoalie() {
      // little goalie with gloves, facing the shooter
      drawPlayerShape(ctx, goalie.x, goalie.y, R * 0.95, OPP_KIT, goalie.char, true);
    }

    function render(ts) {
      drawField();
      drawGoal();

      // aim guide while ready
      if (state === STATE.PLAYING && ball && !ball.flying && msgT <= 0) {
        ctx.save();
        ctx.strokeStyle = 'rgba(255,209,102,0.5)';
        ctx.lineWidth = Math.max(2, R * 0.08);
        ctx.setLineDash([R * 0.35, R * 0.4]);
        ctx.beginPath(); ctx.moveTo(ball.x, ball.y); ctx.lineTo(W / 2, GLINE + R * 0.2); ctx.stroke();
        ctx.restore();
      }

      if (goalie) drawGoalie();

      if (shooter) {
        var lift = shooter.kickT > 0 ? R * 0.25 : 0;
        drawPlayerShape(ctx, shooter.x, shooter.y - lift, R, YOU_KIT, shooter.char, false);
      }

      if (ball) drawBall(ball.x, ball.y, BR);

      // banner (GOAL / Saved / wide)
      if (msgT > 0) {
        ctx.fillStyle = 'rgba(0,0,0,0.32)';
        ctx.fillRect(0, H * 0.4, W, H * 0.2);
        ctx.fillStyle = msgGood ? '#ffd166' : '#ffffff';
        ctx.font = '800 ' + Math.floor(H * 0.11) + 'px "Trebuchet MS", sans-serif';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(msg, W / 2, H * 0.5);
        ctx.textAlign = 'start';
      }
    }

    // ---------- Loop ----------
    function frame(ts) {
      if (!lastTs) lastTs = ts;
      var dt = Math.min(0.045, (ts - lastTs) / 1000);
      lastTs = ts;
      if (state === STATE.PLAYING) update(dt);
      render(ts);
      requestAnimationFrame(frame);
    }

    // ---------- Tap the goal to shoot ----------
    function pointFrom(e) {
      var rect = canvas.getBoundingClientRect();
      var cx, cy;
      if (e.touches && e.touches[0]) { cx = e.touches[0].clientX; cy = e.touches[0].clientY; }
      else if (e.changedTouches && e.changedTouches[0]) { cx = e.changedTouches[0].clientX; cy = e.changedTouches[0].clientY; }
      else { cx = e.clientX; cy = e.clientY; }
      return { x: (cx - rect.left) * (W / rect.width), y: (cy - rect.top) * (H / rect.height) };
    }
    function onStageTap(e) {
      if (e.target && e.target.closest && e.target.closest('button, a')) return;
      if (state !== STATE.PLAYING) return;
      e.preventDefault();
      var pt = pointFrom(e);
      shootAt(pt.x, pt.y);
    }
    var stage = document.querySelector('.stage');
    stage.addEventListener('touchstart', onStageTap, { passive: false });
    stage.addEventListener('mousedown', onStageTap);

    // ---------- Start-screen wiring ----------
    var startOverlay = document.getElementById('startOverlay');
    var rosterEl = document.getElementById('roster');
    var kickoffBtn = document.getElementById('kickoffBtn');

    (function initDiff() {
      var saved = null;
      try { saved = localStorage.getItem('so_diff'); } catch (e) {}
      if (saved !== null && DIFF[+saved]) diffIdx = +saved;
    })();
    function paintDiff() {
      var btns = document.querySelectorAll('.diffpick button');
      for (var i = 0; i < btns.length; i++) btns[i].className = (+btns[i].getAttribute('data-idx') === diffIdx) ? 'sel' : '';
    }
    function applyDiff(idx) {
      diffIdx = idx;
      try { localStorage.setItem('so_diff', String(idx)); } catch (e) {}
      computeTunables();
      if (shooter) layoutPositions();
      paintDiff();
    }
    (function wireDiff() {
      var btns = document.querySelectorAll('.diffpick button');
      for (var i = 0; i < btns.length; i++) {
        (function (b) { b.addEventListener('click', function (e) { e.stopPropagation(); applyDiff(+b.getAttribute('data-idx')); }); })(btns[i]);
      }
      paintDiff();
    })();

    function buildRoster() {
      rosterEl.innerHTML = '';
      for (var i = 0; i < CHARS.length; i++) {
        (function (idx) {
          var tile = document.createElement('button');
          tile.className = 'charTile';
          tile.setAttribute('data-idx', idx);
          var cv = document.createElement('canvas');
          cv.width = 168; cv.height = 168;
          var cc = cv.getContext('2d');
          drawPlayerShape(cc, 84, 74, 52, YOU_KIT, CHARS[idx], false);
          tile.appendChild(cv);
          var pick = document.createElement('span');
          pick.className = 'pick'; pick.textContent = '✅';
          tile.appendChild(pick);
          tile.addEventListener('click', function (e) { e.stopPropagation(); pickChar(idx); });
          rosterEl.appendChild(tile);
        })(i);
      }
    }
    function pickChar(idx) {
      youChoice = [idx];
      paintRoster();
    }
    function paintRoster() {
      var tiles = rosterEl.querySelectorAll('.charTile');
      for (var i = 0; i < tiles.length; i++) {
        var idx = +tiles[i].getAttribute('data-idx');
        if (youChoice.indexOf(idx) >= 0) tiles[i].classList.add('sel'); else tiles[i].classList.remove('sel');
      }
      kickoffBtn.disabled = youChoice.length !== 1;
    }
    function pickGoalie() {
      oppChoice = [];
      var pool = [];
      for (var i = 0; i < CHARS.length; i++) if (youChoice.indexOf(i) < 0) pool.push(i);
      oppChoice.push(pool.length ? pool[Math.floor(Math.random() * pool.length)] : 0);
    }

    kickoffBtn.addEventListener('click', function (e) {
      e.stopPropagation();
      if (youChoice.length !== 1) return;
      initAudio();
      pickGoalie();
      startOverlay.classList.add('hidden');
      setupMatch();
      state = STATE.PLAYING;
      lastTs = 0;
      sfx('whistle');
    });

    window.addEventListener('keydown', function (e) {
      if (e.key === ' ') { e.preventDefault(); if (state === STATE.PLAYING) shootAt(goalie ? (goalie.x < W / 2 ? W * 0.7 : W * 0.3) : W / 2, GLINE); }
    });

    document.getElementById('refreshBtn').addEventListener('click', function () { location.reload(); });

    // ---------- Pause / resume ----------
    function pauseGame() {
      if (state !== STATE.PLAYING) return;
      state = STATE.PAUSED;
      paintDiff();
      document.getElementById('pauseOverlay').classList.remove('hidden');
    }
    function resumeGame() {
      if (state !== STATE.PAUSED) return;
      document.getElementById('pauseOverlay').classList.add('hidden');
      state = STATE.PLAYING;
      lastTs = 0;
    }
    document.getElementById('pauseBtn').addEventListener('click', function (e) {
      e.stopPropagation();
      if (state === STATE.PAUSED) resumeGame(); else pauseGame();
    });
    document.getElementById('resumeBtn').addEventListener('click', function (e) { e.stopPropagation(); resumeGame(); });

    function returnToStart() {
      document.getElementById('pauseOverlay').classList.add('hidden');
      document.getElementById('overOverlay').classList.add('hidden');
      state = STATE.START;
      youChoice = [];
      paintRoster();
      startOverlay.classList.remove('hidden');
    }
    document.getElementById('newTeamsBtn').addEventListener('click', function (e) { e.stopPropagation(); returnToStart(); });
    document.getElementById('overNewTeams').addEventListener('click', function (e) { e.stopPropagation(); returnToStart(); });

    document.getElementById('playAgainBtn').addEventListener('click', function (e) {
      e.stopPropagation();
      document.getElementById('overOverlay').classList.add('hidden');
      setupMatch();
      state = STATE.PLAYING;
      lastTs = 0;
      sfx('whistle');
    });

    // ---------- Global handlers ----------
    window.addEventListener('resize', function () { resize(); buildRoster(); paintRoster(); });
    window.addEventListener('orientationchange', function () { setTimeout(function () { resize(); buildRoster(); paintRoster(); }, 150); });
    document.addEventListener('visibilitychange', function () { if (!document.hidden) lastTs = 0; });
    document.addEventListener('touchmove', function (e) { e.preventDefault(); }, { passive: false });
    document.addEventListener('gesturestart', function (e) { e.preventDefault(); });

    var _iosMajor = +((navigator.userAgent.match(/ OS (\d+)_/) || [])[1] || 0);
    if (navigator.standalone && _iosMajor > 0 && _iosMajor < 13) {
      document.addEventListener('click', function (e) {
        var n = e.target;
        while (n && n.nodeName !== 'A') n = n.parentNode;
        if (n && n.getAttribute('href') && n.getAttribute('target') !== '_blank') {
          e.preventDefault();
          location.href = n.getAttribute('href');
        }
      }, false);
    }

    // ---------- Boot ----------
    resize();
    buildRoster();
    paintRoster();
    requestAnimationFrame(frame);
  })();
  </script>
  <script>
    // Register the offline service worker (progressive enhancement; no-op where unsupported).
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('/sw.js').catch(function () {});
      });
    }
  </script>
</body>
