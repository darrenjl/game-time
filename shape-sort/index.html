<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#2b2350">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Shape Sort">
  <link rel="apple-touch-icon" href="../apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="512x512" href="../icon-512.png">
  <title>Shape Sort</title>
  <style>
    :root { --gold: #ffd166; --ink: #f2f0ff; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; overscroll-behavior: none; touch-action: none; -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; }
    body { display: flex; flex-direction: column; height: 100vh; height: 100dvh; font-family: "Trebuchet MS", "Segoe UI", system-ui, sans-serif; color: var(--ink); background: linear-gradient(180deg, #3a2f6e 0%, #2b2350 55%, #17123a 100%); }
    .topbar { flex: 0 0 auto; display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: max(10px, env(safe-area-inset-top)) 14px 8px; }
    .back { display: inline-flex; align-items: center; gap: 6px; min-height: 44px; padding: 8px 14px; border-radius: 999px; font-size: 1rem; font-weight: 700; text-decoration: none; color: #fff; background: rgba(150,130,255,0.22); border: 2px solid rgba(255,255,255,0.55); }
    .back:active { transform: scale(0.95); }
    .score { font-size: 1.3rem; font-size: clamp(1.1rem, 5vw, 1.6rem); font-weight: 800; color: #fff; text-shadow: 0 2px 8px rgba(20,10,50,0.5); }
    .rightbtns { display: flex; } .rightbtns > * + * { margin-left: 8px; }
    .refresh, .pause { -webkit-appearance: none; appearance: none; min-width: 44px; min-height: 44px; padding: 8px 12px; border-radius: 999px; font-size: 1.15rem; line-height: 1; cursor: pointer; color: #fff; background: rgba(150,130,255,0.22); border: 2px solid rgba(255,255,255,0.55); }
    .refresh:active, .pause:active { transform: scale(0.95); }
    .speedpick { display: flex; flex-wrap: wrap; justify-content: center; } .speedpick > * + * { margin-left: 10px; }
    .speedpick button { -webkit-appearance: none; appearance: none; display: flex; flex-direction: column; align-items: center; min-width: 72px; min-height: 68px; padding: 8px 10px; border-radius: 16px; font-size: 1.6rem; line-height: 1; cursor: pointer; color: #fff; background: rgba(255,255,255,0.16); border: 2px solid rgba(255,255,255,0.35); }
    .speedpick button span { display: block; margin-top: 4px; font-size: 0.68rem; font-weight: 700; opacity: 0.9; }
    .speedpick button.sel { border-color: var(--gold); background: rgba(255,209,102,0.28); transform: scale(1.05); }
    .speedpick button:active { transform: scale(0.95); }
    .stage { flex: 1 1 auto; position: relative; min-height: 0; display: flex; align-items: stretch; justify-content: center; }
    canvas { display: block; width: 100%; height: 100%; touch-action: none; }
    .overlay { position: absolute; top: 0; right: 0; bottom: 0; left: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 24px; background: rgba(20, 12, 45, 0.68); -webkit-backdrop-filter: blur(3px); backdrop-filter: blur(3px); z-index: 5; }
    .overlay > * + * { margin-top: 16px; } .overlay.hidden { display: none; }
    .overlay h2 { font-size: 2rem; font-size: clamp(1.6rem, 7vw, 2.8rem); color: #fff; text-shadow: 0 3px 0 rgba(20,10,50,0.4), 0 0 22px rgba(255,209,102,0.5); }
    .overlay p { font-size: 1.05rem; font-size: clamp(0.95rem, 4vw, 1.2rem); color: rgba(255,255,255,0.92); max-width: 26ch; }
    .tap-hint { font-size: clamp(2.4rem, 12vw, 4rem); animation: bob 1s ease-in-out infinite; }
    @keyframes bob { 0%,100% { transform: translateY(0);} 50% { transform: translateY(-10px);} }
    .bigbtn { min-height: 60px; padding: 16px 34px; font-size: 1.3rem; font-size: clamp(1.1rem, 5vw, 1.5rem); font-weight: 800; color: #17123a; border: none; border-radius: 999px; background: linear-gradient(135deg, #b79bff, var(--gold)); box-shadow: 0 12px 30px rgba(150,130,255,0.4); cursor: pointer; }
    .bigbtn:active { transform: scale(0.96); }
  </style>
</head>
<body>
  <div class="topbar">
    <a class="back" href="../index.html">⬅️ Back</a>
    <div class="score" id="score">0</div>
    <div class="rightbtns">
      <button class="pause" id="pauseBtn" aria-label="Pause">⏸️</button>
      <button class="refresh" id="refreshBtn" aria-label="Refresh game">🔄</button>
    </div>
  </div>
  <div class="stage">
    <canvas id="game"></canvas>
    <div class="overlay" id="startOverlay">
      <h2>🌈 Shape Sort</h2>
      <p>Every gem belongs in a bucket of the same colour!</p>
      <div class="tap-hint">👆</div>
      <p><b>Drag the gem to the matching bucket.</b></p>
      <p style="opacity:0.8;font-size:0.9em">Tap ⏸️ (top-right) to pause and pick how many colours.</p>
    </div>
    <div class="overlay hidden" id="pauseOverlay">
      <h2>Paused</h2>
      <p id="bestLine">How many colours?</p>
      <div class="speedpick" id="speedPick">
        <button data-idx="0">🐢<span>3 colours</span></button>
        <button data-idx="1">🙂<span>4 colours</span></button>
        <button data-idx="2">⚡<span>5 colours</span></button>
      </div>
      <button class="bigbtn" id="resumeBtn">▶️ Resume</button>
    </div>
  </div>

  <script>
  (function () {
    'use strict';
    var canvas = document.getElementById('game');
    var ctx = canvas.getContext('2d');
    var scoreEl = document.getElementById('score');
    var STATE = { START: 0, PLAYING: 1, PAUSED: 3 };
    var state = STATE.START;
    var W = 0, H = 0, dpr = 1;

    var PALETTE = [
      { name: 'red', c: '#ff5d5d', d: '#c93b3b' },
      { name: 'blue', c: '#4fa8ff', d: '#2a6fc9' },
      { name: 'yellow', c: '#ffd23f', d: '#d9a800' },
      { name: 'green', c: '#5fd07f', d: '#39a058' },
      { name: 'purple', c: '#b79bff', d: '#8a5cf0' }
    ];
    var SIZES = [3, 4, 5];
    var sizeIdx = 1;

    var bins = [], item = null, sparks = [], points = 0, best = 0, lastTs = 0, gameT = 0, shake = 0;
    var dragging = false, dragDX = 0, dragDY = 0;

    function rand(a, b) { return a + Math.random() * (b - a); }
    function randInt(n) { return Math.floor(Math.random() * n); }
    function nColors() { return SIZES[sizeIdx]; }

    function resize() {
      var rect = canvas.parentNode.getBoundingClientRect();
      W = Math.max(200, Math.floor(rect.width)); H = Math.max(200, Math.floor(rect.height));
      dpr = window.devicePixelRatio || 1;
      canvas.width = Math.round(W * dpr); canvas.height = Math.round(H * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      layoutBins();
      if (item && !dragging) { item.x = W / 2; item.homeX = W / 2; item.homeY = H * 0.26; if (!item.settled) { item.y = item.homeY; } }
    }

    function layoutBins() {
      bins = [];
      var n = nColors();
      var pad = W * 0.04;
      var gap = W * 0.02;
      var bw = (W - pad * 2 - gap * (n - 1)) / n;
      var bh = Math.min(H * 0.26, bw * 1.1);
      var by = H - bh - H * 0.03;
      for (var i = 0; i < n; i++) {
        bins.push({ colorIdx: i, x: pad + i * (bw + gap), y: by, w: bw, h: bh });
      }
    }

    function newGame() { points = 0; sparks = []; shake = 0; dragging = false; layoutBins(); spawnItem(); updateScore(); }

    function spawnItem() {
      var idx = randInt(nColors());
      item = { colorIdx: idx, x: W / 2, y: H * 0.26, homeX: W / 2, homeY: H * 0.26, r: Math.min(W, H) * 0.09, settled: true, pop: 0 };
    }

    // ---------- Input ----------
    function pointFromEvent(e) {
      var rect = canvas.getBoundingClientRect();
      var src = (e.touches && e.touches[0]) || (e.changedTouches && e.changedTouches[0]) || e;
      return { x: src.clientX - rect.left, y: src.clientY - rect.top };
    }
    function onDown(e) {
      if (e && e.target && e.target.closest && e.target.closest('button, a')) return;
      if (e) e.preventDefault();
      if (state === STATE.START) { startGame(); return; }
      if (state !== STATE.PLAYING || !item) return;
      var p = pointFromEvent(e);
      if (Math.hypot(p.x - item.x, p.y - item.y) <= item.r * 1.3) {
        dragging = true; item.settled = false; dragDX = item.x - p.x; dragDY = item.y - p.y;
      }
    }
    function onMove(e) {
      if (!dragging || !item) return;
      if (e) e.preventDefault();
      var p = pointFromEvent(e);
      item.x = p.x + dragDX; item.y = p.y + dragDY;
    }
    function onUp() {
      if (!dragging || !item) return;
      dragging = false;
      // which bin is the gem over?
      var target = null;
      for (var i = 0; i < bins.length; i++) {
        var b = bins[i];
        if (item.x > b.x && item.x < b.x + b.w && item.y + item.r * 0.4 > b.y) { target = b; break; }
      }
      if (target && target.colorIdx === item.colorIdx) {
        points++; if (points > best) { best = points; try { localStorage.setItem('ss2_best', String(best)); } catch (e) {} }
        spawnSparks(target.x + target.w / 2, target.y + target.h * 0.3, PALETTE[item.colorIdx].c);
        updateScore();
        spawnItem();
      } else {
        // wrong or dropped in empty space — bounce home
        if (target) shake = 0.4;
        item.settled = false;   // ease back to home in update()
      }
    }
    function startGame() { document.getElementById('startOverlay').classList.add('hidden'); state = STATE.PLAYING; lastTs = 0; }

    function spawnSparks(x, y, color) {
      for (var i = 0; i < 14; i++) { var a = Math.random() * 6.28, sp = rand(H * 0.08, H * 0.35); sparks.push({ x: x, y: y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - H * 0.1, r: rand(2, H * 0.012), alpha: 1, color: i % 2 ? color : '#fff' }); }
    }
    function updateSparks(dt) { for (var i = sparks.length - 1; i >= 0; i--) { var s = sparks[i]; s.vy += H * 1.2 * dt; s.x += s.vx * dt; s.y += s.vy * dt; s.alpha -= dt * 1.6; if (s.alpha <= 0) sparks.splice(i, 1); } }

    // ---------- Update ----------
    function update(dt) {
      gameT += dt;
      if (shake > 0) shake = Math.max(0, shake - dt);
      if (item && !dragging && !item.settled) {
        item.x += (item.homeX - item.x) * Math.min(1, dt * 10);
        item.y += (item.homeY - item.y) * Math.min(1, dt * 10);
        if (Math.abs(item.x - item.homeX) < 1 && Math.abs(item.y - item.homeY) < 1) { item.x = item.homeX; item.y = item.homeY; item.settled = true; }
      }
      updateSparks(dt);
    }
    function updateScore() { scoreEl.textContent = points; }

    // ---------- Draw ----------
    function circle(x, y, r) { ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.closePath(); }
    function roundRect(x, y, w, h, r) { ctx.beginPath(); ctx.moveTo(x + r, y); ctx.arcTo(x + w, y, x + w, y + h, r); ctx.arcTo(x + w, y + h, x, y + h, r); ctx.arcTo(x, y + h, x, y, r); ctx.arcTo(x, y, x + w, y, r); ctx.closePath(); }

    function drawBin(b, highlight) {
      var pal = PALETTE[b.colorIdx];
      // bucket: slightly tapered
      var topInset = b.w * 0.06;
      ctx.beginPath();
      ctx.moveTo(b.x + topInset, b.y);
      ctx.lineTo(b.x + b.w - topInset, b.y);
      ctx.lineTo(b.x + b.w, b.y + b.h);
      ctx.lineTo(b.x, b.y + b.h);
      ctx.closePath();
      ctx.fillStyle = pal.d; ctx.fill();
      // front face lighter
      ctx.fillStyle = pal.c;
      roundRect(b.x + b.w * 0.06, b.y + b.h * 0.22, b.w * 0.88, b.h * 0.74, b.w * 0.08); ctx.fill();
      // rim
      ctx.fillStyle = pal.d;
      roundRect(b.x, b.y - b.h * 0.04, b.w, b.h * 0.16, b.w * 0.08); ctx.fill();
      if (highlight) { ctx.strokeStyle = '#fff'; ctx.lineWidth = Math.max(2, b.w * 0.03); roundRect(b.x - 3, b.y - b.h * 0.05, b.w + 6, b.h + b.h * 0.06, b.w * 0.09); ctx.stroke(); }
    }

    function drawGem(x, y, r, colorIdx, pop) {
      var pal = PALETTE[colorIdx];
      ctx.save(); ctx.translate(x, y); ctx.scale(1 + pop * 0.1, 1 - pop * 0.1);
      var g = ctx.createRadialGradient(-r * 0.3, -r * 0.35, r * 0.1, 0, 0, r);
      g.addColorStop(0, '#fff'); g.addColorStop(0.3, pal.c); g.addColorStop(1, pal.d);
      ctx.fillStyle = g; circle(0, 0, r); ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.7)'; circle(-r * 0.32, -r * 0.34, r * 0.16); ctx.fill();
      ctx.restore();
    }

    function render() {
      var g = ctx.createLinearGradient(0, 0, 0, H); g.addColorStop(0, '#3a2f6e'); g.addColorStop(0.6, '#2b2350'); g.addColorStop(1, '#17123a');
      ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
      // bins (highlight the one matching the current gem while dragging)
      for (var i = 0; i < bins.length; i++) drawBin(bins[i], dragging && item && bins[i].colorIdx === item.colorIdx);
      // gem
      if (item) {
        var sx = (shake > 0 && !dragging) ? Math.sin(gameT * 60) * W * 0.01 * (shake / 0.4) : 0;
        if (dragging) { ctx.save(); ctx.globalAlpha = 0.25; ctx.fillStyle = '#000'; circle(item.x, item.homeY + item.r * 2.2, item.r * 0.8); ctx.fill(); ctx.restore(); }
        drawGem(item.x + sx, item.y, item.r, item.colorIdx, 0);
      }
      for (i = 0; i < sparks.length; i++) { ctx.globalAlpha = Math.max(0, sparks[i].alpha); ctx.fillStyle = sparks[i].color; circle(sparks[i].x, sparks[i].y, sparks[i].r); ctx.fill(); }
      ctx.globalAlpha = 1;
    }
    function frame(ts) {
      if (!lastTs) lastTs = ts;
      var dt = Math.min(0.045, (ts - lastTs) / 1000); lastTs = ts;
      if (state === STATE.PLAYING) update(dt); else updateSparks(dt);
      render(); requestAnimationFrame(frame);
    }

    // ---------- Wire up ----------
    var stage = document.querySelector('.stage');
    stage.addEventListener('touchstart', onDown, { passive: false });
    stage.addEventListener('touchmove', onMove, { passive: false });
    stage.addEventListener('touchend', onUp);
    stage.addEventListener('mousedown', onDown);
    stage.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
    document.getElementById('refreshBtn').addEventListener('click', function () { location.reload(); });

    var speedPick = document.getElementById('speedPick');
    var speedBtns = speedPick.getElementsByTagName('button');
    function updateSpeedPick() { for (var i = 0; i < speedBtns.length; i++) speedBtns[i].className = (i === sizeIdx) ? 'sel' : ''; }
    function applySize(idx) { sizeIdx = idx; try { localStorage.setItem('ss2_diff', String(idx)); } catch (e) {} updateSpeedPick(); newGame(); }
    (function initState() {
      var saved = null; try { saved = localStorage.getItem('ss2_diff'); } catch (e) {}
      sizeIdx = (saved !== null && SIZES[+saved]) ? +saved : 1;
      try { best = +(localStorage.getItem('ss2_best') || 0) || 0; } catch (e) {}
      updateSpeedPick();
    })();
    for (var _i = 0; _i < speedBtns.length; _i++) { (function (b) { b.addEventListener('click', function (e) { e.stopPropagation(); applySize(+b.getAttribute('data-idx')); }); })(speedBtns[_i]); }

    function pauseGame() { if (state !== STATE.PLAYING) return; state = STATE.PAUSED; updateSpeedPick(); document.getElementById('bestLine').textContent = 'Best: ' + best + '  •  How many colours?'; document.getElementById('pauseOverlay').classList.remove('hidden'); }
    function resumeGame() { if (state !== STATE.PAUSED) return; document.getElementById('pauseOverlay').classList.add('hidden'); state = STATE.PLAYING; lastTs = 0; }
    document.getElementById('pauseBtn').addEventListener('click', function (e) { e.stopPropagation(); if (state === STATE.PLAYING) pauseGame(); else if (state === STATE.PAUSED) resumeGame(); });
    document.getElementById('resumeBtn').addEventListener('click', function (e) { e.stopPropagation(); resumeGame(); });

    window.addEventListener('resize', resize);
    window.addEventListener('orientationchange', function () { setTimeout(resize, 150); });
    document.addEventListener('visibilitychange', function () { if (!document.hidden) lastTs = 0; });
    document.addEventListener('touchmove', function (e) { e.preventDefault(); }, { passive: false });
    document.addEventListener('gesturestart', function (e) { e.preventDefault(); });
    var _iosMajor = +((navigator.userAgent.match(/ OS (\d+)_/) || [])[1] || 0);
    if (navigator.standalone && _iosMajor > 0 && _iosMajor < 13) {
      document.addEventListener('click', function (e) { var n = e.target; while (n && n.nodeName !== 'A') n = n.parentNode; if (n && n.getAttribute('href') && n.getAttribute('target') !== '_blank') { e.preventDefault(); location.href = n.getAttribute('href'); } }, false);
    }
    resize(); newGame(); requestAnimationFrame(frame);
  })();
  </script>
</body>
</html>
