<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#14833b">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Soccer Stars">
  <link rel="apple-touch-icon" href="../apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="512x512" href="../icon-512.png">
  <title>Soccer Stars</title>
  <style>
    :root {
      --you: #2a6cff;
      --opp: #ff4d4d;
      --gold: #ffd166;
      --ink: #f2fff4;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      overscroll-behavior: none;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      display: flex;
      flex-direction: column;
      height: 100vh;          /* fallback for Safari < 15.4 (e.g. iPad mini 2) */
      height: 100dvh;
      font-family: "Trebuchet MS", "Segoe UI", system-ui, sans-serif;
      color: var(--ink);
      background: linear-gradient(180deg, #0f6e30 0%, #0a4d22 60%, #063315 100%);
    }

    /* ---- Top bar ---- */
    .topbar {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: max(10px, env(safe-area-inset-top)) 14px 8px;
    }
    .back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 44px;
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 1rem;
      font-weight: 700;
      text-decoration: none;
      color: var(--ink);
      background: rgba(255, 255, 255, 0.16);
      border: 2px solid rgba(255, 255, 255, 0.4);
    }
    .back:active { transform: scale(0.95); }
    .score {
      font-size: 1.3rem;
      font-size: clamp(1.1rem, 5.5vw, 1.7rem);
      font-weight: 800;
      letter-spacing: 0.02em;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.35);
      white-space: nowrap;
    }
    .rightbtns { display: flex; }
    .rightbtns > * + * { margin-left: 8px; }
    .refresh, .pause {
      -webkit-appearance: none;
      appearance: none;
      min-width: 44px;
      min-height: 44px;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 1.15rem;
      line-height: 1;
      cursor: pointer;
      color: var(--ink);
      background: rgba(255, 255, 255, 0.16);
      border: 2px solid rgba(255, 255, 255, 0.4);
    }
    .refresh:active, .pause:active { transform: scale(0.95); }

    /* ---- Stage / canvas ---- */
    .stage {
      flex: 1 1 auto;
      position: relative;
      min-height: 0;
      display: flex;
      align-items: stretch;
      justify-content: center;
    }
    canvas#game { display: block; width: 100%; height: 100%; touch-action: none; }

    /* ---- Overlays ---- */
    .overlay {
      position: absolute;
      top: 0; right: 0; bottom: 0; left: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 22px;
      background: rgba(6, 51, 21, 0.82);
      -webkit-backdrop-filter: blur(3px);
      backdrop-filter: blur(3px);
      z-index: 5;
      overflow-y: auto;
    }
    .overlay > * + * { margin-top: 14px; }
    .overlay.hidden { display: none; }
    .overlay h2 {
      font-size: 2rem;
      font-size: clamp(1.7rem, 8vw, 3rem);
      color: var(--gold);
      text-shadow: 0 3px 0 rgba(0,0,0,0.25);
    }
    .overlay p { font-size: 1.05rem; font-size: clamp(0.98rem, 4vw, 1.25rem); color: rgba(242, 255, 244, 0.92); max-width: 27ch; }

    .modepick { display: flex; justify-content: center; }
    .modepick > * + * { margin-left: 16px; }
    .modebtn {
      -webkit-appearance: none; appearance: none;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-width: 120px; min-height: 120px;
      padding: 14px; border-radius: 22px; cursor: pointer;
      color: var(--ink);
      background: rgba(255,255,255,0.12);
      border: 3px solid rgba(255,255,255,0.35);
    }
    .modebtn > * + * { margin-top: 10px; }
    .modebtn:active { transform: scale(0.96); }
    .modebtn.sel { border-color: var(--gold); background: rgba(255,209,102,0.18); }
    .modebtn .lbl { font-size: 1.4rem; font-weight: 800; }
    .dots { display: flex; align-items: center; justify-content: center; }
    .dots > * + * { margin-left: 5px; }
    .dot { width: 18px; height: 18px; border-radius: 50%; display: inline-block; }
    .dot.b { background: var(--you); box-shadow: 0 0 8px rgba(42,108,255,0.6); }
    .dot.r { background: var(--opp); box-shadow: 0 0 8px rgba(255,77,77,0.6); }
    .vs { font-size: 1rem; font-weight: 800; opacity: 0.8; margin: 0 4px; }

    .roster {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      width: min(100%, 380px);
    }
    .charTile {
      -webkit-appearance: none; appearance: none;
      position: relative;
      display: flex; align-items: center; justify-content: center;
      padding: 6px; border-radius: 18px; cursor: pointer;
      background: rgba(255,255,255,0.1);
      border: 3px solid rgba(255,255,255,0.3);
    }
    .charTile:active { transform: scale(0.95); }
    .charTile.sel { border-color: var(--gold); background: rgba(255,209,102,0.2); }
    .charTile canvas { display: block; width: 84px; height: 84px; }
    .charTile .pick { position: absolute; top: 4px; right: 6px; font-size: 1.2rem; display: none; }
    .charTile.sel .pick { display: block; }

    .diffpick { display: flex; flex-wrap: wrap; justify-content: center; }
    .diffpick > * + * { margin-left: 10px; }
    .diffpick button {
      -webkit-appearance: none; appearance: none;
      display: flex; flex-direction: column; align-items: center;
      min-width: 64px; min-height: 64px; padding: 8px 10px;
      border-radius: 16px; font-size: 1.6rem; line-height: 1; cursor: pointer;
      color: var(--ink);
      background: rgba(255,255,255,0.12);
      border: 2px solid rgba(255,255,255,0.3);
    }
    .diffpick button span { display: block; margin-top: 4px; font-size: 0.72rem; font-weight: 700; opacity: 0.85; }
    .diffpick button.sel { border-color: var(--gold); background: rgba(255,209,102,0.18); transform: scale(1.05); }
    .diffpick button:active { transform: scale(0.95); }

    .bigbtn {
      min-height: 60px;
      padding: 14px 34px;
      font-size: 1.3rem;
      font-size: clamp(1.1rem, 5vw, 1.5rem);
      font-weight: 800;
      color: #06280f;
      border: none;
      border-radius: 999px;
      background: linear-gradient(135deg, #ffe27a, #ffb03d);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.4);
      cursor: pointer;
    }
    .bigbtn:active { transform: scale(0.96); }
    .bigbtn[disabled] { opacity: 0.4; box-shadow: none; }
    .linkbtn {
      -webkit-appearance: none; appearance: none;
      background: none; border: none; cursor: pointer;
      color: rgba(242,255,244,0.8);
      font-size: 1rem; font-weight: 700; text-decoration: underline;
      padding: 8px;
    }
    .smallrow { display: flex; align-items: center; justify-content: center; }
    .smallrow > * + * { margin-left: 18px; }
  </style>
</head>
<body>
  <div class="topbar">
    <a class="back" href="../index.html">⬅️ Back</a>
    <div class="score" id="score">🥅 Soccer Stars</div>
    <div class="rightbtns">
      <button class="pause" id="pauseBtn" aria-label="Pause">⏸️</button>
      <button class="refresh" id="refreshBtn" aria-label="Refresh game">🔄</button>
    </div>
  </div>

  <div class="stage">
    <canvas id="game"></canvas>

    <div class="overlay" id="startOverlay">
      <div id="stepMode">
        <h2>🥅 Soccer Stars</h2>
        <p>How many players on each team?</p>
        <div class="modepick">
          <button class="modebtn" data-mode="1">
            <span class="dots"><i class="dot b"></i><span class="vs">vs</span><i class="dot r"></i></span>
            <span class="lbl">1 v 1</span>
          </button>
          <button class="modebtn" data-mode="2">
            <span class="dots"><i class="dot b"></i><i class="dot b"></i><span class="vs">vs</span><i class="dot r"></i><i class="dot r"></i></span>
            <span class="lbl">2 v 2</span>
          </button>
        </div>
      </div>

      <div id="stepTeam" style="display:none;">
        <h2 id="teamTitle">Pick your team!</h2>
        <p id="teamHint">Tap a player to join your team.</p>
        <p style="font-size:0.95rem;opacity:0.82;">Hold and slide anywhere to run your player. Bump into the ball to kick it — run at it hard to shoot for the net! ⚽🥅</p>
        <div class="roster" id="roster"></div>
        <p>Match speed:</p>
        <div class="diffpick" id="diffPickStart">
          <button data-idx="0">🐢<span>Easy</span></button>
          <button data-idx="1">🙂<span>Normal</span></button>
          <button data-idx="2">🐇<span>Hard</span></button>
        </div>
        <div class="smallrow">
          <button class="linkbtn" id="backToMode">⬅️ Change</button>
          <button class="bigbtn" id="kickoffBtn" disabled>⚽ Kick off!</button>
        </div>
      </div>
    </div>

    <div class="overlay hidden" id="pauseOverlay">
      <h2>Paused</h2>
      <p>Match speed:</p>
      <div class="diffpick" id="diffPick">
        <button data-idx="0">🐢<span>Easy</span></button>
        <button data-idx="1">🙂<span>Normal</span></button>
        <button data-idx="2">🐇<span>Hard</span></button>
      </div>
      <button class="bigbtn" id="resumeBtn">▶️ Resume</button>
      <button class="linkbtn" id="newTeamsBtn">🔀 New teams</button>
    </div>

    <div class="overlay hidden" id="overOverlay">
      <h2 id="overTitle">🏆 You win!</h2>
      <p id="overScore">3 – 1</p>
      <button class="bigbtn" id="playAgainBtn">🔁 Play Again</button>
      <button class="linkbtn" id="overNewTeams">🔀 New teams</button>
    </div>
  </div>


  <script>
  (function () {
    'use strict';

    var canvas = document.getElementById('game');
    var ctx = canvas.getContext('2d');
    var scoreEl = document.getElementById('score');

    var STATE = { START: 0, PLAYING: 1, OVER: 2, PAUSED: 3, CELEBRATE: 4 };
    var state = STATE.START;

    var W = 0, H = 0, dpr = 1;
    var WIN_GOALS = 3;

    var CHARS = [
      { type: 'fox',   fur: '#ff8a3d', ear: '#c85a1e' },
      { type: 'panda', fur: '#f4f6fb', ear: '#2b2b33' },
      { type: 'bunny', fur: '#f3f0ff', ear: '#e79fc4' },
      { type: 'frog',  fur: '#5fce5f', ear: '#3fa53f' },
      { type: 'cat',   fur: '#b8b8c6', ear: '#8f8fa0' },
      { type: 'duck',  fur: '#ffd24a', ear: '#ff9e2c' }
    ];
    var YOU_KIT = '#2a6cff', OPP_KIT = '#ff4d4d';

    // Difficulty: how quick/strong the opponent outfielders are.
    var DIFF = [
      { opp: 0.70, keeper: 0.90, icon: '🐢' },
      { opp: 0.90, keeper: 1.05, icon: '🙂' },
      { opp: 1.10, keeper: 1.20, icon: '🐇' }
    ];
    var diffIdx = 0;

    var mode = 1, youChoice = [], oppChoice = [];

    var players = [], ball = null;
    var scoreYou = 0, scoreOpp = 0, kickoffSide = 'you';
    var celebrateT = 0, celebrateText = '';
    var activeRef = null;                   // you-field player being steered (with hysteresis)
    var kickoffGrace = 0;                   // opponents hold back briefly so the kids get first touch
    var lastTs = 0;

    // Floating joystick
    var stick = { active: false, ox: 0, oy: 0, dx: 0, dy: 0, mag: 0 };

    var R, BR, MOUTH, TOPM, BOTM, LGOAL, RGOAL, MIDY;
    var YOU_SPEED, OPP_SPEED, KEEP_SPEED, BALL_FR, KICK_MUL, KICK_MIN, KICK_MAX, WALL_BOUNCE, STICK_DEAD, STICK_MAXR;

    function computeTunables() {
      R = H * 0.052;
      BR = H * 0.026;
      MOUTH = H * 0.34;
      TOPM = H * 0.05;
      BOTM = H * 0.95;
      LGOAL = W * 0.06;
      RGOAL = W * 0.94;
      MIDY = H / 2;
      YOU_SPEED = H * 0.60;                       // you always run faster than the opponent
      OPP_SPEED = H * 0.32 * DIFF[diffIdx].opp;
      KEEP_SPEED = H * 0.55 * DIFF[diffIdx].keeper;
      BALL_FR = 1.15;                             // ball friction (per second)
      KICK_MUL = 1.7;                             // ball speed = player speed * this
      KICK_MIN = H * 0.11;                        // gentle touch still nudges the ball
      KICK_MAX = H * 1.15;                        // cap on a full-power shot
      WALL_BOUNCE = 0.72;
      STICK_DEAD = R * 0.35;
      STICK_MAXR = R * 2.0;
    }

    function rand(a, b) { return a + Math.random() * (b - a); }
    function clamp(v, a, b) { return v < a ? a : (v > b ? b : v); }
    function dist2(ax, ay, bx, by) { var dx = ax - bx, dy = ay - by; return dx * dx + dy * dy; }

    function resize() {
      var rect = canvas.parentNode.getBoundingClientRect();
      W = Math.max(240, Math.floor(rect.width));
      H = Math.max(240, Math.floor(rect.height));
      dpr = window.devicePixelRatio || 1;
      canvas.width = Math.round(W * dpr);
      canvas.height = Math.round(H * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      computeTunables();
      render._h = -1;
    }

    // ---------- Setup ----------
    function formationSpot(side, role, idx) {
      var s = {};
      if (role === 'keeper') {
        s.x = (side === 'you') ? LGOAL + R * 0.7 : RGOAL - R * 0.7;
        s.y = MIDY;
        return s;
      }
      var baseX = (side === 'you') ? W * 0.30 : W * 0.70;
      if (mode === 1) { s.x = baseX; s.y = MIDY; }
      else { s.x = baseX; s.y = (idx === 0) ? MIDY - H * 0.17 : MIDY + H * 0.17; }
      return s;
    }
    function makePlayer(side, role, char, idx) {
      var sp = formationSpot(side, role, idx);
      return {
        side: side, role: role, char: char, idx: idx,
        x: sp.x, y: sp.y, vx: 0, vy: 0, hold: 0,
        kit: (side === 'you') ? YOU_KIT : OPP_KIT,
        attack: (side === 'you') ? 1 : -1
      };
    }
    function buildTeams() {
      players = [];
      var n = mode;
      players.push(makePlayer('you', 'keeper', CHARS[youChoice[0]], -1));
      players.push(makePlayer('opp', 'keeper', CHARS[oppChoice[0]], -1));
      for (var i = 0; i < n; i++) {
        players.push(makePlayer('you', 'field', CHARS[youChoice[i]], i));
        players.push(makePlayer('opp', 'field', CHARS[oppChoice[i]], i));
      }
    }
    function resetPositions() {
      for (var i = 0; i < players.length; i++) {
        var p = players[i];
        var sp = formationSpot(p.side, p.role, p.idx < 0 ? 0 : p.idx);
        p.x = sp.x; p.y = sp.y; p.vx = 0; p.vy = 0; p.hold = 0;
      }
      ball = { x: W / 2, y: MIDY, vx: 0, vy: 0, sndCd: 0 };
      activeRef = null;
      kickoffGrace = 0.9;
      stick.active = false; stick.mag = 0;
      var chaser = nearestFieldPlayer(kickoffSide, ball);
      if (chaser) { chaser.x = ball.x - chaser.attack * (R + BR) * 1.4; chaser.y = ball.y; activeRef = chaser; }
    }
    function newMatch() {
      scoreYou = 0; scoreOpp = 0; kickoffSide = 'you';
      buildTeams(); resetPositions(); updateScore();
    }

    // ---------- Helpers ----------
    function nearestFieldPlayer(side, pt) {
      var best = null, bd = Infinity;
      for (var i = 0; i < players.length; i++) {
        var p = players[i];
        if (p.side !== side || p.role !== 'field') continue;
        var d = dist2(p.x, p.y, pt.x, pt.y);
        if (d < bd) { bd = d; best = p; }
      }
      return best;
    }
    // The field player you're steering: the you-field player nearest the ball,
    // with a little stickiness so control doesn't flip between team-mates.
    function activePlayer() {
      var best = null, bd = Infinity, i, p, d;
      for (i = 0; i < players.length; i++) {
        p = players[i];
        if (p.side !== 'you' || p.role !== 'field') continue;
        d = dist2(p.x, p.y, ball.x, ball.y);
        if (d < bd) { bd = d; best = p; }
      }
      if (activeRef && activeRef.side === 'you' && activeRef.role === 'field' && activeRef !== best) {
        var cd = Math.sqrt(dist2(activeRef.x, activeRef.y, ball.x, ball.y));
        if (cd <= Math.sqrt(bd) + R * 1.6) best = activeRef;   // keep current unless clearly beaten
      }
      activeRef = best;
      return best;
    }

    // ---------- Movement ----------
    function moveToward(p, tx, ty, speed, dt) {
      var dx = tx - p.x, dy = ty - p.y;
      var d = Math.sqrt(dx * dx + dy * dy);
      var step = speed * dt;
      if (d <= step || d < 0.0001) { p.vx = 0; p.vy = 0; }
      else { var nx = dx / d, ny = dy / d; p.x += nx * step; p.y += ny * step; p.vx = nx * speed; p.vy = ny * speed; }
      p.x = clamp(p.x, R, W - R);
      p.y = clamp(p.y, TOPM + R * 0.4, BOTM - R * 0.4);
    }

    // ---------- Update ----------
    // Pure physics: you steer one player; running your body into the ball kicks
    // it away with momentum. No possession model, no shoot/pass buttons — a
    // gentle touch dribbles, a hard run shoots. Everyone (keepers included) bumps
    // the ball the same way.
    function update(dt) {
      if (kickoffGrace > 0) kickoffGrace -= dt;
      var active = activePlayer();
      movePlayers(active, dt);
      updateBall(dt);
      if (state === STATE.PLAYING) collideBall();   // skip if a goal just flipped state
    }

    function movePlayers(active, dt) {
      for (var i = 0; i < players.length; i++) {
        var p = players[i];

        if (p.role === 'keeper') {
          var gx = (p.side === 'you') ? LGOAL + R * 0.7 : RGOAL - R * 0.7;
          var gy = clamp(ball.y + ball.vy * 0.12, MIDY - MOUTH * 0.5, MIDY + MOUTH * 0.5);  // anticipate
          moveToward(p, gx, gy, KEEP_SPEED, dt);
          continue;
        }

        if (p === active) {
          if (stick.active && stick.mag > 0) {
            var sp = YOU_SPEED * stick.mag;
            p.x = clamp(p.x + stick.dx * sp * dt, R, W - R);
            p.y = clamp(p.y + stick.dy * sp * dt, TOPM + R * 0.4, BOTM - R * 0.4);
            p.vx = stick.dx * sp; p.vy = stick.dy * sp;
          } else { p.vx = 0; p.vy = 0; }
          continue;
        }

        if (p.side === 'you') {
          // off-ball team-mate: hold a support spot goal-side of the ball, kept
          // clear of the ball so it never steals control from the player.
          var suppX = clamp(ball.x + p.attack * W * 0.16, W * 0.14, W * 0.86);
          var suppY = (ball.y < MIDY) ? MIDY + H * 0.15 : MIDY - H * 0.15;
          moveToward(p, suppX, suppY, YOU_SPEED * 0.5, dt);
        } else if (kickoffGrace > 0) {
          // kickoff grace: opponents return to formation so the kids reach the ball first
          var fs = formationSpot('opp', 'field', p.idx < 0 ? 0 : p.idx);
          moveToward(p, fs.x, fs.y, OPP_SPEED, dt);
        } else {
          chaseToGoal(p, OPP_SPEED, dt);   // opponent outfielder
        }
      }
    }

    // Steer an outfielder to get behind the ball, then charge it toward the goal
    // it attacks — so it bumps the ball goalward.
    function chaseToGoal(p, speed, dt) {
      var goalX = (p.attack > 0) ? RGOAL : LGOAL;
      var behindSign = (p.attack > 0) ? -1 : 1;               // which side of the ball to attack from
      var behind = (p.x - ball.x) * behindSign > R * 0.4;
      var tx, ty;
      if (behind) { tx = goalX; ty = ball.y * 0.7 + MIDY * 0.3; }
      else { tx = ball.x + behindSign * (R + BR) * 2.4; ty = ball.y; }
      moveToward(p, tx, ty, speed, dt);
    }

    // ---------- Ball ----------
    function updateBall(dt) {
      if (ball.sndCd > 0) ball.sndCd -= dt;
      ball.x += ball.vx * dt;
      ball.y += ball.vy * dt;
      var fr = BALL_FR * dt;
      ball.vx -= ball.vx * fr;
      ball.vy -= ball.vy * fr;

      if (ball.y < TOPM + BR) { ball.y = TOPM + BR; ball.vy = Math.abs(ball.vy) * WALL_BOUNCE; }
      if (ball.y > BOTM - BR) { ball.y = BOTM - BR; ball.vy = -Math.abs(ball.vy) * WALL_BOUNCE; }
      if (ball.x <= LGOAL + BR) {
        if (Math.abs(ball.y - MIDY) < MOUTH / 2) { onGoal('opp'); return; }
        ball.x = LGOAL + BR; ball.vx = Math.abs(ball.vx) * WALL_BOUNCE;
      }
      if (ball.x >= RGOAL - BR) {
        if (Math.abs(ball.y - MIDY) < MOUTH / 2) { onGoal('you'); return; }
        ball.x = RGOAL - BR; ball.vx = -Math.abs(ball.vx) * WALL_BOUNCE;
      }
    }

    // Bump the ball off any player it overlaps: push it clear and give it speed
    // scaled by how fast the player is moving, biased in the player's heading.
    function collideBall() {
      for (var i = 0; i < players.length; i++) {
        var p = players[i];
        // Your keeper is a big, reliable wall; the opponent keeper is softer so the
        // kids can score. Outfielders use a normal body-sized reach.
        var reach = (p.role === 'keeper' ? (p.side === 'you' ? R * 1.3 : R * 0.95) : R * 0.9) + BR;
        var dx = ball.x - p.x, dy = ball.y - p.y;
        var d = Math.sqrt(dx * dx + dy * dy);
        if (d >= reach) continue;
        var nx, ny;
        if (d < 0.001) { nx = p.attack; ny = 0; } else { nx = dx / d; ny = dy / d; }
        ball.x = p.x + nx * reach;
        ball.y = p.y + ny * reach;
        var psp = Math.sqrt(p.vx * p.vx + p.vy * p.vy);
        var kick = clamp(psp * KICK_MUL + KICK_MIN, KICK_MIN, KICK_MAX);
        var kx = nx, ky = ny;
        if (psp > 1) {                                  // blend player heading in so pushes steer
          kx = nx + p.vx / psp; ky = ny + p.vy / psp;
          var kl = Math.sqrt(kx * kx + ky * ky) || 1; kx /= kl; ky /= kl;
        }
        ball.vx = kx * kick;
        ball.vy = ky * kick;
        if (ball.sndCd <= 0) { sfx('kick'); ball.sndCd = 0.12; }
      }
    }

    // ---------- Goals / flow ----------
    function onGoal(scorer) {
      if (scorer === 'you') scoreYou++; else scoreOpp++;
      updateScore();
      sfx('goal');
      kickoffSide = (scorer === 'you') ? 'opp' : 'you';
      if (scoreYou >= WIN_GOALS || scoreOpp >= WIN_GOALS) { endMatch(); return; }
      celebrateText = (scorer === 'you') ? 'GOAL! 🎉' : 'They scored!';
      celebrateT = 1.3;
      state = STATE.CELEBRATE;
    }
    function endMatch() {
      state = STATE.OVER;
      var win = scoreYou > scoreOpp;
      document.getElementById('overTitle').textContent = win ? '🏆 You win!' : '😅 So close!';
      document.getElementById('overScore').textContent = scoreYou + ' – ' + scoreOpp;
      document.getElementById('overOverlay').classList.remove('hidden');
    }
    function updateScore() { scoreEl.textContent = '🔵 ' + scoreYou + ' – ' + scoreOpp + ' 🔴'; }

    // ---------- Sound ----------
    var actx = null;
    function initAudio() {
      if (actx) { if (actx.state === 'suspended') actx.resume(); return; }
      try { actx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { actx = null; }
    }
    function tone(freq, start, dur, type, vol) {
      if (!actx) return;
      var o = actx.createOscillator(), g = actx.createGain();
      o.type = type || 'square';
      o.frequency.value = freq;
      var t = actx.currentTime + start;
      g.gain.setValueAtTime(0.0001, t);
      g.gain.exponentialRampToValueAtTime(vol || 0.18, t + 0.01);
      g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
      o.connect(g); g.connect(actx.destination);
      o.start(t); o.stop(t + dur + 0.02);
    }
    function sfx(kind) {
      if (!actx) return;
      if (kind === 'kick') tone(185, 0, 0.09, 'square', 0.22);
      else if (kind === 'pass') tone(300, 0, 0.08, 'triangle', 0.16);
      else if (kind === 'save') tone(150, 0, 0.12, 'sawtooth', 0.15);
      else if (kind === 'goal') { tone(523, 0, 0.12, 'square', 0.2); tone(659, 0.12, 0.12, 'square', 0.2); tone(784, 0.24, 0.22, 'square', 0.22); }
      else if (kind === 'whistle') tone(1000, 0, 0.12, 'sawtooth', 0.14);
    }

    // ---------- Drawing helpers ----------
    function roundRectFull(c, x, y, w, h, r) {
      c.beginPath();
      c.moveTo(x + r, y);
      c.arcTo(x + w, y, x + w, y + h, r);
      c.arcTo(x + w, y + h, x, y + h, r);
      c.arcTo(x, y + h, x, y, r);
      c.arcTo(x, y, x + w, y, r);
      c.closePath();
    }
    function tri(c, x1, y1, x2, y2, x3, y3) { c.beginPath(); c.moveTo(x1, y1); c.lineTo(x2, y2); c.lineTo(x3, y3); c.closePath(); c.fill(); }

    function drawHead(c, hx, hy, hr, char) {
      var t = char.type;
      c.fillStyle = char.ear;
      if (t === 'fox' || t === 'cat') {
        tri(c, hx - hr * 0.7, hy - hr * 0.4, hx - hr * 0.2, hy - hr * 1.25, hx - hr * 0.05, hy - hr * 0.55);
        tri(c, hx + hr * 0.7, hy - hr * 0.4, hx + hr * 0.2, hy - hr * 1.25, hx + hr * 0.05, hy - hr * 0.55);
      } else if (t === 'panda') {
        c.beginPath(); c.arc(hx - hr * 0.7, hy - hr * 0.7, hr * 0.42, 0, Math.PI * 2); c.fill();
        c.beginPath(); c.arc(hx + hr * 0.7, hy - hr * 0.7, hr * 0.42, 0, Math.PI * 2); c.fill();
      } else if (t === 'bunny') {
        roundRectFull(c, hx - hr * 0.55, hy - hr * 1.7, hr * 0.36, hr * 1.3, hr * 0.18); c.fill();
        roundRectFull(c, hx + hr * 0.2, hy - hr * 1.7, hr * 0.36, hr * 1.3, hr * 0.18); c.fill();
      }
      c.fillStyle = char.fur;
      c.beginPath(); c.arc(hx, hy, hr, 0, Math.PI * 2); c.fill();
      if (t === 'frog') {
        c.fillStyle = char.fur;
        c.beginPath(); c.arc(hx - hr * 0.5, hy - hr * 0.7, hr * 0.42, 0, Math.PI * 2); c.fill();
        c.beginPath(); c.arc(hx + hr * 0.5, hy - hr * 0.7, hr * 0.42, 0, Math.PI * 2); c.fill();
        c.fillStyle = '#fff';
        c.beginPath(); c.arc(hx - hr * 0.5, hy - hr * 0.7, hr * 0.26, 0, Math.PI * 2); c.fill();
        c.beginPath(); c.arc(hx + hr * 0.5, hy - hr * 0.7, hr * 0.26, 0, Math.PI * 2); c.fill();
        c.fillStyle = '#111';
        c.beginPath(); c.arc(hx - hr * 0.5, hy - hr * 0.68, hr * 0.12, 0, Math.PI * 2); c.fill();
        c.beginPath(); c.arc(hx + hr * 0.5, hy - hr * 0.68, hr * 0.12, 0, Math.PI * 2); c.fill();
        c.strokeStyle = '#2f7d2f'; c.lineWidth = hr * 0.12;
        c.beginPath(); c.arc(hx, hy + hr * 0.1, hr * 0.5, 0.15 * Math.PI, 0.85 * Math.PI); c.stroke();
        return;
      }
      if (t === 'panda') {
        c.fillStyle = '#2b2b33';
        c.beginPath(); c.ellipse ? c.ellipse(hx - hr * 0.38, hy - hr * 0.05, hr * 0.26, hr * 0.34, 0, 0, Math.PI * 2) : c.arc(hx - hr * 0.38, hy - hr * 0.05, hr * 0.28, 0, Math.PI * 2); c.fill();
        c.beginPath(); c.ellipse ? c.ellipse(hx + hr * 0.38, hy - hr * 0.05, hr * 0.26, hr * 0.34, 0, 0, Math.PI * 2) : c.arc(hx + hr * 0.38, hy - hr * 0.05, hr * 0.28, 0, Math.PI * 2); c.fill();
      }
      c.fillStyle = '#fff';
      c.beginPath(); c.arc(hx - hr * 0.33, hy - hr * 0.05, hr * 0.2, 0, Math.PI * 2); c.fill();
      c.beginPath(); c.arc(hx + hr * 0.33, hy - hr * 0.05, hr * 0.2, 0, Math.PI * 2); c.fill();
      c.fillStyle = '#111';
      c.beginPath(); c.arc(hx - hr * 0.30, hy - hr * 0.03, hr * 0.1, 0, Math.PI * 2); c.fill();
      c.beginPath(); c.arc(hx + hr * 0.30, hy - hr * 0.03, hr * 0.1, 0, Math.PI * 2); c.fill();
      if (t === 'duck') {
        c.fillStyle = char.ear;
        roundRectFull(c, hx - hr * 0.34, hy + hr * 0.18, hr * 0.68, hr * 0.3, hr * 0.12); c.fill();
      } else {
        c.fillStyle = '#3a2a2a';
        c.beginPath(); c.arc(hx, hy + hr * 0.28, hr * 0.12, 0, Math.PI * 2); c.fill();
      }
      if (t === 'cat') {
        c.strokeStyle = 'rgba(60,60,70,0.7)'; c.lineWidth = Math.max(1, hr * 0.06);
        for (var w = -1; w <= 1; w++) {
          c.beginPath(); c.moveTo(hx - hr * 0.2, hy + hr * 0.28 + w * hr * 0.14); c.lineTo(hx - hr * 0.9, hy + hr * 0.2 + w * hr * 0.22); c.stroke();
          c.beginPath(); c.moveTo(hx + hr * 0.2, hy + hr * 0.28 + w * hr * 0.14); c.lineTo(hx + hr * 0.9, hy + hr * 0.2 + w * hr * 0.22); c.stroke();
        }
      }
    }
    function drawPlayerShape(c, x, y, r, kit, char, gloves) {
      c.fillStyle = 'rgba(0,0,0,0.22)';
      c.beginPath(); c.ellipse ? c.ellipse(x, y + r * 0.95, r * 0.9, r * 0.35, 0, 0, Math.PI * 2) : c.arc(x, y + r * 0.9, r * 0.8, 0, Math.PI * 2); c.fill();
      c.fillStyle = '#2a2a33';
      c.beginPath(); c.arc(x - r * 0.4, y + r * 0.8, r * 0.24, 0, Math.PI * 2); c.fill();
      c.beginPath(); c.arc(x + r * 0.4, y + r * 0.8, r * 0.24, 0, Math.PI * 2); c.fill();
      c.fillStyle = kit;
      roundRectFull(c, x - r * 0.62, y - r * 0.1, r * 1.24, r * 1.0, r * 0.4); c.fill();
      c.fillStyle = 'rgba(255,255,255,0.28)';
      roundRectFull(c, x - r * 0.14, y - r * 0.05, r * 0.28, r * 0.9, r * 0.12); c.fill();
      c.strokeStyle = 'rgba(0,0,0,0.25)'; c.lineWidth = Math.max(1, r * 0.08);
      roundRectFull(c, x - r * 0.62, y - r * 0.1, r * 1.24, r * 1.0, r * 0.4); c.stroke();
      if (gloves) {
        c.fillStyle = '#ffe27a';
        c.beginPath(); c.arc(x - r * 0.72, y + r * 0.2, r * 0.26, 0, Math.PI * 2); c.fill();
        c.beginPath(); c.arc(x + r * 0.72, y + r * 0.2, r * 0.26, 0, Math.PI * 2); c.fill();
      }
      drawHead(c, x, y - r * 0.45, r * 0.6, char);
    }
    function pentagon(c, x, y, r) {
      c.beginPath();
      for (var i = 0; i < 5; i++) {
        var a = -Math.PI / 2 + i * Math.PI * 2 / 5;
        var px = x + Math.cos(a) * r, py = y + Math.sin(a) * r;
        if (i === 0) c.moveTo(px, py); else c.lineTo(px, py);
      }
      c.closePath(); c.fill();
    }
    function drawBall(x, y, r) {
      ctx.fillStyle = 'rgba(0,0,0,0.22)';
      ctx.beginPath(); ctx.ellipse ? ctx.ellipse(x, y + r * 0.7, r * 0.9, r * 0.35, 0, 0, Math.PI * 2) : ctx.arc(x, y + r * 0.6, r * 0.8, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#ffffff';
      ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = 'rgba(0,0,0,0.35)'; ctx.lineWidth = Math.max(1, r * 0.12); ctx.stroke();
      ctx.fillStyle = '#222';
      pentagon(ctx, x, y, r * 0.42);
      ctx.beginPath(); ctx.arc(x - r * 0.66, y - r * 0.3, r * 0.16, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(x + r * 0.66, y - r * 0.3, r * 0.16, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(x, y + r * 0.7, r * 0.16, 0, Math.PI * 2); ctx.fill();
    }

    function drawPitch() {
      var bands = 8, bw = W / bands;
      for (var i = 0; i < bands; i++) {
        ctx.fillStyle = (i % 2 === 0) ? '#1e9344' : '#1a8a3e';
        ctx.fillRect(i * bw, 0, bw + 1, H);
      }
      ctx.strokeStyle = 'rgba(255,255,255,0.6)';
      ctx.lineWidth = Math.max(2, H * 0.006);
      ctx.strokeRect(LGOAL, TOPM, RGOAL - LGOAL, BOTM - TOPM);
      ctx.beginPath(); ctx.moveTo(W / 2, TOPM); ctx.lineTo(W / 2, BOTM); ctx.stroke();
      ctx.beginPath(); ctx.arc(W / 2, MIDY, H * 0.12, 0, Math.PI * 2); ctx.stroke();
      var boxW = W * 0.10, boxH = MOUTH + H * 0.14;
      ctx.strokeRect(LGOAL, MIDY - boxH / 2, boxW, boxH);
      ctx.strokeRect(RGOAL - boxW, MIDY - boxH / 2, boxW, boxH);
      drawGoal(LGOAL, -1);
      drawGoal(RGOAL, 1);
    }
    function drawGoal(lineX, dir) {
      var depth = W * 0.03;
      var y0 = MIDY - MOUTH / 2, y1 = MIDY + MOUTH / 2, backX = lineX - dir * depth;
      ctx.fillStyle = 'rgba(255,255,255,0.12)';
      ctx.fillRect(Math.min(lineX, backX), y0, depth, MOUTH);
      ctx.strokeStyle = 'rgba(255,255,255,0.5)'; ctx.lineWidth = 1.5;
      var j, step = MOUTH / 6;
      for (j = 0; j <= 6; j++) { var yy = y0 + j * step; ctx.beginPath(); ctx.moveTo(lineX, yy); ctx.lineTo(backX, yy); ctx.stroke(); }
      for (j = 0; j <= 3; j++) { var xx = lineX - dir * (depth * j / 3); ctx.beginPath(); ctx.moveTo(xx, y0); ctx.lineTo(xx, y1); ctx.stroke(); }
      ctx.strokeStyle = '#ffffff'; ctx.lineWidth = Math.max(3, H * 0.008);
      ctx.beginPath(); ctx.moveTo(backX, y0); ctx.lineTo(lineX, y0); ctx.lineTo(lineX, y1); ctx.lineTo(backX, y1); ctx.stroke();
    }

    function render(ts) {
      drawPitch();
      var active = (state === STATE.PLAYING || state === STATE.CELEBRATE) ? activePlayer() : null;

      var order = players.slice().sort(function (a, b) { return a.y - b.y; });
      for (var i = 0; i < order.length; i++) {
        var p = order[i];
        if (p === active) {
          ctx.strokeStyle = 'rgba(255,209,102,0.95)';
          ctx.lineWidth = Math.max(3, R * 0.14);
          ctx.beginPath(); ctx.arc(p.x, p.y + R * 0.7, R * 0.98, 0, Math.PI * 2); ctx.stroke();
        }
        drawPlayerShape(ctx, p.x, p.y, R, p.kit, p.char, p.role === 'keeper');
      }

      if (ball) drawBall(ball.x, ball.y, BR);

      // joystick
      if (stick.active && state === STATE.PLAYING) {
        ctx.strokeStyle = 'rgba(255,255,255,0.35)';
        ctx.lineWidth = Math.max(2, R * 0.1);
        ctx.beginPath(); ctx.arc(stick.ox, stick.oy, STICK_MAXR, 0, Math.PI * 2); ctx.stroke();
        var kx = stick.ox + stick.dx * stick.mag * STICK_MAXR;
        var ky = stick.oy + stick.dy * stick.mag * STICK_MAXR;
        ctx.fillStyle = 'rgba(255,255,255,0.5)';
        ctx.beginPath(); ctx.arc(kx, ky, R * 0.7, 0, Math.PI * 2); ctx.fill();
      }

      if (state === STATE.CELEBRATE) {
        ctx.fillStyle = 'rgba(0,0,0,0.35)';
        ctx.fillRect(0, MIDY - H * 0.11, W, H * 0.22);
        ctx.fillStyle = '#ffd166';
        ctx.font = '800 ' + Math.floor(H * 0.12) + 'px "Trebuchet MS", sans-serif';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(celebrateText, W / 2, MIDY);
        ctx.textAlign = 'start';
      }
    }

    function frame(ts) {
      if (!lastTs) lastTs = ts;
      var dt = Math.min(0.045, (ts - lastTs) / 1000);
      lastTs = ts;
      if (state === STATE.PLAYING) update(dt);
      else if (state === STATE.CELEBRATE) {
        celebrateT -= dt;
        if (celebrateT <= 0) { resetPositions(); state = STATE.PLAYING; sfx('whistle'); }
      }
      render(ts);
      requestAnimationFrame(frame);
    }

    // ---------- Joystick input ----------
    function pointFrom(e) {
      var rect = canvas.getBoundingClientRect();
      var cx, cy;
      if (e.touches && e.touches[0]) { cx = e.touches[0].clientX; cy = e.touches[0].clientY; }
      else if (e.changedTouches && e.changedTouches[0]) { cx = e.changedTouches[0].clientX; cy = e.changedTouches[0].clientY; }
      else { cx = e.clientX; cy = e.clientY; }
      return { x: (cx - rect.left) * (W / rect.width), y: (cy - rect.top) * (H / rect.height) };
    }
    function stickStart(e) {
      if (e.target && e.target.closest && e.target.closest('button, a')) return;
      if (state !== STATE.PLAYING) return;
      e.preventDefault();
      var p = pointFrom(e);
      stick.active = true; stick.ox = p.x; stick.oy = p.y; stick.dx = 0; stick.dy = 0; stick.mag = 0;
    }
    function stickMove(e) {
      if (!stick.active) return;
      e.preventDefault();
      var p = pointFrom(e);
      var vx = p.x - stick.ox, vy = p.y - stick.oy;
      var len = Math.sqrt(vx * vx + vy * vy);
      if (len < STICK_DEAD) { stick.mag = 0; return; }
      stick.dx = vx / len; stick.dy = vy / len;
      stick.mag = clamp((len - STICK_DEAD) / (STICK_MAXR - STICK_DEAD), 0, 1);
    }
    function stickEnd() { stick.active = false; stick.mag = 0; }

    var stage = document.querySelector('.stage');
    stage.addEventListener('touchstart', stickStart, { passive: false });
    stage.addEventListener('touchmove', stickMove, { passive: false });
    stage.addEventListener('touchend', stickEnd);
    stage.addEventListener('touchcancel', stickEnd);
    stage.addEventListener('mousedown', stickStart);
    window.addEventListener('mousemove', stickMove);
    window.addEventListener('mouseup', stickEnd);

    // ---------- Start-screen wiring ----------

    (function initDiff() {

    function buildRoster() {

    function toggleChar(idx) {

    function pickOpponents() {

    function returnToStart() {

    document.getElementById('newTeamsBtn').addEventListener('click', function (e) { e.stopPropagation(); returnToStart(); });

    document.getElementById('playAgainBtn').addEventListener('click', function (e) {
