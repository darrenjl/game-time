<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#8fd0ff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Surprise Eggs">
  <link rel="apple-touch-icon" href="../apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="512x512" href="../icon-512.png">
  <title>Surprise Eggs</title>
  <style>
    :root { --gold: #ffb03d; --ink: #4a3320; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%; overflow: hidden;
      overscroll-behavior: none; touch-action: none;
      -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent;
    }
    body {
      display: flex; flex-direction: column;
      height: 100vh; height: 100dvh;
      font-family: "Trebuchet MS", "Segoe UI", system-ui, sans-serif;
      color: var(--ink);
      background: linear-gradient(180deg, #bfe3ff 0%, #d9ecff 45%, #ffe6f0 100%);
    }
    .topbar {
      flex: 0 0 auto; display: flex; align-items: center; justify-content: space-between;
      gap: 10px; padding: max(10px, env(safe-area-inset-top)) 14px 8px;
    }
    .back {
      display: inline-flex; align-items: center; gap: 6px; min-height: 44px; padding: 8px 14px;
      border-radius: 999px; font-size: 1rem; font-weight: 700; text-decoration: none;
      color: #fff; background: rgba(74,51,32,0.30); border: 2px solid rgba(255,255,255,0.6);
    }
    .back:active { transform: scale(0.95); }
    .score { font-size: 1.3rem; font-size: clamp(1.1rem, 5vw, 1.6rem); font-weight: 800; color: #fff; text-shadow: 0 2px 8px rgba(74,51,32,0.45); }
    .rightbtns { display: flex; } .rightbtns > * + * { margin-left: 8px; }
    .refresh {
      -webkit-appearance: none; appearance: none; min-width: 44px; min-height: 44px; padding: 8px 12px;
      border-radius: 999px; font-size: 1.15rem; line-height: 1; cursor: pointer;
      color: #fff; background: rgba(74,51,32,0.30); border: 2px solid rgba(255,255,255,0.6);
    }
    .refresh:active { transform: scale(0.95); }
    .stage { flex: 1 1 auto; position: relative; min-height: 0; display: flex; align-items: stretch; justify-content: center; }
    canvas { display: block; width: 100%; height: 100%; touch-action: none; }
    .overlay {
      position: absolute; top: 0; right: 0; bottom: 0; left: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center;
      padding: 24px; background: rgba(60, 80, 110, 0.5); -webkit-backdrop-filter: blur(3px); backdrop-filter: blur(3px); z-index: 5;
    }
    .overlay > * + * { margin-top: 16px; } .overlay.hidden { display: none; }
    .overlay h2 { font-size: 2rem; font-size: clamp(1.6rem, 7vw, 2.8rem); color: #fff; text-shadow: 0 3px 0 rgba(74,51,32,0.3), 0 0 22px rgba(255,209,102,0.5); }
    .overlay p { font-size: 1.05rem; font-size: clamp(0.95rem, 4vw, 1.2rem); color: rgba(255,255,255,0.95); max-width: 26ch; }
    .tap-hint { font-size: clamp(2.4rem, 12vw, 4rem); animation: bob 1s ease-in-out infinite; }
    @keyframes bob { 0%,100% { transform: translateY(0);} 50% { transform: translateY(-10px);} }
  </style>
</head>
<body>
  <div class="topbar">
    <a class="back" href="../index.html">⬅️ Back</a>
    <div class="score" id="score">🐣 0</div>
    <div class="rightbtns">
      <button class="refresh" id="refreshBtn" aria-label="Refresh">🔄</button>
    </div>
  </div>

  <div class="stage">
    <canvas id="game"></canvas>
    <div class="overlay" id="startOverlay">
      <h2>🥚 Surprise Eggs</h2>
      <p>What's hiding inside for Oisín &amp; Finley?</p>
      <div class="tap-hint">👆</div>
      <p><b>Tap the egg to crack it open!</b> A surprise animal pops out every time.</p>
    </div>
  </div>

  <script>
  (function () {
    'use strict';
    var canvas = document.getElementById('game');
    var ctx = canvas.getContext('2d');
    var scoreEl = document.getElementById('score');
    var W = 0, H = 0, dpr = 1, started = false, lastTs = 0;

    var PHASE = { EGG: 0, HATCHED: 1 };
    var phase = PHASE.EGG;
    var TAPS_TO_HATCH = 3;

    var SHELLS = ['#fff3dc', '#ffe0e9', '#e3f0ff', '#e6ffe9', '#fff0c2', '#f0e6ff'];
    var TYPES = ['chick', 'bunny', 'frog', 'fox', 'duck', 'cat', 'pig', 'owl'];
    var CONFETTI_COLORS = ['#ff5d8f', '#ffd166', '#5fd07f', '#4fa8ff', '#b79bff', '#ff9f2e'];

    var egg = null;         // {taps, shell, type, wob, speckles}
    var confetti = [];
    var hatchAnim = 0;
    var hatched = 0;
    var cx = 0, cy = 0, S = 0;
    var audioCtx = null;

    function rand(a, b) { return a + Math.random() * (b - a); }
    function randInt(n) { return Math.floor(Math.random() * n); }
    function pick(arr) { return arr[randInt(arr.length)]; }

    function resize() {
      var rect = canvas.parentNode.getBoundingClientRect();
      W = Math.max(200, Math.floor(rect.width));
      H = Math.max(200, Math.floor(rect.height));
      dpr = window.devicePixelRatio || 1;
      canvas.width = Math.round(W * dpr);
      canvas.height = Math.round(H * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      cx = W / 2; cy = H * 0.52; S = Math.min(W, H) * 0.2;
    }

    // ---------- Audio ----------
    function ensureAudio() {
      if (!audioCtx) { try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { audioCtx = null; } }
      if (audioCtx && audioCtx.state === 'suspended') { try { audioCtx.resume(); } catch (e) {} }
    }
    function tone(hz, dur, delay, type) {
      if (!audioCtx) return;
      try {
        var t0 = audioCtx.currentTime + (delay || 0);
        var o = audioCtx.createOscillator(), g = audioCtx.createGain();
        o.type = type || 'sine'; o.frequency.value = hz;
        g.gain.setValueAtTime(0.0001, t0);
        g.gain.exponentialRampToValueAtTime(0.3, t0 + 0.015);
        g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
        o.connect(g); g.connect(audioCtx.destination);
        o.start(t0); o.stop(t0 + dur + 0.02);
      } catch (e) {}
    }
    function crackSound(taps) { tone(300 + taps * 150, 0.16, 0, 'triangle'); }
    function fanfare() {
      var notes = [523.25, 659.25, 783.99, 1046.5];   // C E G C — happy arpeggio
      for (var i = 0; i < notes.length; i++) tone(notes[i], 0.45, i * 0.09, 'sine');
    }

    // ---------- Setup ----------
    function newEgg() {
      var sp = [];
      for (var i = 0; i < 10; i++) sp.push({ dx: rand(-0.7, 0.7), dy: rand(-0.9, 0.9), r: rand(0.04, 0.09) });
      egg = { taps: 0, shell: pick(SHELLS), type: pick(TYPES), wob: 0, speckles: sp };
      phase = PHASE.EGG;
    }

    function begin() { started = true; document.getElementById('startOverlay').classList.add('hidden'); newEgg(); }

    function crackTap() {
      egg.taps++;
      egg.wob = 0.55;
      crackSound(egg.taps);
      if (egg.taps >= TAPS_TO_HATCH) hatch();
    }
    function hatch() {
      phase = PHASE.HATCHED;
      hatchAnim = 0;
      hatched++;
      updateScore();
      fanfare();
      spawnConfetti();
    }
    function updateScore() { scoreEl.textContent = '🐣 ' + hatched; }

    function spawnConfetti() {
      for (var i = 0; i < 60; i++) {
        confetti.push({
          x: cx + rand(-S, S), y: cy - rand(0, S * 0.5),
          vx: rand(-W * 0.18, W * 0.18), vy: -rand(H * 0.2, H * 0.6),
          size: rand(H * 0.012, H * 0.026), color: pick(CONFETTI_COLORS),
          rot: rand(0, 6.28), vr: rand(-8, 8), a: 1
        });
      }
    }

    // ---------- Input ----------
    function onDown(e) {
      if (e && e.target && e.target.closest && e.target.closest('button, a')) return;
      if (e) e.preventDefault();
      ensureAudio();
      if (!started) { begin(); return; }
      if (phase === PHASE.EGG) crackTap();
      else newEgg();
    }

    // ---------- Draw helpers ----------
    function ellipse(x, y, rx, ry) { ctx.save(); ctx.translate(x, y); ctx.scale(rx, ry); ctx.beginPath(); ctx.arc(0, 0, 1, 0, Math.PI * 2); ctx.restore(); ctx.closePath(); }
    function circle(x, y, r) { ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.closePath(); }
    function eyes(ex, ey, s, sp, er) {
      ctx.fillStyle = '#fff'; circle(ex - sp, ey, er); ctx.fill(); circle(ex + sp, ey, er); ctx.fill();
      ctx.fillStyle = '#241a12'; circle(ex - sp, ey, er * 0.55); ctx.fill(); circle(ex + sp, ey, er * 0.55); ctx.fill();
      ctx.fillStyle = '#fff'; circle(ex - sp + er * 0.2, ey - er * 0.2, er * 0.18); ctx.fill(); circle(ex + sp + er * 0.2, ey - er * 0.2, er * 0.18); ctx.fill();
    }

    // ---------- Baby animals (canvas-drawn), head centred at (x,y), size s ----------
    function body(x, y, s, col) { ctx.fillStyle = col; ellipse(x, y + s * 0.85, s * 0.72, s * 0.6); ctx.fill(); }
    function drawChick(x, y, s) {
      body(x, y, s, '#ffd94a');
      ctx.fillStyle = '#ffd94a'; circle(x, y, s); ctx.fill();
      eyes(x, y - s * 0.1, s, s * 0.3, s * 0.16);
      ctx.fillStyle = '#ff9f2e'; ctx.beginPath(); ctx.moveTo(x - s * 0.12, y + s * 0.18); ctx.lineTo(x + s * 0.12, y + s * 0.18); ctx.lineTo(x, y + s * 0.34); ctx.closePath(); ctx.fill();
    }
    function drawBunny(x, y, s) {
      ctx.fillStyle = '#f4f5fa'; ellipse(x - s * 0.28, y - s * 0.9, s * 0.16, s * 0.5); ctx.fill(); ellipse(x + s * 0.28, y - s * 0.9, s * 0.16, s * 0.5); ctx.fill();
      ctx.fillStyle = '#ffc7de'; ellipse(x - s * 0.28, y - s * 0.9, s * 0.07, s * 0.34); ctx.fill(); ellipse(x + s * 0.28, y - s * 0.9, s * 0.07, s * 0.34); ctx.fill();
      body(x, y, s, '#f4f5fa');
      ctx.fillStyle = '#f4f5fa'; circle(x, y, s); ctx.fill();
      eyes(x, y - s * 0.05, s, s * 0.3, s * 0.14);
      ctx.fillStyle = '#ff7eb6'; circle(x, y + s * 0.22, s * 0.09); ctx.fill();
    }
    function drawFrog(x, y, s) {
      body(x, y, s, '#5fbf4a');
      ctx.fillStyle = '#5fbf4a'; circle(x - s * 0.42, y - s * 0.55, s * 0.32); ctx.fill(); circle(x + s * 0.42, y - s * 0.55, s * 0.32); ctx.fill();
      circle(x, y, s); ctx.fill();
      ctx.fillStyle = '#fff'; circle(x - s * 0.42, y - s * 0.55, s * 0.22); ctx.fill(); circle(x + s * 0.42, y - s * 0.55, s * 0.22); ctx.fill();
      ctx.fillStyle = '#241a12'; circle(x - s * 0.42, y - s * 0.52, s * 0.11); ctx.fill(); circle(x + s * 0.42, y - s * 0.52, s * 0.11); ctx.fill();
      ctx.strokeStyle = '#2c5a22'; ctx.lineWidth = Math.max(2, s * 0.08); ctx.lineCap = 'round';
      ctx.beginPath(); ctx.arc(x, y + s * 0.1, s * 0.46, 0.12 * Math.PI, 0.88 * Math.PI); ctx.stroke();
    }
    function drawFox(x, y, s) {
      body(x, y, s, '#e8722c');
      ctx.fillStyle = '#e8722c';
      ctx.beginPath(); ctx.moveTo(x - s * 0.68, y - s * 0.55); ctx.lineTo(x - s * 0.42, y - s * 1.32); ctx.lineTo(x - s * 0.08, y - s * 0.5); ctx.closePath(); ctx.fill();
      ctx.beginPath(); ctx.moveTo(x + s * 0.68, y - s * 0.55); ctx.lineTo(x + s * 0.42, y - s * 1.32); ctx.lineTo(x + s * 0.08, y - s * 0.5); ctx.closePath(); ctx.fill();
      // dark ear tips
      ctx.fillStyle = '#3a2416';
      ctx.beginPath(); ctx.moveTo(x - s * 0.5, y - s * 0.98); ctx.lineTo(x - s * 0.42, y - s * 1.32); ctx.lineTo(x - s * 0.32, y - s * 0.92); ctx.closePath(); ctx.fill();
      ctx.beginPath(); ctx.moveTo(x + s * 0.5, y - s * 0.98); ctx.lineTo(x + s * 0.42, y - s * 1.32); ctx.lineTo(x + s * 0.32, y - s * 0.92); ctx.closePath(); ctx.fill();
      ctx.fillStyle = '#e8722c'; circle(x, y, s); ctx.fill();
      ctx.fillStyle = '#fbf3e6'; ellipse(x - s * 0.28, y + s * 0.18, s * 0.3, s * 0.4); ctx.fill(); ellipse(x + s * 0.28, y + s * 0.18, s * 0.3, s * 0.4); ctx.fill();
      eyes(x, y - s * 0.15, s, s * 0.32, s * 0.14);
      ctx.fillStyle = '#2a1a10'; ctx.beginPath(); ctx.moveTo(x - s * 0.1, y + s * 0.22); ctx.lineTo(x + s * 0.1, y + s * 0.22); ctx.lineTo(x, y + s * 0.36); ctx.closePath(); ctx.fill();
    }
    function drawDuck(x, y, s) {
      body(x, y, s, '#ffd94a');
      ctx.fillStyle = '#f5c02e'; ellipse(x, y - s * 0.95, s * 0.11, s * 0.26); ctx.fill();
      ctx.fillStyle = '#ffd94a'; circle(x, y, s); ctx.fill();
      eyes(x, y - s * 0.12, s, s * 0.28, s * 0.15);
      ctx.fillStyle = '#ff9f2e'; ellipse(x, y + s * 0.32, s * 0.32, s * 0.18); ctx.fill();
    }
    function drawCat(x, y, s) {
      body(x, y, s, '#f0913f');
      ctx.fillStyle = '#f0913f';
      ctx.beginPath(); ctx.moveTo(x - s * 0.66, y - s * 0.55); ctx.lineTo(x - s * 0.44, y - s * 1.32); ctx.lineTo(x - s * 0.1, y - s * 0.5); ctx.closePath(); ctx.fill();
      ctx.beginPath(); ctx.moveTo(x + s * 0.66, y - s * 0.55); ctx.lineTo(x + s * 0.44, y - s * 1.32); ctx.lineTo(x + s * 0.1, y - s * 0.5); ctx.closePath(); ctx.fill();
      ctx.fillStyle = '#ffc7de';
      ctx.beginPath(); ctx.moveTo(x - s * 0.5, y - s * 0.6); ctx.lineTo(x - s * 0.42, y - s * 1.08); ctx.lineTo(x - s * 0.24, y - s * 0.56); ctx.closePath(); ctx.fill();
      ctx.beginPath(); ctx.moveTo(x + s * 0.5, y - s * 0.6); ctx.lineTo(x + s * 0.42, y - s * 1.08); ctx.lineTo(x + s * 0.24, y - s * 0.56); ctx.closePath(); ctx.fill();
      ctx.fillStyle = '#f0913f'; circle(x, y, s); ctx.fill();
      eyes(x, y - s * 0.1, s, s * 0.32, s * 0.15);
      ctx.fillStyle = '#e8607f'; ctx.beginPath(); ctx.moveTo(x - s * 0.09, y + s * 0.18); ctx.lineTo(x + s * 0.09, y + s * 0.18); ctx.lineTo(x, y + s * 0.3); ctx.closePath(); ctx.fill();
      ctx.strokeStyle = '#8a5a2f'; ctx.lineWidth = Math.max(1.5, s * 0.04); ctx.lineCap = 'round';
      ctx.beginPath(); ctx.moveTo(x - s * 0.5, y + s * 0.2); ctx.lineTo(x - s * 0.1, y + s * 0.28); ctx.moveTo(x + s * 0.5, y + s * 0.2); ctx.lineTo(x + s * 0.1, y + s * 0.28); ctx.stroke();
    }
    function drawPig(x, y, s) {
      body(x, y, s, '#ff9ec2');
      ctx.fillStyle = '#f386ad';
      ctx.beginPath(); ctx.moveTo(x - s * 0.6, y - s * 0.45); ctx.lineTo(x - s * 0.66, y - s * 1.12); ctx.lineTo(x - s * 0.14, y - s * 0.6); ctx.closePath(); ctx.fill();
      ctx.beginPath(); ctx.moveTo(x + s * 0.6, y - s * 0.45); ctx.lineTo(x + s * 0.66, y - s * 1.12); ctx.lineTo(x + s * 0.14, y - s * 0.6); ctx.closePath(); ctx.fill();
      ctx.fillStyle = '#ff9ec2'; circle(x, y, s); ctx.fill();
      eyes(x, y - s * 0.2, s, s * 0.3, s * 0.13);
      ctx.fillStyle = '#f386ad'; ellipse(x, y + s * 0.28, s * 0.4, s * 0.26); ctx.fill();
      ctx.fillStyle = '#d95f8a'; circle(x - s * 0.15, y + s * 0.28, s * 0.07); ctx.fill(); circle(x + s * 0.15, y + s * 0.28, s * 0.07); ctx.fill();
    }
    function drawOwl(x, y, s) {
      ctx.fillStyle = '#6a58c4';
      ctx.beginPath(); ctx.moveTo(x - s * 0.5, y - s * 0.62); ctx.lineTo(x - s * 0.32, y - s * 1.32); ctx.lineTo(x - s * 0.08, y - s * 0.6); ctx.closePath(); ctx.fill();
      ctx.beginPath(); ctx.moveTo(x + s * 0.5, y - s * 0.62); ctx.lineTo(x + s * 0.32, y - s * 1.32); ctx.lineTo(x + s * 0.08, y - s * 0.6); ctx.closePath(); ctx.fill();
      body(x, y, s, '#7d6bd8');
      ctx.fillStyle = '#7d6bd8'; circle(x, y, s); ctx.fill();
      ctx.fillStyle = '#9c8dea'; ellipse(x, y + s * 0.18, s * 0.5, s * 0.62); ctx.fill();
      ctx.fillStyle = '#fff'; circle(x - s * 0.33, y - s * 0.12, s * 0.3); ctx.fill(); circle(x + s * 0.33, y - s * 0.12, s * 0.3); ctx.fill();
      ctx.fillStyle = '#241a12'; circle(x - s * 0.33, y - s * 0.12, s * 0.14); ctx.fill(); circle(x + s * 0.33, y - s * 0.12, s * 0.14); ctx.fill();
      ctx.fillStyle = '#f0b429'; ctx.beginPath(); ctx.moveTo(x - s * 0.08, y + s * 0.1); ctx.lineTo(x + s * 0.08, y + s * 0.1); ctx.lineTo(x, y + s * 0.3); ctx.closePath(); ctx.fill();
    }
    function drawBaby(type, x, y, s) {
      if (type === 'chick') drawChick(x, y, s);
      else if (type === 'bunny') drawBunny(x, y, s);
      else if (type === 'frog') drawFrog(x, y, s);
      else if (type === 'fox') drawFox(x, y, s);
      else if (type === 'duck') drawDuck(x, y, s);
      else if (type === 'cat') drawCat(x, y, s);
      else if (type === 'pig') drawPig(x, y, s);
      else drawOwl(x, y, s);
    }

    // ---------- Egg + scene art ----------
    function drawNest(x, y, w) {
      ctx.fillStyle = '#caa04a'; ellipse(x, y, w, w * 0.42); ctx.fill();
      ctx.fillStyle = '#a97f2f'; ellipse(x, y, w * 0.82, w * 0.32); ctx.fill();
      ctx.strokeStyle = '#8a651f'; ctx.lineWidth = Math.max(2, w * 0.05); ctx.lineCap = 'round';
      for (var i = 0; i < 9; i++) {
        var a = i * Math.PI / 4.5;
        ctx.beginPath(); ctx.moveTo(x + Math.cos(a) * w * 0.5, y - w * 0.1); ctx.lineTo(x + Math.cos(a) * w * 0.95, y + w * 0.12); ctx.stroke();
      }
    }
    function drawEgg(ts) {
      var ry = S * 1.25, baseY = cy + ry;
      var wob = egg.wob > 0 ? Math.sin(ts / 45) * egg.wob * 0.18 : 0;
      ctx.save();
      ctx.translate(cx, baseY); ctx.rotate(wob); ctx.translate(-cx, -baseY);
      // shell
      var g = ctx.createLinearGradient(cx - S, cy - ry, cx + S, cy + ry);
      g.addColorStop(0, '#ffffff'); g.addColorStop(1, egg.shell);
      ctx.fillStyle = g; ellipse(cx, cy, S, ry); ctx.fill();
      // speckles
      ctx.fillStyle = 'rgba(150,120,90,0.28)';
      for (var i = 0; i < egg.speckles.length; i++) { var sp = egg.speckles[i]; circle(cx + sp.dx * S, cy + sp.dy * ry, sp.r * S); ctx.fill(); }
      // shine
      ctx.fillStyle = 'rgba(255,255,255,0.5)'; ellipse(cx - S * 0.35, cy - ry * 0.4, S * 0.18, ry * 0.22); ctx.fill();
      // cracks (one per tap so far)
      ctx.strokeStyle = 'rgba(90,70,50,0.8)'; ctx.lineWidth = Math.max(2, S * 0.05); ctx.lineCap = 'round'; ctx.lineJoin = 'round';
      if (egg.taps >= 1) {
        ctx.beginPath();
        ctx.moveTo(cx - S, cy - ry * 0.15);
        ctx.lineTo(cx - S * 0.45, cy - ry * 0.02); ctx.lineTo(cx - S * 0.1, cy - ry * 0.2);
        ctx.lineTo(cx + S * 0.4, cy - ry * 0.02); ctx.lineTo(cx + S, cy - ry * 0.18);
        ctx.stroke();
      }
      if (egg.taps >= 2) {
        ctx.beginPath();
        ctx.moveTo(cx + S * 0.1, cy - ry);
        ctx.lineTo(cx - S * 0.1, cy - ry * 0.55); ctx.lineTo(cx + S * 0.12, cy - ry * 0.2);
        ctx.lineTo(cx - S * 0.06, cy + ry * 0.15);
        ctx.stroke();
      }
      ctx.restore();
    }
    function drawShellBowl(x, topY, w) {
      ctx.fillStyle = egg.shell;
      // bowl (bottom half)
      ctx.beginPath(); ctx.moveTo(x - w, topY);
      ctx.quadraticCurveTo(x - w, topY + w * 1.1, x, topY + w * 1.1);
      ctx.quadraticCurveTo(x + w, topY + w * 1.1, x + w, topY);
      ctx.closePath(); ctx.fill();
      // jagged rim
      ctx.fillStyle = egg.shell;
      var n = 7, step = (w * 2) / n;
      ctx.beginPath(); ctx.moveTo(x - w, topY);
      for (var i = 0; i < n; i++) { var px = x - w + i * step; ctx.lineTo(px + step * 0.5, topY - w * 0.22); ctx.lineTo(px + step, topY); }
      ctx.closePath(); ctx.fill();
      ctx.strokeStyle = 'rgba(150,120,90,0.25)'; ctx.lineWidth = Math.max(1.5, w * 0.03);
      ctx.beginPath(); ctx.moveTo(x - w, topY); ctx.quadraticCurveTo(x, topY + w * 0.2, x + w, topY); ctx.stroke();
    }

    // ---------- Update + render ----------
    function update(dt) {
      if (egg && egg.wob > 0) egg.wob = Math.max(0, egg.wob - dt * 1.6);
      if (phase === PHASE.HATCHED && hatchAnim < 2) hatchAnim += dt;
      for (var i = confetti.length - 1; i >= 0; i--) {
        var c = confetti[i];
        c.x += c.vx * dt; c.y += c.vy * dt; c.vy += H * 1.4 * dt; c.rot += c.vr * dt; c.a -= dt * 0.5;
        if (c.a <= 0 || c.y > H + 40) confetti.splice(i, 1);
      }
    }

    function render(ts) {
      if (render._h !== H) { var g = ctx.createLinearGradient(0, 0, 0, H); g.addColorStop(0, '#bfe3ff'); g.addColorStop(0.5, '#d9ecff'); g.addColorStop(1, '#ffe6f0'); render._g = g; render._h = H; }
      ctx.fillStyle = render._g; ctx.fillRect(0, 0, W, H);

      // soft spotlight behind the egg
      var rg = ctx.createRadialGradient(cx, cy, S * 0.2, cx, cy, S * 2.4);
      rg.addColorStop(0, 'rgba(255,255,255,0.55)'); rg.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.fillStyle = rg; ctx.fillRect(0, 0, W, H);

      var nestY = cy + S * 1.5;
      drawNest(cx, nestY, S * 1.25);

      if (!started) return;

      if (phase === PHASE.EGG) {
        drawEgg(ts);
      } else {
        // broken shell in the nest + the animal popping up
        drawShellBowl(cx, cy + S * 0.5, S * 0.95);
        var p = Math.min(1, hatchAnim / 0.45);
        var e = 1 - Math.pow(1 - p, 3);                 // ease-out
        var bob = Math.sin(ts / 260) * S * 0.05 * (hatchAnim > 0.45 ? 1 : 0);
        var scale = 0.3 + 0.7 * e;
        var ay = cy - S * 0.15 + bob;
        ctx.save();
        ctx.translate(cx, ay); ctx.scale(scale, scale); ctx.translate(-cx, -ay);
        drawBaby(egg.type, cx, ay, S * 0.82);
        ctx.restore();
      }

      // confetti (drawn on top)
      for (var i = 0; i < confetti.length; i++) {
        var c = confetti[i];
        ctx.save();
        ctx.globalAlpha = Math.max(0, c.a);
        ctx.translate(c.x, c.y); ctx.rotate(c.rot);
        ctx.fillStyle = c.color;
        ctx.fillRect(-c.size / 2, -c.size / 2, c.size, c.size * 1.6);
        ctx.restore();
      }
      ctx.globalAlpha = 1;

      // gentle prompt
      var msg = phase === PHASE.EGG ? '👆 Tap the egg!' : '🎉 Tap for another egg!';
      var fs = Math.max(16, Math.round(H * 0.036));
      ctx.font = 'bold ' + fs + 'px "Trebuchet MS", sans-serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      var bobY = Math.sin(ts / 400) * fs * 0.15;
      ctx.fillStyle = 'rgba(74,51,32,0.85)';
      ctx.fillText(msg, cx, H * 0.9 + bobY);
    }

    function frame(ts) {
      if (!lastTs) lastTs = ts;
      var dt = Math.min(0.045, (ts - lastTs) / 1000);
      lastTs = ts;
      update(dt);
      render(ts);
      requestAnimationFrame(frame);
    }

    // ---------- Wire up ----------
    var stage = document.querySelector('.stage');
    stage.addEventListener('touchstart', onDown, { passive: false });
    stage.addEventListener('mousedown', onDown);

    document.getElementById('refreshBtn').addEventListener('click', function () { location.reload(); });

    window.addEventListener('resize', resize);
    window.addEventListener('orientationchange', function () { setTimeout(resize, 150); });
    document.addEventListener('visibilitychange', function () { if (!document.hidden) lastTs = 0; });
    document.addEventListener('touchmove', function (e) { e.preventDefault(); }, { passive: false });
    document.addEventListener('gesturestart', function (e) { e.preventDefault(); });

    var _iosMajor = +((navigator.userAgent.match(/ OS (\d+)_/) || [])[1] || 0);
    if (navigator.standalone && _iosMajor > 0 && _iosMajor < 13) {
      document.addEventListener('click', function (e) { var n = e.target; while (n && n.nodeName !== 'A') n = n.parentNode; if (n && n.getAttribute('href') && n.getAttribute('target') !== '_blank') { e.preventDefault(); location.href = n.getAttribute('href'); } }, false);
    }

    resize();
    requestAnimationFrame(frame);
  })();
  </script>
  <script>
    // Register the offline service worker (progressive enhancement; no-op where unsupported).
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('/sw.js').catch(function () {});
      });
    }
  </script>
