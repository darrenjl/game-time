<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#1a0f2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Build-a-Buddy">
  <link rel="apple-touch-icon" href="../apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="512x512" href="../icon-512.png">
  <title>Build-a-Buddy</title>
  <style>
    :root {
      --bg: #1a0f2e;
      --pop: #ff8fd0;
      --gold: #ffd166;
      --ink: #fff3fb;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      overscroll-behavior: none;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      display: flex;
      flex-direction: column;
      height: 100vh;          /* fallback for Safari < 15.4 (e.g. iPad mini 2) */
      height: 100dvh;
      font-family: "Trebuchet MS", "Segoe UI", system-ui, sans-serif;
      color: var(--ink);
      background: linear-gradient(180deg, #2a1650 0%, #1a0f2e 60%, #100820 100%);
    }

    /* ---- Top bar ---- */
    .topbar {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: max(10px, env(safe-area-inset-top)) 14px 8px;
    }
    .back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 44px;
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 1rem;
      font-weight: 700;
      text-decoration: none;
      color: var(--ink);
      background: rgba(255, 143, 208, 0.18);
      border: 2px solid rgba(255, 143, 208, 0.5);
    }
    .back:active { transform: scale(0.95); }
    .score {
      font-size: 1.3rem;
      font-size: clamp(1.1rem, 5vw, 1.6rem);
      font-weight: 800;
      color: var(--gold);
      text-shadow: 0 0 16px rgba(255, 209, 102, 0.4);
    }
    .rightbtns { display: flex; }
    .rightbtns > * + * { margin-left: 8px; }
    .refresh, .pause {
      -webkit-appearance: none;
      appearance: none;
      min-width: 44px;
      min-height: 44px;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 1.15rem;
      line-height: 1;
      cursor: pointer;
      color: var(--ink);
      background: rgba(255, 143, 208, 0.18);
      border: 2px solid rgba(255, 143, 208, 0.5);
    }
    .refresh:active, .pause:active { transform: scale(0.95); }

    /* ---- Stage / canvas ---- */
    .stage {
      flex: 1 1 auto;
      position: relative;
      min-height: 0;
      display: flex;
      align-items: stretch;
      justify-content: center;
    }
    canvas { display: block; width: 100%; height: 100%; touch-action: none; }

    /* ---- Build panel (only shown while building) ---- */
    .buildbar {
      flex: 0 0 auto;
      max-height: 48vh;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 8px 12px max(12px, env(safe-area-inset-bottom));
      background: rgba(16, 8, 32, 0.9);
      border-top: 2px solid rgba(255, 143, 208, 0.3);
    }
    .buildbar.hidden { display: none; }
    .row { display: flex; align-items: center; flex-wrap: wrap; margin-bottom: 6px; }
    .row > * + * { margin-left: 8px; }
    .rowlabel { flex: 0 0 100%; font-size: 0.82rem; font-weight: 700; opacity: 0.75; margin: 6px 0 2px; letter-spacing: 0.03em; }
    .opt {
      -webkit-appearance: none;
      appearance: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 54px;
      min-height: 54px;
      margin-bottom: 6px;
      padding: 6px 12px;
      border-radius: 14px;
      font-size: 1.5rem;
      font-weight: 700;
      line-height: 1;
      cursor: pointer;
      color: var(--ink);
      background: rgba(255, 143, 208, 0.12);
      border: 3px solid rgba(255, 143, 208, 0.28);
    }
    .opt small { font-size: 0.8rem; margin-left: 6px; }
    .opt.sel { border-color: var(--gold); background: rgba(255, 209, 102, 0.2); transform: scale(1.05); }
    .opt.swatch { min-width: 48px; }
    .opt:active { transform: scale(0.94); }
    .playrow { display: flex; justify-content: center; margin-top: 8px; }
    .bigbtn {
      min-height: 58px;
      padding: 14px 40px;
      font-size: 1.3rem;
      font-size: clamp(1.1rem, 5vw, 1.5rem);
      font-weight: 800;
      color: #1a0f2e;
      border: none;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--pop), var(--gold));
      box-shadow: 0 12px 30px rgba(255, 143, 208, 0.4);
      cursor: pointer;
    }
    .bigbtn:active { transform: scale(0.96); }

    /* ---- Overlays ---- */
    .overlay {
      position: absolute;
      top: 0; right: 0; bottom: 0; left: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      background: rgba(16, 8, 32, 0.8);
      -webkit-backdrop-filter: blur(3px);
      backdrop-filter: blur(3px);
      z-index: 5;
    }
    .overlay > * + * { margin-top: 16px; }
    .overlay.hidden { display: none; }
    .overlay h2 {
      font-size: 2rem;
      font-size: clamp(1.6rem, 7vw, 2.8rem);
      background: linear-gradient(90deg, var(--pop), var(--gold));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .overlay p { font-size: 1.05rem; font-size: clamp(0.95rem, 4vw, 1.2rem); color: rgba(255, 243, 251, 0.85); max-width: 24ch; }
    .overlay .btnrow { display: flex; flex-wrap: wrap; justify-content: center; }
    .overlay .btnrow > * + * { margin-left: 12px; }
  </style>
</head>
<body>
  <div class="topbar">
    <a class="back" href="../index.html">⬅️ Back</a>
    <div class="score" id="score"></div>
    <div class="rightbtns">
      <button class="pause" id="pauseBtn" aria-label="Pause">⏸️</button>
      <button class="refresh" id="refreshBtn" aria-label="Refresh game">🔄</button>
    </div>
  </div>

  <div class="stage">
    <canvas id="game"></canvas>

    <div class="overlay hidden" id="pauseOverlay">
      <h2>Paused</h2>
      <button class="bigbtn" id="resumeBtn">▶️ Resume</button>
    </div>

    <div class="overlay hidden" id="overOverlay">
      <h2>🎉 Great catching!</h2>
      <p id="finalScore">You caught 0</p>
      <div class="btnrow">
        <button class="bigbtn" id="playAgainBtn">🔁 Again</button>
        <button class="bigbtn" id="rebuildBtn">🛠️ Rebuild</button>
      </div>
    </div>
  </div>

  <div class="buildbar" id="buildbar">
    <div class="row" id="bodyRow"><span class="rowlabel">Who is your buddy?</span></div>
    <div class="row" id="colorRow"><span class="rowlabel">Pick a colour</span></div>
    <div class="row" id="hatRow"><span class="rowlabel">Add a hat</span></div>
    <div class="row" id="treatRow"><span class="rowlabel">What will you catch?</span></div>
    <div class="playrow"><button class="bigbtn" id="playBtn">▶️ Let's Play!</button></div>
  </div>

  <script>
  (function () {
    'use strict';

    // ============================================================================
    //  THEME  —  the parts Oisín & Finley choose from when building their buddy.
    //  Add a new body / colour / hat / treat here AND a matching case in the
    //  draw functions below. The catch game itself never needs to change.
    // ============================================================================
    var BODIES = [
      { id: 'blob',  name: 'Blobby', icon: '🙂' },
      { id: 'cat',   name: 'Cat',    icon: '🐱' },
      { id: 'bear',  name: 'Bear',   icon: '🐻' },
      { id: 'bunny', name: 'Bunny',  icon: '🐰' }
    ];
    var COLORS = ['#ff8fd0', '#7cc6ff', '#9be27a', '#ffd166', '#c69bff', '#ff8a5c'];
    var HATS = [
      { id: 'none',  name: 'None',  icon: '🚫' },
      { id: 'crown', name: 'Crown', icon: '👑' },
      { id: 'party', name: 'Party', icon: '🎉' },
      { id: 'bow',   name: 'Bow',   icon: '🎀' }
    ];
    var TREATS = [
      { id: 'star',  name: 'Stars',  icon: '⭐', color: '#ffe27a' },
      { id: 'heart', name: 'Hearts', icon: '❤️', color: '#ff5d8f' },
      { id: 'apple', name: 'Apples', icon: '🍎', color: '#ff5b4a' },
      { id: 'fish',  name: 'Fish',   icon: '🐟', color: '#ff9b42' }
    ];
    // Current buddy (restored from localStorage)
    var cfg = { body: 0, color: 0, hat: 0, treat: 0 };
    // ============================================================================

    var canvas = document.getElementById('game');
    var ctx = canvas.getContext('2d');
    var scoreEl = document.getElementById('score');

    var STATE = { CREATE: 0, PLAYING: 1, OVER: 2, PAUSED: 3 };
    var state = STATE.CREATE;

    var W = 0, H = 0, dpr = 1;
    var MAX_MISS = 5;

    var buddy, treats, sparks, orbits;
    var score, misses, fallSpd, spawnT, lastTs = 0;

    function rand(a, b) { return a + Math.random() * (b - a); }

    // ---------- Sizing ----------
    function resize() {
      var rect = canvas.parentNode.getBoundingClientRect();
      W = Math.max(200, Math.floor(rect.width));
      H = Math.max(200, Math.floor(rect.height));
      dpr = window.devicePixelRatio || 1;
      canvas.width = Math.round(W * dpr);
      canvas.height = Math.round(H * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      if (buddy) { buddy.s = playSize(); buddy.y = H - buddy.s * 0.5; }
    }

    function playSize() { return Math.min(W * 0.34, H * 0.26); }

    // ---------- Game setup ----------
    function startGame() {
      document.getElementById('buildbar').classList.add('hidden');
      document.getElementById('overOverlay').classList.add('hidden');
      resize();
      var s = playSize();
      buddy = { x: W / 2, y: H - s * 0.5, s: s, hurt: 0 };
      treats = []; sparks = [];
      score = 0; misses = 0; fallSpd = H * 0.32; spawnT = 0;
      state = STATE.PLAYING;
      lastTs = 0;
      scoreEl.textContent = '0';
    }

    function gameOver() {
      state = STATE.OVER;
      document.getElementById('finalScore').textContent = 'You caught ' + score + ' ' + TREATS[cfg.treat].name.toLowerCase() + '!';
      document.getElementById('overOverlay').classList.remove('hidden');
    }

    function backToBuild() {
      document.getElementById('overOverlay').classList.add('hidden');
      document.getElementById('buildbar').classList.remove('hidden');
      state = STATE.CREATE;
      scoreEl.textContent = '';
      resize();
    }

    // ---------- Input (drag the buddy left/right while playing) ----------
    function getPos(e) {
      var rect = canvas.getBoundingClientRect();
      var t = (e.changedTouches && e.changedTouches[0]) || (e.touches && e.touches[0]) || e;
      return { x: t.clientX - rect.left, y: t.clientY - rect.top };
    }
    function onMove(e) {
      if (state !== STATE.PLAYING) return;
      if (e && e.target && e.target.closest && e.target.closest('button, a')) return;
      if (e) e.preventDefault();
      var p = getPos(e);
      buddy.tx = Math.max(buddy.s * 0.5, Math.min(W - buddy.s * 0.5, p.x));
    }

    // ---------- Particles ----------
    function spawnSparks(x, y, color, n) {
      for (var i = 0; i < n; i++) {
        var a = Math.random() * Math.PI * 2, sp = rand(H * 0.1, H * 0.5);
        sparks.push({ x: x, y: y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - H * 0.1, r: rand(2, H * 0.018), color: color, alpha: 1 });
      }
    }
    function updateSparks(dt) {
      for (var i = sparks.length - 1; i >= 0; i--) {
        var s = sparks[i];
        s.x += s.vx * dt; s.y += s.vy * dt; s.vy += H * 1.4 * dt;
        s.alpha -= dt * 1.3;
        if (s.alpha <= 0) sparks.splice(i, 1);
      }
    }

    // ---------- Update ----------
    function update(dt) {
      if (buddy.hurt > 0) buddy.hurt -= dt;
      if (typeof buddy.tx === 'number') buddy.x += (buddy.tx - buddy.x) * Math.min(1, dt * 16);

      fallSpd = Math.min(H * 0.72, fallSpd + H * 0.012 * dt);
      spawnT -= dt;
      if (spawnT <= 0) {
        spawnT = rand(0.55, 1.05);
        treats.push({ x: rand(W * 0.1, W * 0.9), y: -H * 0.05, r: buddy.s * 0.22, spin: rand(0, 6.28), vs: rand(-2, 2) });
      }

      for (var i = treats.length - 1; i >= 0; i--) {
        var t = treats[i];
        t.y += fallSpd * dt; t.spin += t.vs * dt;
        // Caught?
        if (t.y > buddy.y - buddy.s * 0.45 && t.y < buddy.y + buddy.s * 0.3 &&
            Math.abs(t.x - buddy.x) < buddy.s * 0.55 + t.r) {
          treats.splice(i, 1);
          score++;
          scoreEl.textContent = String(score);
          spawnSparks(t.x, t.y, TREATS[cfg.treat].color, 12);
          continue;
        }
        // Missed?
        if (t.y > H + t.r) {
          treats.splice(i, 1);
          misses++;
          buddy.hurt = 0.35;
          if (misses >= MAX_MISS) { gameOver(); return; }
        }
      }
      updateSparks(dt);
    }

    // ---------- Buddy drawing ----------
    function roundRectFull(c, x, y, w, h, r) {
      c.beginPath();
      c.moveTo(x + r, y);
      c.arcTo(x + w, y, x + w, y + h, r);
      c.arcTo(x + w, y + h, x, y + h, r);
      c.arcTo(x, y + h, x, y, r);
      c.arcTo(x, y, x + w, y, r);
      c.closePath();
    }

    // Draws the buddy centred at (cx, cy). size s ~ overall height. armsUp = catch pose.
    function drawBuddy(cx, cy, s, armsUp) {
      var c = ctx, col = COLORS[cfg.color], body = BODIES[cfg.body].id;
      var hr = s * 0.42;   // head/body radius
      c.save();
      c.translate(cx, cy);

      // soft shadow on the ground
      c.fillStyle = 'rgba(0,0,0,0.22)';
      c.beginPath(); c.ellipse(0, s * 0.5, s * 0.44, s * 0.09, 0, 0, Math.PI * 2); c.fill();

      // feet
      c.fillStyle = shade(col, -0.25);
      c.beginPath(); c.ellipse(-s * 0.2, s * 0.44, s * 0.15, s * 0.09, 0, 0, Math.PI * 2); c.fill();
      c.beginPath(); c.ellipse(s * 0.2, s * 0.44, s * 0.15, s * 0.09, 0, 0, Math.PI * 2); c.fill();

      // arms
      var ay = armsUp ? -s * 0.28 : s * 0.02;
      c.fillStyle = shade(col, -0.1);
      c.beginPath(); c.ellipse(-hr * 0.95, ay, s * 0.12, s * 0.09, armsUp ? -0.6 : 0.3, 0, Math.PI * 2); c.fill();
      c.beginPath(); c.ellipse(hr * 0.95, ay, s * 0.12, s * 0.09, armsUp ? 0.6 : -0.3, 0, Math.PI * 2); c.fill();

      // ears (per body type) drawn behind head
      c.fillStyle = col;
      if (body === 'cat') {
        c.beginPath(); c.moveTo(-hr * 0.7, -hr * 0.6); c.lineTo(-hr * 0.35, -hr * 1.25); c.lineTo(-hr * 0.05, -hr * 0.7); c.closePath(); c.fill();
        c.beginPath(); c.moveTo(hr * 0.7, -hr * 0.6); c.lineTo(hr * 0.35, -hr * 1.25); c.lineTo(hr * 0.05, -hr * 0.7); c.closePath(); c.fill();
      } else if (body === 'bear') {
        c.beginPath(); c.arc(-hr * 0.7, -hr * 0.8, hr * 0.3, 0, Math.PI * 2); c.fill();
        c.beginPath(); c.arc(hr * 0.7, -hr * 0.8, hr * 0.3, 0, Math.PI * 2); c.fill();
      } else if (body === 'bunny') {
        c.beginPath(); c.ellipse(-hr * 0.45, -hr * 1.25, hr * 0.18, hr * 0.6, -0.15, 0, Math.PI * 2); c.fill();
        c.beginPath(); c.ellipse(hr * 0.45, -hr * 1.25, hr * 0.18, hr * 0.6, 0.15, 0, Math.PI * 2); c.fill();
        c.fillStyle = shade(col, 0.35);
        c.beginPath(); c.ellipse(-hr * 0.45, -hr * 1.2, hr * 0.09, hr * 0.42, -0.15, 0, Math.PI * 2); c.fill();
        c.beginPath(); c.ellipse(hr * 0.45, -hr * 1.2, hr * 0.09, hr * 0.42, 0.15, 0, Math.PI * 2); c.fill();
      }

      // main round body
      c.fillStyle = col;
      c.beginPath(); c.arc(0, 0, hr, 0, Math.PI * 2); c.fill();
      // belly highlight
      c.fillStyle = shade(col, 0.28);
      c.beginPath(); c.ellipse(0, hr * 0.28, hr * 0.55, hr * 0.42, 0, 0, Math.PI * 2); c.fill();

      // face: cheeks
      c.fillStyle = 'rgba(255,120,170,0.45)';
      c.beginPath(); c.arc(-hr * 0.42, hr * 0.12, hr * 0.14, 0, Math.PI * 2); c.fill();
      c.beginPath(); c.arc(hr * 0.42, hr * 0.12, hr * 0.14, 0, Math.PI * 2); c.fill();
      // eyes
      c.fillStyle = '#22143a';
      c.beginPath(); c.arc(-hr * 0.28, -hr * 0.12, hr * 0.11, 0, Math.PI * 2); c.fill();
      c.beginPath(); c.arc(hr * 0.28, -hr * 0.12, hr * 0.11, 0, Math.PI * 2); c.fill();
      c.fillStyle = '#ffffff';
      c.beginPath(); c.arc(-hr * 0.24, -hr * 0.16, hr * 0.04, 0, Math.PI * 2); c.fill();
      c.beginPath(); c.arc(hr * 0.32, -hr * 0.16, hr * 0.04, 0, Math.PI * 2); c.fill();
      // smile (open + happy when catching)
      c.strokeStyle = '#22143a'; c.lineWidth = Math.max(2, hr * 0.05); c.lineCap = 'round';
      c.beginPath(); c.arc(0, hr * 0.02, hr * 0.28, 0.15 * Math.PI, 0.85 * Math.PI); c.stroke();
      // cat whiskers / nose
      if (body === 'cat') {
        c.beginPath(); c.moveTo(-hr * 0.05, hr * 0.02); c.lineTo(hr * 0.05, hr * 0.02); c.lineTo(0, hr * 0.1); c.closePath();
        c.fillStyle = '#22143a'; c.fill();
      }

      // hat on top
      drawHat(HATS[cfg.hat].id, 0, -hr, hr);

      c.restore();
    }

    function drawHat(type, cx, cy, hr) {
      if (type === 'none') return;
      var c = ctx;
      if (type === 'crown') {
        c.fillStyle = '#ffd166';
        c.beginPath();
        c.moveTo(cx - hr * 0.6, cy);
        c.lineTo(cx - hr * 0.6, cy - hr * 0.35);
        c.lineTo(cx - hr * 0.3, cy - hr * 0.1);
        c.lineTo(cx, cy - hr * 0.5);
        c.lineTo(cx + hr * 0.3, cy - hr * 0.1);
        c.lineTo(cx + hr * 0.6, cy - hr * 0.35);
        c.lineTo(cx + hr * 0.6, cy);
        c.closePath(); c.fill();
        c.fillStyle = '#ff5d8f';
        c.beginPath(); c.arc(cx, cy - hr * 0.12, hr * 0.09, 0, Math.PI * 2); c.fill();
      } else if (type === 'party') {
        c.fillStyle = '#ff5d8f';
        c.beginPath(); c.moveTo(cx, cy - hr * 0.85); c.lineTo(cx - hr * 0.4, cy + hr * 0.05); c.lineTo(cx + hr * 0.4, cy + hr * 0.05); c.closePath(); c.fill();
        c.fillStyle = '#7cc6ff';
        c.beginPath(); c.moveTo(cx - hr * 0.2, cy - hr * 0.35); c.lineTo(cx - hr * 0.32, cy + hr * 0.02); c.lineTo(cx - hr * 0.05, cy - hr * 0.02); c.closePath(); c.fill();
        c.fillStyle = '#ffd166';
        c.beginPath(); c.arc(cx, cy - hr * 0.85, hr * 0.12, 0, Math.PI * 2); c.fill();
      } else if (type === 'bow') {
        c.fillStyle = '#ff5d8f';
        c.beginPath(); c.moveTo(cx, cy); c.lineTo(cx - hr * 0.5, cy - hr * 0.3); c.lineTo(cx - hr * 0.5, cy + hr * 0.1); c.closePath(); c.fill();
        c.beginPath(); c.moveTo(cx, cy); c.lineTo(cx + hr * 0.5, cy - hr * 0.3); c.lineTo(cx + hr * 0.5, cy + hr * 0.1); c.closePath(); c.fill();
        c.fillStyle = '#c81e63'; c.beginPath(); c.arc(cx, cy - hr * 0.05, hr * 0.12, 0, Math.PI * 2); c.fill();
      }
    }

    // ---------- Treat drawing (one case per TREATS entry) ----------
    function drawTreat(type, x, y, r, rot) {
      var c = ctx, col = TREATS[type].color;
      c.save(); c.translate(x, y); c.rotate(rot || 0);
      if (type === 1 || TREATS[type].id === 'heart') {
        c.fillStyle = col;
        c.beginPath();
        c.moveTo(0, r * 0.35);
        c.bezierCurveTo(0, -r * 0.35, -r, -r * 0.35, -r, r * 0.25);
        c.bezierCurveTo(-r, r * 0.7, 0, r * 0.95, 0, r * 1.2);
        c.bezierCurveTo(0, r * 0.95, r, r * 0.7, r, r * 0.25);
        c.bezierCurveTo(r, -r * 0.35, 0, -r * 0.35, 0, r * 0.35);
        c.closePath(); c.fill();
      } else if (TREATS[type].id === 'apple') {
        c.fillStyle = col;
        c.beginPath(); c.arc(-r * 0.35, 0, r * 0.6, 0, Math.PI * 2); c.fill();
        c.beginPath(); c.arc(r * 0.35, 0, r * 0.6, 0, Math.PI * 2); c.fill();
        c.strokeStyle = '#7a4a1e'; c.lineWidth = r * 0.14; c.lineCap = 'round';
        c.beginPath(); c.moveTo(0, -r * 0.4); c.lineTo(0, -r * 0.8); c.stroke();
        c.fillStyle = '#57c785';
        c.beginPath(); c.ellipse(r * 0.25, -r * 0.7, r * 0.28, r * 0.14, -0.6, 0, Math.PI * 2); c.fill();
      } else if (TREATS[type].id === 'fish') {
        c.fillStyle = col;
        c.beginPath(); c.ellipse(0, 0, r * 0.85, r * 0.55, 0, 0, Math.PI * 2); c.fill();
        c.beginPath(); c.moveTo(r * 0.6, 0); c.lineTo(r * 1.1, -r * 0.4); c.lineTo(r * 1.1, r * 0.4); c.closePath(); c.fill();
        c.fillStyle = '#ffffff'; c.beginPath(); c.arc(-r * 0.4, -r * 0.12, r * 0.16, 0, Math.PI * 2); c.fill();
        c.fillStyle = '#22143a'; c.beginPath(); c.arc(-r * 0.42, -r * 0.12, r * 0.08, 0, Math.PI * 2); c.fill();
      } else {
        // star (default)
        c.beginPath();
        for (var i = 0; i < 10; i++) {
          var ang = -Math.PI / 2 + i * Math.PI / 5;
          var rr = (i % 2 === 0) ? r : r * 0.45;
          c.lineTo(Math.cos(ang) * rr, Math.sin(ang) * rr);
        }
        c.closePath();
        c.fillStyle = col; c.shadowColor = col; c.shadowBlur = r * 0.5; c.fill(); c.shadowBlur = 0;
      }
      c.restore();
    }

    // lighten (>0) / darken (<0) a hex colour
    function shade(hex, amt) {
      var n = parseInt(hex.slice(1), 16);
      var r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
      function mix(x) { return Math.max(0, Math.min(255, Math.round(x + (amt > 0 ? (255 - x) * amt : x * amt)))); }
      return 'rgb(' + mix(r) + ',' + mix(g) + ',' + mix(b) + ')';
    }

    function drawHeartIcon(x, y, r, filled) {
      var c = ctx;
      c.beginPath();
      c.moveTo(x, y + r * 0.3);
      c.bezierCurveTo(x, y - r * 0.3, x - r, y - r * 0.3, x - r, y + r * 0.25);
      c.bezierCurveTo(x - r, y + r * 0.65, x, y + r, x, y + r * 1.15);
      c.bezierCurveTo(x, y + r, x + r, y + r * 0.65, x + r, y + r * 0.25);
      c.bezierCurveTo(x + r, y - r * 0.3, x, y - r * 0.3, x, y + r * 0.3);
      c.closePath();
      c.fillStyle = filled ? '#ff5d8f' : 'rgba(255,255,255,0.2)';
      c.fill();
    }

    // ---------- Render ----------
    function render(ts) {
      if (render._h !== H) { var g = ctx.createLinearGradient(0, 0, 0, H); g.addColorStop(0, '#2a1650'); g.addColorStop(0.6, '#1a0f2e'); g.addColorStop(1, '#100820'); render._g = g; render._h = H; }
      ctx.fillStyle = render._g;
      ctx.fillRect(0, 0, W, H);

      if (state === STATE.CREATE) {
        // Big bobbing preview of the buddy being built.
        var s = Math.min(W, H) * 0.5;
        var by = H * 0.55 + Math.sin(ts / 500) * H * 0.02;
        // a few chosen treats floating around for delight
        for (var k = 0; k < 3; k++) {
          var ang = ts / 1400 + k * 2.1;
          var ox = W / 2 + Math.cos(ang) * s * 0.85;
          var oy = by - s * 0.1 + Math.sin(ang) * s * 0.45;
          drawTreat(cfg.treat, ox, oy, s * 0.12, ts / 600 + k);
        }
        drawBuddy(W / 2, by, s, false);
        return;
      }

      // Playing / over: treats, buddy, sparks, lives
      var i;
      for (i = 0; i < treats.length; i++) drawTreat(cfg.treat, treats[i].x, treats[i].y, treats[i].r, treats[i].spin);

      if (buddy) {
        var wob = buddy.hurt > 0 ? Math.sin(ts / 40) * buddy.s * 0.05 : 0;
        drawBuddy(buddy.x + wob, buddy.y, buddy.s, true);
      }

      for (i = 0; i < sparks.length; i++) {
        var sp = sparks[i];
        ctx.globalAlpha = Math.max(0, sp.alpha);
        ctx.fillStyle = sp.color;
        ctx.beginPath(); ctx.arc(sp.x, sp.y, sp.r, 0, Math.PI * 2); ctx.fill();
      }
      ctx.globalAlpha = 1;

      // Lives (drops left)
      if (state === STATE.PLAYING || state === STATE.PAUSED) {
        var hr = H * 0.022, hx = W * 0.03 + hr, hy = H * 0.03;
        for (i = 0; i < MAX_MISS; i++) drawHeartIcon(hx + i * hr * 2.5, hy, hr, i < (MAX_MISS - misses));
      }
    }

    // ---------- Loop ----------
    function frame(ts) {
      if (!lastTs) lastTs = ts;
      var dt = Math.min(0.045, (ts - lastTs) / 1000);
      lastTs = ts;
      if (state === STATE.PLAYING) update(dt);
      else updateSparks(dt);
      render(ts);
      requestAnimationFrame(frame);
    }

    // ---------- Build panel ----------
    function readIdx(key, len) {
      var v = null; try { v = localStorage.getItem(key); } catch (e) {}
      return (v !== null && +v >= 0 && +v < len) ? +v : 0;
    }
    function save(key, i) { try { localStorage.setItem(key, String(i)); } catch (e) {} }

    function buildRow(rowId, list, curr, onPick, isColor) {
      var row = document.getElementById(rowId);
      for (var i = 0; i < list.length; i++) {
        (function (i) {
          var b = document.createElement('button');
          b.className = 'opt' + (isColor ? ' swatch' : '') + (i === curr ? ' sel' : '');
          if (isColor) { b.style.background = list[i]; b.style.borderColor = (i === curr) ? '#ffd166' : 'rgba(255,255,255,0.4)'; }
          else { b.innerHTML = list[i].icon; }
          b.addEventListener('click', function (e) {
            e.stopPropagation();
            onPick(i);
            var kids = row.querySelectorAll('.opt');
            for (var k = 0; k < kids.length; k++) {
              var selk = (k === i);
              kids[k].className = 'opt' + (isColor ? ' swatch' : '') + (selk ? ' sel' : '');
              if (isColor) kids[k].style.borderColor = selk ? '#ffd166' : 'rgba(255,255,255,0.4)';
            }
          });
          row.appendChild(b);
        })(i);
      }
    }

    cfg.body = readIdx('bb_body', BODIES.length);
    cfg.color = readIdx('bb_color', COLORS.length);
    cfg.hat = readIdx('bb_hat', HATS.length);
    cfg.treat = readIdx('bb_treat', TREATS.length);
    buildRow('bodyRow', BODIES, cfg.body, function (i) { cfg.body = i; save('bb_body', i); });
    buildRow('colorRow', COLORS, cfg.color, function (i) { cfg.color = i; save('bb_color', i); }, true);
    buildRow('hatRow', HATS, cfg.hat, function (i) { cfg.hat = i; save('bb_hat', i); });
    buildRow('treatRow', TREATS, cfg.treat, function (i) { cfg.treat = i; save('bb_treat', i); });

    // ---------- Wire up ----------
    var stage = document.querySelector('.stage');
    stage.addEventListener('touchstart', onMove, { passive: false });
    stage.addEventListener('touchmove', onMove, { passive: false });
    stage.addEventListener('mousedown', function (e) { stage._down = true; onMove(e); });
    stage.addEventListener('mousemove', function (e) { if (stage._down) onMove(e); });
    window.addEventListener('mouseup', function () { stage._down = false; });

    document.getElementById('playBtn').addEventListener('click', function (e) { e.stopPropagation(); startGame(); });
    document.getElementById('playAgainBtn').addEventListener('click', function (e) { e.stopPropagation(); startGame(); });
    document.getElementById('rebuildBtn').addEventListener('click', function (e) { e.stopPropagation(); backToBuild(); });
    document.getElementById('refreshBtn').addEventListener('click', function () { location.reload(); });

    // Pause / resume
    document.getElementById('pauseBtn').addEventListener('click', function (e) {
      e.stopPropagation();
      if (state === STATE.PLAYING) { state = STATE.PAUSED; document.getElementById('pauseOverlay').classList.remove('hidden'); }
      else if (state === STATE.PAUSED) { document.getElementById('pauseOverlay').classList.add('hidden'); state = STATE.PLAYING; lastTs = 0; }
    });
    document.getElementById('resumeBtn').addEventListener('click', function (e) {
      e.stopPropagation();
      document.getElementById('pauseOverlay').classList.add('hidden');
      if (state === STATE.PAUSED) { state = STATE.PLAYING; lastTs = 0; }
    });

    window.addEventListener('resize', resize);
    window.addEventListener('orientationchange', function () { setTimeout(resize, 150); });
    document.addEventListener('visibilitychange', function () { if (!document.hidden) lastTs = 0; });
    // Block page scroll during play, but allow the build panel to scroll.
    document.addEventListener('touchmove', function (e) {
      if (e.target && e.target.closest && e.target.closest('.buildbar')) return;
      e.preventDefault();
    }, { passive: false });
    document.addEventListener('gesturestart', function (e) { e.preventDefault(); });

    // Keep links inside the iOS home-screen (standalone) app on OLD iOS (<13)
    var _iosMajor = +((navigator.userAgent.match(/ OS (\d+)_/) || [])[1] || 0);
    if (navigator.standalone && _iosMajor > 0 && _iosMajor < 13) {
      document.addEventListener('click', function (e) {
        var n = e.target;
        while (n && n.nodeName !== 'A') n = n.parentNode;
        if (n && n.getAttribute('href') && n.getAttribute('target') !== '_blank') {
          e.preventDefault();
          location.href = n.getAttribute('href');
        }
      }, false);
    }

    // ---------- Boot ----------
    treats = []; sparks = [];
    resize();
    requestAnimationFrame(frame);
  })();
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('/sw.js').catch(function () {});
      });
    }
  </script>
</body>
