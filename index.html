<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#12002e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Oisín &amp; Finley's Awesome Game</title>
  <style>
    :root {
      --bg: #12002e;
      --bg-2: #23054d;
      --accent: #ff2e88;
      --accent-2: #00e5ff;
      --ink: #fff7ff;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      overscroll-behavior: none;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: clamp(16px, 4vh, 40px);
      padding: max(16px, env(safe-area-inset-top)) 16px max(16px, env(safe-area-inset-bottom));
      font-family: "Trebuchet MS", "Segoe UI", system-ui, sans-serif;
      color: var(--ink);
      text-align: center;
      background:
        radial-gradient(circle at 20% 15%, rgba(255, 46, 136, 0.28), transparent 45%),
        radial-gradient(circle at 85% 80%, rgba(0, 229, 255, 0.24), transparent 45%),
        linear-gradient(160deg, var(--bg), var(--bg-2));
    }

    header h1 {
      font-size: clamp(1.6rem, 7vw, 3.2rem);
      line-height: 1.1;
      letter-spacing: 0.02em;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 24px rgba(255, 46, 136, 0.35);
      animation: pulse 2.4s ease-in-out infinite;
    }

    header .dots::after {
      content: "";
      animation: dots 1.6s steps(4, end) infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: translateY(0); opacity: 1; }
      50% { transform: translateY(-4px); opacity: 0.88; }
    }

    @keyframes dots {
      0% { content: ""; }
      25% { content: "."; }
      50% { content: ".."; }
      75% { content: "..."; }
    }

    #stage {
      position: relative;
      width: min(92vw, 92vh, 640px);
      aspect-ratio: 1 / 1;
      border-radius: 24px;
      padding: 6px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.55), 0 0 40px rgba(0, 229, 255, 0.25);
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      border-radius: 18px;
      background: #0a0018;
      touch-action: none;
    }

    footer {
      font-size: clamp(0.75rem, 3vw, 1rem);
      opacity: 0.6;
      letter-spacing: 0.04em;
    }
  </style>
</head>
<body>
  <header>
    <h1>Oisín &amp; Finley's Awesome Game <span class="dots">Loading</span></h1>
  </header>

  <div id="stage">
    <canvas id="game"></canvas>
  </div>

  <footer>Tap to start · mobile &amp; tablet ready</footer>

  <script>
    (function () {
      const canvas = document.getElementById('game');
      const ctx = canvas.getContext('2d');
      let w = 0, h = 0;

      function resize() {
        const dpr = window.devicePixelRatio || 1;
        const rect = canvas.getBoundingClientRect();
        w = rect.width;
        h = rect.height;
        canvas.width = Math.round(w * dpr);
        canvas.height = Math.round(h * dpr);
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      }

      function draw(t) {
        ctx.clearRect(0, 0, w, h);

        // Subtle animated glow ring behind the text.
        const cx = w / 2;
        const cy = h / 2;
        const pulse = 0.5 + 0.5 * Math.sin(t / 600);
        const radius = Math.min(w, h) * (0.28 + 0.02 * pulse);

        const grad = ctx.createRadialGradient(cx, cy, radius * 0.2, cx, cy, radius);
        grad.addColorStop(0, 'rgba(0, 229, 255, ' + (0.18 + 0.12 * pulse) + ')');
        grad.addColorStop(1, 'rgba(255, 46, 136, 0)');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(cx, cy, radius, 0, Math.PI * 2);
        ctx.fill();

        // Placeholder message.
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';

        ctx.font = '600 ' + Math.round(Math.min(w, h) * 0.09) + 'px "Trebuchet MS", system-ui, sans-serif';
        ctx.fillStyle = '#fff7ff';
        ctx.shadowColor = 'rgba(0, 229, 255, 0.6)';
        ctx.shadowBlur = 18;
        ctx.fillText('🎮', cx, cy - Math.min(w, h) * 0.14);
        ctx.fillText('Insert Game Here', cx, cy);
        ctx.shadowBlur = 0;

        ctx.font = '400 ' + Math.round(Math.min(w, h) * 0.045) + 'px "Trebuchet MS", system-ui, sans-serif';
        ctx.fillStyle = 'rgba(255, 247, 255, 0.55)';
        ctx.fillText('placeholder canvas', cx, cy + Math.min(w, h) * 0.13);

        requestAnimationFrame(draw);
      }

      window.addEventListener('resize', resize);
      window.addEventListener('orientationchange', resize);

      // Suppress pinch-zoom / double-tap zoom and rubber-banding.
      document.addEventListener('touchmove', function (e) {
        if (e.touches.length > 1) e.preventDefault();
      }, { passive: false });
      document.addEventListener('gesturestart', function (e) { e.preventDefault(); });

      resize();
      requestAnimationFrame(draw);
    })();
  </script>
</body>
</html>
